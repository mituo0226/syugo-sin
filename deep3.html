<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>守護神占い｜個別相談（deep3 final）</title>
<style>
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:#140826;color:#fff;margin:0}
  .w{max-width:780px;margin:24px auto;padding:16px}
  textarea,input{width:100%;box-sizing:border-box}
  textarea{min-height:150px;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:#fff}
  .row{margin-top:10px;display:flex;gap:12px;align-items:center}
  .col{flex:1}
  button{padding:10px 16px;border:none;border-radius:999px;background:#8b46ff;color:#fff;cursor:pointer}
  pre{white-space:pre-wrap;background:rgba(0,0,0,.25);padding:12px;border-radius:10px}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08)}
</style>
<div class="w">
  <h1>お悩み相談フォーム（deep3）</h1>
  <div id="dob" class="badge" style="display:none"></div>
  <div class="row"><textarea id="q" placeholder="例）東京在住で、交際相手は北海道です…"></textarea></div>
  <div class="row"><button id="go" type="button" onclick="__send()">鑑定する</button></div>
  <div class="row"><pre id="out"></pre></div>

  <!-- JSが使えない時の緊急フォーム（普段は非表示） -->
  <form id="fallbackForm" action="https://syugo-sin-kantei-api.mituo0226.workers.dev/consult" method="post" class="row" style="flex-direction:column;gap:10px;display:none">
    <textarea name="text" id="fq" placeholder="（フォーム直送用）"></textarea>
    <input type="hidden" name="year" id="fy">
    <input type="hidden" name="month" id="fm">
    <input type="hidden" name="day" id="fd">
    <input type="hidden" name="mode" id="fmode" value="full">
    <div><button type="submit">（フォーム直送）緊急送信</button></div>
  </form>
</div>
<script>
// 送信先API（固定）。?api= がURLに付いていればそれを優先
const DEFAULT_API = "https://syugo-sin-kantei-api.mituo0226.workers.dev/consult";

(function(){
  var qs = new URLSearchParams(location.search);
  var cfg = {
    api: qs.get('api') || DEFAULT_API,
    mode: qs.get('mode') || 'full',
    year: parseInt(qs.get('year')) || null,
    month: parseInt(qs.get('month')) || null,
    day: parseInt(qs.get('day')) || null
  };
  window.__CFG__ = cfg;

  if (cfg.year && cfg.month && cfg.day) {
    var b = document.getElementById('dob');
    if (b) { b.style.display='inline-block'; b.textContent = '生年月日：'+cfg.year+'年'+cfg.month+'月'+cfg.day+'日（把握済み）'; }
  }

  // 上のテキストを緊急フォームにも同期（非表示）
  var q = document.getElementById('q'), fq = document.getElementById('fq');
  function sync(){ if (fq) fq.value = q.value; }
  if (q) { q.addEventListener('input', sync); }
  var fy=document.getElementById('fy'), fm=document.getElementById('fm'), fd=document.getElementById('fd'), fmode=document.getElementById('fmode');
  if (fy) fy.value = cfg.year||'';
  if (fm) fm.value = cfg.month||'';
  if (fd) fd.value = cfg.day||'';
  if (fmode) fmode.value = cfg.mode;
})();

function __friendly(text, status){
  try {
    var d = JSON.parse(text);
    if (status>=200 && status<300) return (d && (d.message || d.result)) || text;
    var isR = d && (d.code==='region_blocked' || (d.error && d.error.code==='unsupported_country_region_territory'));
    return isR ? 'ただいま接続経路の都合により鑑定サーバへ到達できません。\n時間を置く、または別回線でお試しください。'
               : (d && (d.error || d.message)) || '通信エラーが発生しました。';
  } catch(e){ return text; }
}

async function __send(){
  var q = document.getElementById('q'), out = document.getElementById('out'), btn=document.getElementById('go');
  var txt = (q && q.value || '').trim(); if (!txt) { if(q) q.focus(); return; }
  if (btn) btn.disabled = true; if (out) out.textContent = '鑑定中…';

  var cfg = window.__CFG__ || {};
  var payload = { text: txt, year: cfg.year, month: cfg.month, day: cfg.day, mode: cfg.mode };

  try {
    var res = await fetch(cfg.api, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    var t = await res.text();
    out.textContent = __friendly(t, res.status);
  } catch(e){
    out.textContent = '通信に失敗しました。時間を置いてお試しください。';
  } finally {
    if (btn) btn.disabled = false;
  }
}
</script>
</html>
