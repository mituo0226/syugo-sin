
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>守護神占い｜個別相談（deep3 CSP-safe）</title>
  <style>
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:#140826;color:#fff;margin:0}
    .w{max-width:720px;margin:32px auto;padding:16px}
    textarea{width:100%;min-height:160px;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:#fff}
    .row{margin-top:10px;display:flex;gap:10px;align-items:center}
    button{padding:10px 16px;border:none;border-radius:999px;background:#8b46ff;color:#fff;cursor:pointer}
    pre{white-space:pre-wrap;background:rgba(0,0,0,.25);padding:12px;border-radius:10px}
    .hint{opacity:.8;font-size:.9em}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08)}
  </style>
</head>
<body>
  <div class="w">
    <h1>お悩み相談フォーム（deep3）</h1>
    <div id="dob" class="badge" style="display:none"></div>
    <div class="hint">URLに <code>?api=</code> / <code>?backup=</code> / <code>?mode=basic</code> / <code>?year&month&day</code></div>
    <div class="row"><textarea id="q" placeholder="例）東京在住で、交際相手は北海道です…"></textarea></div>
    <div class="row"><button id="go" type="button">鑑定する</button></div>
    <div class="row"><pre id="out"></pre></div>
  </div>
  <script src="deep3.js" defer></script>
</body>
</html>
