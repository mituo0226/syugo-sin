
<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>守護神占い｜個別相談（deep3 single-file）</title>
<style>
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:#140826;color:#fff;margin:0}
  .w{max-width:720px;margin:32px auto;padding:16px}
  textarea{width:100%;min-height:160px;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:#fff}
  .row{margin-top:10px;display:flex;gap:10px;align-items:center}
  button{padding:10px 16px;border:none;border-radius:999px;background:#8b46ff;color:#fff;cursor:pointer;position:relative;z-index:2147483647}
  pre{white-space:pre-wrap;background:rgba(0,0,0,.25);padding:12px;border-radius:10px}
  .hint{opacity:.8;font-size:.9em}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08)}
</style>
<div class="w">
  <h1>お悩み相談フォーム（deep3）</h1>
  <div id="dob" class="badge" style="display:none"></div>
  <div class="hint">URLに <code>?api=</code> / <code>?backup=</code> / <code>?mode=basic</code> / <code>?year&month&day</code></div>
  <div class="row"><textarea id="q" placeholder="例）東京在住で、交際相手は北海道です…"></textarea></div>
  <div class="row"><button id="go" type="button" onclick="__send()">鑑定する</button></div>
  <div class="row"><pre id="out"></pre></div>
</div>
<script>
// --- 初期化（クエリ解析 & DOBバッジ）
(function(){
  var qs = new URLSearchParams(location.search);
  var cfg = {
    api: qs.get('api') || '/api/consult',
    backup: qs.get('backup') || '',
    mode: qs.get('mode') || 'full',
    year: parseInt(qs.get('year')) || null,
    month: parseInt(qs.get('month')) || null,
    day: parseInt(qs.get('day')) || null
  };
  window.__CFG__ = cfg;
  if (cfg.year && cfg.month && cfg.day) {
    var b = document.getElementById('dob');
    if (b) { b.style.display='inline-block'; b.textContent = '生年月日：'+cfg.year+'年'+cfg.month+'月'+cfg.day+'日（把握済み）'; }
  }
})();

function __friendly(text, status){
  try {
    var d = JSON.parse(text);
    if (status>=200 && status<300) return (d && (d.message || d.result)) || text;
    var isR = d && (d.code==='region_blocked' || (d.error && d.error.code==='unsupported_country_region_territory'));
    return isR ? 'ただいま接続経路の都合により鑑定サーバへ到達できません。\\nVPN/プロキシをOFF、時間を置く、または別回線でお試しください。'
               : (d && (d.error || d.message)) || '通信エラーが発生しました。しばらくしてからお試しください。';
  } catch(e){ return text; }
}

async function __call(payload){
  var cfg = window.__CFG__ || {};
  var res = null;
  try {
    res = await fetch(cfg.api, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  } catch(e) {}
  if (!res || !res.ok) {
    var isRegion=false;
    try {
      if (res) {
        var t = await res.clone().text();
        var j = JSON.parse(t);
        isRegion = !!(j && (j.code==='region_blocked' || (j.error && j.error.code==='unsupported_country_region_territory')));
      }
    } catch(e){}
    if ((isRegion || !res) && cfg.backup) {
      try {
        return await fetch(cfg.backup, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      } catch(e) {}
    }
  }
  return res;
}

async function __send(){
  var q = document.getElementById('q'), out = document.getElementById('out'), btn=document.getElementById('go');
  var txt = (q && q.value || '').trim(); if (!txt) { if(q) q.focus(); return; }
  if (btn) btn.disabled = true; if (out) out.textContent = '鑑定中…';
  var cfg = window.__CFG__ || {};
  var payload = { text: txt, year: cfg.year, month: cfg.month, day: cfg.day, mode: cfg.mode };
  try {
    var res = await __call(payload);
    if (!res) { out.textContent = '通信に失敗しました（送信先に到達できません）。?api= に実URLを指定してください。'; return; }
    var t = await res.text();
    out.textContent = __friendly(t, res.status);
  } catch(e){
    out.textContent = '通信に失敗しました。時間を置いてお試しください。';
  } finally {
    if (btn) btn.disabled = false;
  }
}
</script>
