<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神占い｜神託</title>
<style>
body {
  background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
  color: #fff;
  font-family: 'Zen Old Mincho', serif;
  text-align: center;
  padding: 30px;
  position: relative;
  overflow-x: hidden;
}

/* 霧エフェクト */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(199, 125, 255, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: mistMove 20s ease-in-out infinite;
}

@keyframes mistMove {
  0%, 100% {
    transform: translateX(0) translateY(0);
  }
  25% {
    transform: translateX(-10px) translateY(-5px);
  }
  50% {
    transform: translateX(5px) translateY(-10px);
  }
  75% {
    transform: translateX(-5px) translateY(5px);
  }
}

/* 結果ボックス */
.result {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(147,51,234,0.4);
  opacity: 0; /* 最初は非表示 */
  transition: opacity 1s;
  position: relative;
  overflow: hidden;
}

/* 浮遊する光の粒子 */
.floating-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.floating-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: radial-gradient(circle, #c77dff, transparent);
  border-radius: 50%;
  animation: floatAround 8s infinite linear;
}

.floating-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.floating-particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
.floating-particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }
.floating-particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
.floating-particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1s; }
.floating-particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 3s; }

@keyframes floatAround {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translate(20px, -20px) rotate(360deg);
    opacity: 0;
  }
}

.result::before {
  content: '';
  position: absolute;
  top: -20px;
  left: -20px;
  right: -20px;
  bottom: -20px;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.3) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
  z-index: -1;
  border-radius: 16px;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.6;
  }
}

img {
  width:120px;
  border-radius:50%;
  margin:10px auto;
  display:block;
  background: transparent;
  filter: contrast(1.1) brightness(1.1) saturate(1.2);
  position: relative;
  animation: guardianGlow 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
}

@keyframes guardianGlow {
  0% {
    box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 50px rgba(157, 78, 221, 0.8), 0 0 80px rgba(199, 125, 255, 0.4);
    transform: scale(1.02);
  }
  100% {
    box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
    transform: scale(1);
  }
}

h1 {
  font-size:1.5em;
  margin-bottom:0.5em;
}

p {
  margin:1em 0;
  white-space: pre-wrap;
}

/* 重要なテキストの光る演出 */
.glow-text {
  animation: textGlow 2s ease-in-out infinite alternate;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
}

@keyframes textGlow {
  0% {
    text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
  }
  100% {
    text-shadow: 0 0 20px rgba(157, 78, 221, 1), 0 0 30px rgba(199, 125, 255, 0.6);
  }
}

/* ローディング画面 */
#loadingScreen {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index: 9999;
  animation: fadeIn 1s forwards;
  overflow: hidden;
}

/* パーティクルエフェクト */
.particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, #9d4edd, transparent);
  border-radius: 50%;
  animation: float 6s infinite linear;
}

.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 20%; animation-delay: 1s; }
.particle:nth-child(3) { left: 30%; animation-delay: 2s; }
.particle:nth-child(4) { left: 40%; animation-delay: 3s; }
.particle:nth-child(5) { left: 50%; animation-delay: 4s; }
.particle:nth-child(6) { left: 60%; animation-delay: 5s; }
.particle:nth-child(7) { left: 70%; animation-delay: 0.5s; }
.particle:nth-child(8) { left: 80%; animation-delay: 1.5s; }
.particle:nth-child(9) { left: 90%; animation-delay: 2.5s; }
.particle:nth-child(10) { left: 15%; animation-delay: 3.5s; }

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100px) rotate(360deg);
    opacity: 0;
  }
}

/* 神秘的な光の球体 */
.mystical-orbs {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.8), transparent);
  box-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
  animation: orbFloat 4s ease-in-out infinite;
}

.orb1 {
  width: 30px;
  height: 30px;
  top: 20%;
  left: 20%;
  animation-delay: 0s;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.8), transparent);
}

.orb2 {
  width: 20px;
  height: 20px;
  top: 60%;
  right: 25%;
  animation-delay: 1.5s;
  background: radial-gradient(circle, rgba(199, 125, 255, 0.8), transparent);
  box-shadow: 0 0 15px rgba(199, 125, 255, 0.6);
}

.orb3 {
  width: 25px;
  height: 25px;
  bottom: 30%;
  left: 60%;
  animation-delay: 3s;
  background: radial-gradient(circle, rgba(255, 107, 157, 0.8), transparent);
  box-shadow: 0 0 18px rgba(255, 107, 157, 0.6);
}

@keyframes orbFloat {
  0%, 100% {
    transform: translateY(0) scale(1);
    opacity: 0.7;
  }
  25% {
    transform: translateY(-20px) scale(1.2);
    opacity: 1;
  }
  50% {
    transform: translateY(-10px) scale(0.8);
    opacity: 0.5;
  }
  75% {
    transform: translateY(-30px) scale(1.1);
    opacity: 0.9;
  }
}

#loadingScreen p {
  color:#fff;
  font-size:1.2em;
  margin-top:1em;
  animation: blink 1.5s infinite;
}

.loading-spinner {
  width: 100px;
  height: 100px;
  position: relative;
  margin: 0 auto;
}

.loading-spinner::before,
.loading-spinner::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent, #9d4edd, #c77dff, #ff6b9d, transparent);
  animation: spiral 3s linear infinite;
}

.loading-spinner::before {
  animation: spiral 3s linear infinite;
  filter: blur(2px);
  opacity: 0.7;
}

.loading-spinner::after {
  animation: spiral 2s linear infinite reverse;
  filter: blur(1px);
  opacity: 0.9;
  width: 80%;
  height: 80%;
  top: 10%;
  left: 10%;
}

@keyframes spiral {
  0% {
    transform: rotate(0deg) scale(1);
    filter: hue-rotate(0deg);
  }
  25% {
    transform: rotate(90deg) scale(1.1);
    filter: hue-rotate(90deg);
  }
  50% {
    transform: rotate(180deg) scale(0.9);
    filter: hue-rotate(180deg);
  }
  75% {
    transform: rotate(270deg) scale(1.1);
    filter: hue-rotate(270deg);
  }
  100% {
    transform: rotate(360deg) scale(1);
    filter: hue-rotate(360deg);
  }
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.4;}
  100% {opacity:1;}
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes fadeOut {
  from {opacity:1;}
  to {opacity:0;}
}


.detail-link {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: #9d4edd;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1.1em;
  transition: all 0.3s ease;
}

.detail-link:hover {
  background: #c77dff;
  transform: scale(1.05);
}

/* 波紋エフェクト */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(157, 78, 221, 0.6);
  transform: scale(0);
  animation: ripple 0.6s linear;
  pointer-events: none;
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}


</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="mystical-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="loading-spinner"></div>
  <p>神託を降ろしています…</p>
</div>

<!-- 結果 -->
<div class="result">
  <div class="floating-particles">
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
  </div>
  <h1 class="glow-text">神託</h1>
  <div id="guardian"></div>
  <p id="oracle"></p>
 <p><a id="detailLink" class="detail-link">さらに詳しく運命を占う</a> </p>
  <a href="index.html" style="color:#9d4edd; text-decoration:underline;">戻る</a>
</div>

<script>
// ローディング演出
window.addEventListener('load', () => {
  setTimeout(() => {
    const loader = document.getElementById('loadingScreen');
    loader.style.animation = 'fadeOut 1s forwards';
    setTimeout(() => {
      loader.remove();
      document.querySelector('.result').style.opacity = '1';
    }, 1000);
  }, 3000); // 3秒ローディング
});

const params = new URLSearchParams(window.location.search);
const year = parseInt(params.get('year'));
const month = parseInt(params.get('month'));
const day = parseInt(params.get('day'));

const zodiacs = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const zodiac = zodiacs[(year - 4) % 12];

const guardians = {
'子': {name:'千手観音',desc:'無限の慈悲をもって汝を抱擁する者なり',image:'./photo/senju.jpg'},
'丑': {name:'虚空蔵菩薩',desc:'無尽の智慧を授けし導き手なり',image:'./photo/kokuzo.jpg'},
'寅': {name:'虚空蔵菩薩',desc:'無尽の智慧を授けし導き手なり',image:'./photo/kokuzo.jpg'},
'卯': {name:'文殊菩薩',desc:'智慧の剣をもって迷いを断つ者なり',image:'./photo/monju.jpg'},
'辰': {name:'普賢菩薩',desc:'実践の徳を授ける者なり',image:'./photo/fugen.jpg'},
'巳': {name:'普賢菩薩',desc:'実践の徳を授ける者なり',image:'./photo/fugen.jpg'},
'午': {name:'勢至菩薩',desc:'智慧の光を放ち衆生を救う者なり',image:'./photo/seishi.jpg'},
'未': {name:'大日如来',desc:'宇宙の理をもって全てを照らす者なり',image:'./photo/dainichi.jpg'},
'申': {name:'大日如来',desc:'宇宙の理をもって全てを照らす者なり',image:'./photo/dainichi.jpg'},
'酉': {name:'不動明王',desc:'不動の意志にて悪を退ける者なり',image:'./photo/fudo.jpg'},
'戌': {name:'阿弥陀如来',desc:'無量の慈悲をもって救済する者なり',image:'./photo/amida.jpg'},
'亥': {name:'阿弥陀如来',desc:'無量の慈悲をもって救済する者なり',image:'./photo/amida.jpg'}
};

const monthTraits = {
1:"寒月に生まれし静謐の心を持ち",
2:"雪解けを待つ忍耐の徳を授かり",
3:"芽吹きの息吹を宿す魂を抱き",
4:"萌ゆる命の躍動を胸に刻み",
5:"薫風と共に歩む軽やかな心を携え",
6:"豊穣の光を授かる運命に生まれ",
7:"深き水面の如き洞察を得て",
8:"烈日の炎に祝福されし者なり",
9:"実りの秋に育まれし叡智を持ち",
10:"黄昏に咲く決意の花を宿し",
11:"夜霜をも溶かす感受性を抱き",
12:"雪華の中に咲く慈愛の心を備える"
};

const dayTraits = {
1:"新たなる道を拓く先駆者なり",
2:"調和を重んじる清き心を持つ者",
3:"喜びを分かち合う光の使い",
4:"堅実に積み上げる力を授かりし者",
5:"自由と変化を愛する風の魂",
6:"慈しみ深き慈悲の持ち主",
7:"深遠なる洞察を授かる者",
8:"権威と達成の星を宿す者",
9:"無私の奉仕を選びし者",
11:"霊性に目覚めし導き手",
22:"大いなる責務を担う魂"
};

const guardian = guardians[zodiac];
const monthText = monthTraits[month] || "月の特性不明";
const dayText = dayTraits[day] || "独自の使命を携えし者";

document.getElementById('guardian').innerHTML=`
// 保存：有料鑑定ページで把握させるため
try {
  const western = (function(m,d){
    const t = [
      [1,20,'山羊座'],[2,19,'水瓶座'],[3,21,'魚座'],[4,20,'牡羊座'],
      [5,21,'牡牛座'],[6,22,'双子座'],[7,23,'蟹座'],[8,23,'獅子座'],
      [9,23,'乙女座'],[10,24,'天秤座'],[11,23,'蠍座'],[12,22,'射手座'],[12,32,'山羊座']
    ];
    for (let i=0;i<t.length-1;i++){
      const [sm,sd,name] = t[i]; const [nm,nd] = t[i+1];
      const afterStart = (month>sm) || (month===sm && day>=sd);
      const beforeNext = (month<nm) || (month===nm && day<nd);
      if (afterStart && beforeNext) return name;
    }
    return '不明';
  })(month, day);
  sessionStorage.setItem('ss_user_profile', JSON.stringify({
    year, month, day, zodiac, guardianName: guardian.name, westernSign: western, ts: Date.now()
  }));
} catch(e) {}

  <img src="${guardian.image}" alt="${guardian.name}">
  <div><strong class="glow-text">そなたを守護するは ${guardian.name}</strong></div>
  <div>${guardian.desc}</div>
`;

// タイピング効果の関数
function typeWriter(element, text, speed = 50) {
  let i = 0;
  element.innerHTML = '';
  
  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

const oracleText = `「汝に告ぐ
  ${guardian.name}は常にそなたを見守り
  心弱き時には慈悲を注ぎ
  道を誤る時には智慧の灯を掲げん

  ${month}月に生まれし汝
  ${monthText}

  生まれしその日は「${day}」
  ${dayText}

  この運命を胸に刻み
  恐れることなく進むがよい
  汝の歩む道は
  光と共に在る」`;

// ローディング完了後にタイピング開始
setTimeout(() => {
  typeWriter(document.getElementById('oracle'), oracleText, 80);
}, 4000);

// 詳細占いリンクにパラメータを付与
document.getElementById('detailLink').href = `paid.html?year=${year}&month=${month}&day=${day}`;

// 波紋エフェクト
function createRipple(event) {
  const button = event.currentTarget;
  const ripple = document.createElement('span');
  const rect = button.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = event.clientX - rect.left - size / 2;
  const y = event.clientY - rect.top - size / 2;
  
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  ripple.classList.add('ripple');
  
  button.appendChild(ripple);
  
  setTimeout(() => {
    ripple.remove();
  }, 600);
}

// ボタンに波紋エフェクトを追加
document.getElementById('detailLink').addEventListener('click', createRipple);

</script>
</body>
</html>
