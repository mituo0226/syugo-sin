<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 生年月日入力</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      background: radial-gradient(circle at top, #1a1a2e, #0d0d1a 80%);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 520px;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(100,150,255,0.3);
      backdrop-filter: blur(6px);
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 15px;
      color: #66ccff;
      text-shadow: 0 0 12px rgba(102,204,255,0.8);
    }

    .intro {
      margin-bottom: 20px;
      font-size: 1.1em;
      line-height: 1.6;
      color: #ddd;
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
      min-height: 3em;
      text-align: left;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 15px;
      align-items: flex-start;
    }

    label {
      font-size: 0.9em;
      color: #99ccff;
    }

    select {
      padding: 10px;
      font-size: 1em;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }

    #year { width: 10ch; }
    #month, #day { width: 8ch; }

    #startButton {
      padding: 14px 35px;
      font-size: 1.2em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #000;
      margin-top: 20px;
      opacity: 0;
      align-self: center;
    }
    #startButton:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: scale(1.05);
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      z-index: -1;
    }
    .stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 4s infinite;
      opacity: 0.8;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars">
    <span style="top:20%; left:30%; animation-delay:0s;"></span>
    <span style="top:50%; left:60%; animation-delay:1s;"></span>
    <span style="top:70%; left:10%; animation-delay:2s;"></span>
    <span style="top:40%; left:80%; animation-delay:3s;"></span>
  </div>

  <div class="container">
    <h1>AI鑑定師 龍</h1>
    <div class="intro" id="introText"></div>

    <form id="birthForm" style="opacity:0;">
      <div>
        <label for="year">西暦</label><br>
        <select id="year" required></select>
      </div>
      <div>
        <label for="month">月</label><br>
        <select id="month" required></select>
      </div>
      <div>
        <label for="day">日</label><br>
        <select id="day" required></select>
      </div>
      <button type="submit" id="startButton">守護神を導き出す</button>
    </form>
  </div>

  <script>
    // セリフをタイプライター風に表示
    const introLines = [
      "まずは、あなたの生年月日を教えてくれ。",
      "そこから、あなたの守護神を導き出そう。"
    ];
    const introEl = document.getElementById("introText");
    const formEl = document.getElementById("birthForm");
    const startButton = document.getElementById("startButton");

    let lineIndex = 0;
    function showLine() {
      if (lineIndex < introLines.length) {
        let text = introLines[lineIndex];
        let i = 0;
        const p = document.createElement("p");
        introEl.appendChild(p);

        const interval = setInterval(() => {
          p.textContent = text.slice(0, i++);
          if (i > text.length) {
            clearInterval(interval);
            lineIndex++;
            setTimeout(showLine, 800);
          }
        }, 50);
      } else {
        formEl.style.opacity = 1;
        setTimeout(() => startButton.style.opacity = 1, 500);
      }
    }

    window.addEventListener("load", () => {
      setTimeout(showLine, 1000);
    });

    // 西暦プルダウン（1900〜2025）
    const yearSelect = document.getElementById("year");
    for (let y = 2025; y >= 1900; y--) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }

    // 月プルダウン
    const monthSelect = document.getElementById("month");
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      monthSelect.appendChild(opt);
    }

    // 日プルダウン
    const daySelect = document.getElementById("day");
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      daySelect.appendChild(opt);
    }

    // フォーム送信で confirm.html に遷移
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const y = yearSelect.value;
      const m = monthSelect.value;
      const d = daySelect.value;
      window.location.href = `confirm.html?year=${y}&month=${m}&day=${d}`;
    });
  </script>
</body>
</html>
