<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神出現</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #0d0d1a;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    /* 鑑定中ロード画面 */
    #loadingScreen {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle at center, #1a1a2e, #0d0d1a 80%);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index: 9999;
      animation: fadeOut 1s ease forwards;
      animation-delay: 3s;
    }

    .loading-text {
      font-size: 1.4em;
      color: #99ccff;
      text-shadow: 0 0 12px #66ccff;
      animation: blink 1.5s infinite;
      margin-top: 20px;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    /* フェードアウトアニメ */
    @keyframes fadeOut {
      to { opacity: 0; visibility:hidden; }
    }

    /* 結果画面 */
    .result {
      opacity: 0;
      position: relative;
      min-height: 100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: 20px;
      animation: fadeIn 2s ease forwards;
      animation-delay: 3.2s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* 守護神出現演出 */
    .guardian {
      opacity: 0;
      transform: scale(0.8);
      filter: blur(15px);
      max-width: 300px;
      animation: guardianAppear 2.5s ease forwards;
      animation-delay: 3.5s;
    }

    @keyframes guardianAppear {
      0% { opacity: 0; transform: scale(0.8); filter: blur(15px); }
      60% { opacity: 1; transform: scale(1.05); filter: blur(3px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    .guardian-name {
      font-size: 2em;
      margin-top: 20px;
      opacity: 0;
      animation: nameGlow 3s ease forwards;
      animation-delay: 5s;
    }

    @keyframes nameGlow {
      0% { opacity: 0; text-shadow: none; }
      50% { opacity: 1; text-shadow: 0 0 15px #66ccff, 0 0 30px #3399ff; }
      100% { opacity: 1; text-shadow: 0 0 8px #66ccff; }
    }

    .guardian-message {
      margin-top: 30px;
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 700px;
      text-align: left;
      white-space: pre-line;
      margin-left:auto;
      margin-right:auto;
    }

    /* 背景の光パルス */
    .result::before {
      content:"";
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle, rgba(102,204,255,0.2) 0%, transparent 70%);
      animation:pulse 6s infinite;
      z-index:-1;
    }
    @keyframes pulse {
      0%,100% { opacity:0.4; }
      50% { opacity:1; }
    }
  </style>
</head>
<body>

  <!-- 鑑定中ロード演出 -->
  <div id="loadingScreen">
    <div class="orb"></div>
    <div class="loading-text">神託を降ろしています…</div>
  </div>

  <!-- 守護神出現 -->
  <section class="result">
    <img src="https://syugo-sin.com/photo/guardian_sample.png" alt="守護神" class="guardian">
    <h2 class="guardian-name">あなたの守護神</h2>
    <div class="guardian-message" id="guardianMessage"></div>
  </section>

  <script>
    // タイプライターで守護神メッセージを出す
    const message = "──神秘の光の中から現れた守護神が、あなたに語りかけます──\n\nあなたの歩む道には試練が訪れるでしょう。しかし恐れることはありません。守護神はあなたと共にあり、その選択を導いていきます。";
    const msgEl = document.getElementById("guardianMessage");

    function typeWriter(text, el, i=0) {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        setTimeout(() => typeWriter(text, el, i+1), 40);
      }
    }

    // ローディングが終わったらメッセージを表示開始
    window.addEventListener("load", () => {
      setTimeout(() => {
        typeWriter(message, msgEl);
      }, 5200); // 名前が光った後くらいから開始
    });
  </script>
</body>
</html>
