<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神の出現</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #0d0d1a;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    /* 鑑定中ロード画面 */
    #loadingScreen {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle at center, #1a1a2e, #0d0d1a 80%);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index: 9999;
      animation: fadeOut 1s ease forwards;
      animation-delay: 3s;
    }

    .loading-text {
      font-size: 1.4em;
      color: #99ccff;
      text-shadow: 0 0 12px #66ccff;
      animation: blink 1.5s infinite;
      margin-top: 20px;
    }
    @keyframes blink { 50% { opacity: 0.5; } }

    @keyframes fadeOut { to { opacity: 0; visibility:hidden; } }

    /* 守護神出現 */
    .result {
      opacity: 0;
      position: relative;
      min-height: 100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: 20px;
      animation: fadeIn 2s ease forwards;
      animation-delay: 3.2s;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .guardian {
      opacity: 0;
      transform: scale(0.8);
      filter: blur(15px);
      max-width: 280px;
      animation: guardianAppear 2.5s ease forwards;
      animation-delay: 3.5s;
    }
    @keyframes guardianAppear {
      0% { opacity: 0; transform: scale(0.8); filter: blur(15px); }
      60% { opacity: 1; transform: scale(1.05); filter: blur(3px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    .guardian-name {
      font-size: 1.8em;
      margin-top: 20px;
      opacity: 0;
      animation: nameGlow 3s ease forwards;
      animation-delay: 5s;
    }
    @keyframes nameGlow {
      0% { opacity: 0; text-shadow: none; }
      50% { opacity: 1; text-shadow: 0 0 15px #66ccff, 0 0 30px #3399ff; }
      100% { opacity: 1; text-shadow: 0 0 8px #66ccff; }
    }

    .guardian-message {
      margin-top: 30px;
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 700px;
      text-align: left;
      white-space: pre-line;
      margin-left:auto;
      margin-right:auto;
    }

    /* 背景の光パルス */
    .result::before {
      content:"";
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background: radial-gradient(circle, rgba(102,204,255,0.2) 0%, transparent 70%);
      animation:pulse 6s infinite;
      z-index:-1;
    }
    @keyframes pulse {
      0%,100% { opacity:0.4; }
      50% { opacity:1; }
    }

    /* ボタン */
    .next-button {
      margin-top: 40px;
      padding: 14px 40px;
      font-size: 1.2em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #000;
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 9s; /* メッセージが出てから */
    }
    .next-button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- 鑑定中ロード -->
  <div id="loadingScreen">
    <div class="loading-text">神託を降ろしています…</div>
  </div>

  <!-- 守護神出現 -->
  <section class="result">
    <img src="https://syugo-sin.com/photo/guardian_sample.png" alt="守護神" class="guardian">
    <h2 class="guardian-name" id="guardianName"></h2>
    <div class="guardian-message" id="guardianMessage"></div>
    <a href="confirm.html" class="next-button">さらに鑑定を続ける</a>
  </section>

  <script>
    // URLから生年月日を取得
    const params = new URLSearchParams(window.location.search);
    const year = params.get("year");
    const month = params.get("month");
    const day = params.get("day");

    // 仮：守護神判定（ここはAPI連携で差し替え可能）
    function getGuardian(y, m, d) {
      const num = (parseInt(y)+parseInt(m)+parseInt(d)) % 3;
      if (num === 0) return {name:"蒼龍", message:"あなたの守護神は蒼き龍──困難を越える強靭な力を授ける存在です。"};
      if (num === 1) return {name:"白虎", message:"あなたの守護神は白き虎──勇気と直感で未来を切り拓く存在です。"};
      return {name:"朱雀", message:"あなたの守護神は朱き鳥──情熱と希望であなたを導く存在です。"};
    }

    const guardian = getGuardian(year, month, day);
    document.getElementById("guardianName").textContent = guardian.name;

    // タイプライター表示
    function typeWriter(text, el, i=0) {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        setTimeout(() => typeWriter(text, el, i+1), 40);
      }
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        typeWriter(guardian.message, document.getElementById("guardianMessage"));
      }, 5500); // 守護神が出現してから開始
    });
  </script>
</body>
</html>
