<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>守護神の言葉 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: relative;
      min-height: 100vh;
    }
    
    /* 神秘的な背景効果 */
    .mystical-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(102, 204, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(199, 125, 255, 0.05) 0%, transparent 50%);
      z-index: -1;
      animation: bgPulse 8s ease-in-out infinite;
    }
    
    @keyframes bgPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    
    /* 浮遊する粒子 */
    .floating-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #66ccff;
      border-radius: 50%;
      animation: float 6s linear infinite;
    }
    
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 3s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 4s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 0s; }
    .particle:nth-child(8) { left: 80%; animation-delay: 1s; }
    .particle:nth-child(9) { left: 90%; animation-delay: 2s; }
    
    @keyframes float {
      0% {
        top: 100%;
        opacity: 0;
        transform: translateY(0) scale(0);
      }
      10% {
        opacity: 1;
        transform: translateY(-10px) scale(1);
      }
      90% {
        opacity: 1;
        transform: translateY(-90vh) scale(1);
      }
      100% {
        top: 0;
        opacity: 0;
        transform: translateY(-100vh) scale(0);
      }
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    /* PC向けコンテナ調整 */
    @media (min-width: 768px) {
      .container {
        padding: 40px 20px;
        justify-content: center;
      }
    }
    
    .guardian-message-container {
      max-width: 800px;
      background: rgba(13, 13, 26, 0.9);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 2px solid rgba(102, 204, 255, 0.3);
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(102, 204, 255, 0.2);
      animation: messageAppear 2s ease-in-out;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes messageAppear {
      0% {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* PC向けメッセージコンテナ調整 */
    @media (min-width: 768px) {
      .guardian-message-container {
        padding: 60px;
        margin: 20px auto;
      }
    }
    
    .guardian-title {
      font-size: 2.5em;
      color: #66ccff;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(102, 204, 255, 0.6);
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes titleGlow {
      0% { text-shadow: 0 0 20px rgba(102, 204, 255, 0.6); }
      100% { text-shadow: 0 0 30px rgba(102, 204, 255, 0.9), 0 0 40px rgba(102, 204, 255, 0.4); }
    }
    
    /* PC向けタイトル調整 */
    @media (min-width: 768px) {
      .guardian-title {
        font-size: 3em;
        margin-bottom: 40px;
      }
    }
    
    .guardian-name {
      font-size: 1.8em;
      color: #c77dff;
      margin-bottom: 20px;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(199, 125, 255, 0.6);
    }
    
    /* PC向け守護神名調整 */
    @media (min-width: 768px) {
      .guardian-name {
        font-size: 2.2em;
        margin-bottom: 30px;
      }
    }
    
    .guardian-message {
      font-size: 1.3em;
      line-height: 2.2;
      text-align: left;
      white-space: pre-line;
      margin: 30px 0;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      border-left: 4px solid #66ccff;
      animation: messageReveal 3s ease-in-out;
    }
    
    @keyframes messageReveal {
      0% {
        opacity: 0;
        transform: translateX(-30px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* PC向けメッセージ調整 */
    @media (min-width: 768px) {
      .guardian-message {
        font-size: 1.5em;
        line-height: 2.5;
        padding: 40px;
        margin: 40px 0;
      }
    }
    
    .back-button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 1.2em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 204, 255, 0.4);
      font-weight: bold;
    }
    
    .back-button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 204, 255, 0.6);
    }
    
    /* PC向け戻るボタン調整 */
    @media (min-width: 768px) {
      .back-button {
        font-size: 1.3em;
        padding: 18px 40px;
        margin-top: 40px;
      }
    }
    
    /* モバイル向け調整 */
    @media (max-width: 600px) {
      body {
        position: fixed;
        width: 100%;
        height: 100%;
      }
      
      .container {
        height: 100vh;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
        padding: 20px 15px;
        justify-content: flex-start;
        padding-top: 40px;
      }
      
      .guardian-message-container {
        padding: 25px;
        margin: 20px 0;
        border-radius: 15px;
      }
      
      .guardian-title {
        font-size: 2em;
        margin-bottom: 20px;
      }
      
      .guardian-name {
        font-size: 1.5em;
        margin-bottom: 15px;
      }
      
      .guardian-message {
        font-size: 1.1em;
        line-height: 2.0;
        padding: 20px;
        margin: 20px 0;
      }
      
      .back-button {
        font-size: 1.1em;
        padding: 12px 25px;
        margin-top: 20px;
      }
    }
    
    /* iPhone X以降のノッチ対応（モバイルのみ） */
    @media (max-width: 600px) {
      @supports (padding: max(0px)) {
        .container {
          padding-top: max(40px, env(safe-area-inset-top));
          padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
      }
    }
  </style>
</head>
<body>
  <!-- 神秘的な背景 -->
  <div class="mystical-bg"></div>
  
  <!-- 浮遊する粒子 -->
  <div class="floating-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  
  <div class="container">
    <div class="guardian-message-container">
      <h1 class="guardian-title">守護神の言葉</h1>
      <div class="guardian-name" id="guardianName"></div>
      <div class="guardian-message" id="guardianMessage"></div>
      <button class="back-button" onclick="goBack()">← 戻る</button>
    </div>
  </div>
  
  <script>
    // 守護神データ
    const guardians = {
      '子': {
        name:'千手観音',
        personal:`幾千の手は汝を包み、悲しみも迷いも静かに解き放つ。  
汝が孤独に沈むときも、我が光は影の背後にありて温もりを授けん。  
泣くな、恐れるな。慈悲の流れは絶えず汝の胸奥に息づいておるのだ。`
      },
      '丑': {
        name:'虚空蔵菩薩',
        personal:`虚空は限りなき智慧の海なり。  
汝が迷い問いを発するとき、心を澄まし空を仰げ。  
思考の奥底に眠る答えを我が声が呼び覚まし、闇を裂いて道を示さん。`
      },
      '寅': {
        name:'虚空蔵菩薩',
        personal:`心に燃ゆる力を持ちながら、時にその火は行く道を惑わす。  
焦るな、力を制すは智慧なり。  
我は汝に知恵の剣を授け、怒涛の流れを鎮め、進むべき大地を照らさん。`
      },
      '卯': {
        name:'文殊菩薩',
        personal:`心は常に揺らぎ、迷いは幾千の影を生む。  
されど汝よ、その刃に恐れるな。  
我が智慧の剣は虚妄を断ち切り、汝に真理を映し出す光となろう。`
      },
      '辰': {
        name:'普賢菩薩',
        personal:`ただ願うのみでは道は開けぬ。  
行動こそが真の力を呼び覚ます。  
我は汝の一歩を守り、その歩みを徳の花で満たし、未来を芳しく導かん。`
      },
      '巳': {
        name:'普賢菩薩',
        personal:`思う心と成す行いがひとつとなるとき、道は確かなものとなる。  
汝の中に潜む決意を我は見抜き、迷わぬ実践を授けん。  
行け、行いこそが汝の祈りを現実に変える。`
      },
      '午': {
        name:'勢至菩薩',
        personal:`光は常に汝の内に燃えておる。  
汝が恐れを抱くとき、その光は弱まるが決して消えはせぬ。  
信じよ、内なる炎を。我は智慧の灯を絶やさず、汝を照らし続けん。`
      },
      '未': {
        name:'大日如来',
        personal:`天も地も、森羅万象も、我が光に包まれておる。  
汝もまた、その宇宙の理の一部なり。  
恐れるな、すべては巡りの中にあり、汝の歩みは必然の流れに抱かれておるのだ。`
      },
      '申': {
        name:'大日如来',
        personal:`星々の瞬き、風の囁き、全ては理の調べなり。  
汝の心もまた、その旋律に響き合う一音に過ぎぬ。  
流れに抗うな、調和を知れ。理に従う者こそ、宇宙の光を得ん。`
      },
      '酉': {
        name:'不動明王',
        personal:`炎は我が衣、怒りの相は慈悲の姿。  
汝が弱き心に飲まれるとき、悪しき影は近づかん。  
我はその影を焼き払い、揺るがぬ意志を授けん。  
心を決して揺るがすな、立ち上がるその刹那、汝は真の強者となる。`
      },
      '戌': {
        name:'阿弥陀如来',
        personal:`慈悲の光は汝を包み、迷いの闇を照らす。  
汝が道に迷うとき、我が手は必ず汝を導かん。  
信じよ、慈悲の力は無限なり。我は汝の歩みを永遠に見守り続けん。`
      },
      '亥': {
        name:'薬師如来',
        personal:`心身の苦しみを癒し、健康の光を授けん。  
汝が弱きとき、我が薬は必ず効かん。  
恐れるな、我は汝の健康を守り、強き心を授けん。`
      }
    };

    // 戻るボタンの機能
    function goBack() {
      window.history.back();
    }
    
    // ページ読み込み時の処理
    window.addEventListener("load", function() {
      try {
        // URLパラメータから守護神の情報を取得
        const urlParams = new URLSearchParams(window.location.search);
        const guardianName = urlParams.get('name');
        const zodiacSign = urlParams.get('zodiac');
        
        if (guardianName && zodiacSign && guardians[zodiacSign]) {
          // 守護神の名前とメッセージを表示
          document.getElementById('guardianName').textContent = guardianName;
          document.getElementById('guardianMessage').textContent = guardians[zodiacSign].personal;
        } else if (guardianName) {
          // 名前のみある場合は名前を表示
          document.getElementById('guardianName').textContent = guardianName;
          document.getElementById('guardianMessage').textContent = '守護神からのメッセージが表示されます。';
        } else {
          // パラメータがない場合はデフォルトメッセージを表示
          document.getElementById('guardianName').textContent = '守護神';
          document.getElementById('guardianMessage').textContent = '守護神からのメッセージが表示されます。';
        }
      } catch (error) {
        console.error("ページ読み込みエラー:", error);
        // エラーが発生した場合のデフォルト表示
        document.getElementById('guardianName').textContent = '守護神';
        document.getElementById('guardianMessage').textContent = '守護神からのメッセージが表示されます。';
      }
    });
  </script>
</body>
</html>
