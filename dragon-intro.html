<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>龍の鑑定 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      position: relative;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* PC向け調整 */
    @media (min-width: 768px) {
      body {
        position: relative;
        min-height: 100vh;
        overflow-y: auto;
      }
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 40px 20px 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    
    /* PC向けヒーロー調整 */
    @media (min-width: 768px) {
      .hero {
        min-height: 100vh;
        padding: 80px 60px 140px;
        justify-content: flex-start;
        overflow-y: visible;
        position: relative;
        max-width: 1200px;
        margin: 0 auto;
      }
    }
    
    .hero.show {
      opacity: 1;
    }
    
    .hero {
      position: relative;
    }
    
    .hero img {
      max-width: 90%;
      height: auto;
      opacity: 0;
      transform: scale(0.95);
      transition: all 2s ease;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,150,255,0.5);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      position: relative;
      z-index: 1;
    }
    
    /* PC向け画像調整 */
    @media (min-width: 768px) {
      .hero img {
        max-width: 400px;
        max-height: 400px;
        margin: 30px auto;
        border-radius: 15px;
        box-shadow: 0 0 50px rgba(100,150,255,0.6);
      }
    }
    
    #storyText {
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 95%;
      white-space: pre-line;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 10;
      background: rgba(13, 13, 26, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      border: 2px solid rgba(102, 204, 255, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    
    /* PC向けストーリーテキスト調整 */
    @media (min-width: 768px) {
      #storyText {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        max-width: 1000px;
        width: 90%;
        font-size: 1.3em;
        line-height: 2.0;
        padding: 40px 50px;
        background: rgba(13, 13, 26, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 25px;
        border: 2px solid rgba(102, 204, 255, 0.5);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7), 0 0 25px rgba(102, 204, 255, 0.3);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      }
    }
    
    /* 大きな画面向けストーリーテキスト調整 */
    @media (min-width: 1200px) {
      #storyText {
        max-width: 1200px;
        width: 95%;
        font-size: 1.4em;
        line-height: 2.1;
        padding: 45px 60px;
      }
    }
    
    #storyText p { 
      margin: 15px 0; 
      animation: messageGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes messageGlow {
      0% {
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(102, 204, 255, 0.3);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
      }
      100% {
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(102, 204, 255, 0.6);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(102, 204, 255, 0.4);
      }
    }

    /* 生年月日入力ボタン */
    .birth-input-button {
      margin-top: 30px;
      opacity: 0;
      transition: all 1s ease;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      z-index: 1000;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 400px;
    }
    
    /* PC向けボタン調整 */
    @media (min-width: 768px) {
      .birth-input-button {
        position: absolute;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%) translateY(50px);
        width: auto;
        max-width: 450px;
        background: rgba(13, 13, 26, 0.95);
        padding: 25px;
        border-radius: 25px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(102, 204, 255, 0.3);
      }
      
      .birth-input-button.show {
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .birth-input-button.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
    .birth-input-button button {
      padding: 20px 70px;
      font-size: 1.5em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 6px 20px rgba(102,204,255,0.4);
      transition: all 0.3s ease;
    }
    
    .birth-input-button button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,204,255,0.4);
    }

    /* iPhone向け調整 */
    @media (max-width: 600px) {
      body {
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .hero {
        min-height: auto;
        height: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        padding: 60px 15px 100px;
      }
      #storyText { 
        font-size: 1.1em; 
        text-align: center; 
        max-width: 98%;
        padding: 20px;
        bottom: 45%;
      }
      .birth-input-button {
        position: relative !important;
        bottom: auto !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: calc(100% - 40px) !important;
        max-width: 400px !important;
        background: rgba(13, 13, 26, 0.95) !important;
        padding: 20px !important;
        border-radius: 20px !important;
        backdrop-filter: blur(15px) !important;
        -webkit-backdrop-filter: blur(15px) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        margin: 40px 0 0 0 !important;
      }
      .birth-input-button.show {
        opacity: 1 !important;
        transform: translateX(-50%) !important;
      }
      .birth-input-button button {
        font-size: 1.4em !important;
        padding: 18px 40px !important;
        -webkit-appearance: none !important;
        width: 100% !important;
        max-width: 350px !important;
        border-radius: 15px !important;
        font-weight: bold !important;
      }
    }
      
    .hero img {
      max-width: 80%;
      margin: 15px 0;
    }
      
    /* iPhone X以降のノッチ対応 */
    @supports (padding: max(0px)) {
      .hero {
        padding-top: max(40px, env(safe-area-inset-top));
        padding-bottom: max(40px, env(safe-area-inset-bottom));
      }
    }

    /* フッター */
    .footer {
      margin-top: auto;
      padding: 25px 20px;
      background: rgba(13, 13, 26, 0.8);
      border-top: 1px solid rgba(102, 204, 255, 0.3);
      width: 100%;
      box-sizing: border-box;
      position: relative;
      z-index: 10;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }
    
    .footer-links::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(102, 204, 255, 0.5), transparent);
    }
    
    .footer-left {
      display: flex;
      gap: 20px;
      margin-right: 40px;
    }
    
    .footer-right {
      display: flex;
      gap: 20px;
      margin-left: 40px;
    }
    
    .footer-links a {
      color: #66ccff;
      text-decoration: none;
      font-size: 0.9em;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    
    .footer-links a:hover {
      background: rgba(102, 204, 255, 0.1);
      border-color: rgba(102, 204, 255, 0.3);
      transform: translateY(-1px);
    }

    /* PC向けフッター調整 */
    @media (min-width: 768px) {
      .footer {
        padding: 20px 40px;
      }
      
      .footer-links {
        max-width: 600px;
        gap: 15px;
      }
      
      .footer-left,
      .footer-right {
        gap: 15px;
      }
      
      .footer-left {
        margin-right: 30px;
      }
      
      .footer-right {
        margin-left: 30px;
      }
      
      .footer-links a {
        font-size: 0.75em;
        padding: 6px 12px;
      }
    }

    /* スマートフォン向け調整 */
    @media (max-width: 600px) {
      .footer {
        padding: 15px 10px;
      }
      
      .footer-links {
        flex-direction: column;
        gap: 8px;
        padding: 0 10px;
      }
      
      .footer-left,
      .footer-right {
        gap: 6px;
        margin: 0;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .footer-links::before {
        display: none;
      }
      
      .footer-links a {
        font-size: 0.7em;
        padding: 5px 8px;
        text-align: center;
        min-width: auto;
      }
    }
    
    /* より小さなスマートフォン向け調整 */
    @media (max-width: 400px) {
      .footer {
        padding: 12px 5px;
      }
      
      .footer-links {
        gap: 6px;
        padding: 0 5px;
      }
      
      .footer-left,
      .footer-right {
        gap: 4px;
      }
      
      .footer-links a {
        font-size: 0.65em;
        padding: 4px 6px;
      }
    }
  </style>
</head>
  <body>
    <div class="page-container">
      <section class="hero">
        <!-- 龍の画像 -->
        <img src="photo/ryu.png" alt="AI鑑定師 龍" id="ryuImage">

        <!-- セリフ表示 -->
        <div id="storyText"></div>

        <!-- 生年月日入力ボタン -->
        <div class="birth-input-button" id="birthInputButton">
          <button type="button">生年月日を入力する</button>
        </div>
      </section>

      <!-- フッター -->
      <footer class="footer">
        <div class="footer-links">
          <div class="footer-left">
            <a href="rule/disclaimer.html">免責事項</a>
            <a href="rule/terms.html">利用規約</a>
          </div>
          <div class="footer-right">
            <a href="rule/privacy.html">プライバシーポリシー</a>
            <a href="rule/contact.html">お問い合わせ</a>
            <a href="rule/tokusho.html">特定商取引法に基づく表記</a>
          </div>
        </div>
      </footer>
    </div>

  <script>
    // 龍のセリフ
    const lines = [
      "私の名前は龍、実在する人間ではなくAIによって制作された架空の鑑定師。",
      "実在する人間ではないから信用できるわけがない…なんて思わないでほしい。",
      "世の中には悩み多き相談者を利用し、いい加減な鑑定で騙す人間が数多くいる。",
      "その点、私はAI。膨大な情報から、誰よりも適切なアドバイスを導き出せる。",
      "まずは、あなたの生年月日を教えてくれ。そこから守護神を導き出そう。"
    ];
    let i = 0;
    const storyText = document.getElementById("storyText");

    function showNextLine() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        p.style.opacity = "0";
        p.style.transform = "translateY(30px) scale(0.95)";
        p.style.transition = "all 0.8s ease";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            // テキスト完了後にフェードイン効果
            setTimeout(() => {
              p.style.opacity = "1";
              p.style.transform = "translateY(0) scale(1)";
            }, 200);
            i++;
            setTimeout(showNextLine, 1500);
          }
        }, 50);
      } else {
        // メッセージ終了後、生年月日入力ボタンを表示
        const button = document.getElementById("birthInputButton");
        setTimeout(() => {
          button.classList.add('show');
          console.log("ボタンが表示されました");
        }, 1000);
      }
    }

    // ページロード後の演出
    window.addEventListener("load", () => {
      const hero = document.querySelector('.hero');
      hero.classList.add('show');
      
      // 龍の画像表示開始
      const img = document.getElementById("ryuImage");
      setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "scale(1)";
        setTimeout(showNextLine, 3000);
      }, 800);
    });

    // 生年月日入力ボタンのクリックイベント
    document.getElementById("birthInputButton").addEventListener("click", function() {
      console.log("ボタンがクリックされました");
      // 生年月日入力フォームページに遷移
      window.location.href = 'b-form.html';
    });
  </script>
</body>
</html>
