<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: relative;
      min-height: 100vh;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    
    .birth-form {
      width: 90%;
      max-width: 400px;
      text-align: center;
      padding: 30px;
      background: rgba(13, 13, 26, 0.95);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    
    .birth-form h3 { 
      color: #66ccff; 
      margin-bottom: 20px; 
      font-size: 1.3em; 
    }
    
    .birth-form label { 
      display: block; 
      margin: 10px 0 5px; 
      color: #99ccff; 
      text-align: left; 
      font-weight: bold; 
    }
    
    .birth-form select {
      padding: 12px; 
      margin-bottom: 15px; 
      border-radius: 6px;
      border: 1px solid rgba(102,204,255,0.3);
      font-size: 1em; 
      background: rgba(255,255,255,0.1); 
      color: #fff;
      width: 100%; 
      max-width: 150px; 
      cursor: pointer;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 16px;
      padding-right: 30px;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }
    
    .birth-form select option {
      background: #0d0d1a !important;
      color: #fff !important;
      padding: 8px;
      font-size: 1em;
    }
    
    .form-row { 
      display: flex; 
      justify-content: space-between; 
      gap: 10px; 
      margin-bottom: 20px; 
    }
    
    .form-group { 
      flex: 1; 
      text-align: center; 
    }
    
    .birth-form button {
      padding: 16px 40px; 
      font-size: 1.3em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none; 
      border-radius: 8px; 
      font-weight: bold;
      cursor: pointer; 
      color: #000; 
      width: 100%; 
      max-width: 300px;
      margin-top: 10px; 
      transition: all 0.3s ease;
    }
    
    .birth-form button:hover { 
      background: linear-gradient(90deg, #99e0ff, #66ccff); 
      transform: scale(1.05); 
    }
    
    /* デバッグ情報表示 */
    .debug-info {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff00;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      max-width: 300px;
      z-index: 9999;
      white-space: pre-line;
    }
    
    .test-button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
    
    .status-ok { background-color: #00ff00; }
    .status-error { background-color: #ff0000; }
    .status-warning { background-color: #ffff00; }
  </style>
</head>
<body>
  
  <div class="container">
    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <h3>あなたの生年月日を教えてください</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="year">西暦</label>
          <select id="year" required>
            <option value="">読み込み中...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="month">月</label>
          <select id="month" required>
            <option value="">読み込み中...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="day">日</label>
          <select id="day" required>
            <option value="">読み込み中...</option>
          </select>
        </div>
      </div>
      <button type="button" class="test-button" onclick="testSelectBoxes()">セレクトボックステスト</button>
      <button type="button" class="test-button" onclick="reinitialize()">再初期化</button>
      <button type="submit">守護神を導き出す</button>
    </form>
  </div>
  
  <!-- デバッグ情報表示 -->
  <div class="debug-info" id="debugInfo">
    <strong>デバッグ情報</strong>
    <div id="debugContent">初期化中...</div>
  </div>
  
  <script>
    // デバッグ情報を表示する関数
    function updateDebugInfo(message) {
      console.log('[DEBUG]', message);
      const debugContent = document.getElementById('debugContent');
      if (debugContent) {
        const timestamp = new Date().toLocaleTimeString();
        debugContent.innerHTML += `\n${timestamp}: ${message}`;
        debugContent.scrollTop = debugContent.scrollHeight;
      }
    }
    
    // 初期化フラグ
    let isInitialized = false;
    let initAttempts = 0;

    // セレクトボックスの状態をチェックする関数
    function checkSelectBoxStatus() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      const status = {
        year: {
          exists: !!yearSelect,
          optionsCount: yearSelect ? yearSelect.options.length : 0,
          hasEventListener: yearSelect ? yearSelect.onchange !== null : false
        },
        month: {
          exists: !!monthSelect,
          optionsCount: monthSelect ? monthSelect.options.length : 0,
          hasEventListener: monthSelect ? monthSelect.onchange !== null : false
        },
        day: {
          exists: !!daySelect,
          optionsCount: daySelect ? daySelect.options.length : 0,
          hasEventListener: daySelect ? daySelect.onchange !== null : false
        }
      };
      
      updateDebugInfo(`セレクトボックス状態:
年: 存在=${status.year.exists}, オプション数=${status.year.optionsCount}
月: 存在=${status.month.exists}, オプション数=${status.month.optionsCount}
日: 存在=${status.day.exists}, オプション数=${status.day.optionsCount}`);
      
      return status;
    }
    
    // セレクトボックスをテストする関数
    function testSelectBoxes() {
      updateDebugInfo('=== セレクトボックステスト開始 ===');
      
      const status = checkSelectBoxStatus();
      
      // 各セレクトボックスに手動でオプションを追加してテスト
      const yearSelect = document.getElementById("year");
      if (yearSelect) {
        updateDebugInfo('年セレクトボックスに手動でオプション追加中...');
        yearSelect.innerHTML = '<option value="">選択</option><option value="2000">2000年</option><option value="1990">1990年</option>';
        updateDebugInfo(`年のオプション数: ${yearSelect.options.length}`);
        
        // イベントリスナーを手動で追加
        yearSelect.onchange = function() {
          updateDebugInfo(`年が変更されました: ${this.value}`);
        };
      }
      
      const monthSelect = document.getElementById("month");
      if (monthSelect) {
        updateDebugInfo('月セレクトボックスに手動でオプション追加中...');
        monthSelect.innerHTML = '<option value="">選択</option><option value="1">1月</option><option value="12">12月</option>';
        updateDebugInfo(`月のオプション数: ${monthSelect.options.length}`);
        
        monthSelect.onchange = function() {
          updateDebugInfo(`月が変更されました: ${this.value}`);
        };
      }
      
      const daySelect = document.getElementById("day");
      if (daySelect) {
        updateDebugInfo('日セレクトボックスに手動でオプション追加中...');
        daySelect.innerHTML = '<option value="">選択</option><option value="1">1日</option><option value="31">31日</option>';
        updateDebugInfo(`日のオプション数: ${daySelect.options.length}`);
        
        daySelect.onchange = function() {
          updateDebugInfo(`日が変更されました: ${this.value}`);
        };
      }
      
      updateDebugInfo('=== テスト完了 - セレクトボックスを操作してください ===');
    }
    
    // 再初期化関数
    function reinitialize() {
      updateDebugInfo('=== 再初期化開始 ===');
      isInitialized = false;
      initAttempts = 0;
      initializeSelects();
    }

    // セレクトボックスの初期化関数
    function initializeSelects() {
      initAttempts++;
      updateDebugInfo(`初期化試行 #${initAttempts}`);
      
      // 重複実行防止
      if (isInitialized) {
        updateDebugInfo('既に初期化済み - スキップ');
        return;
      }
      
      updateDebugInfo('セレクトボックス初期化開始...');
      
      // 要素の存在確認
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      updateDebugInfo(`要素検索結果:
年: ${!!yearSelect}
月: ${!!monthSelect}  
日: ${!!daySelect}`);
      
      if (!yearSelect || !monthSelect || !daySelect) {
        if (initAttempts < 5) {
          updateDebugInfo(`要素が見つからない - 100ms後に再試行 (${initAttempts}/5)`);
          setTimeout(initializeSelects, 100);
        } else {
          updateDebugInfo('ERROR: 初期化に失敗 - 要素が見つかりません');
        }
        return;
      }
      
      try {
        // 初期化フラグを設定
        isInitialized = true;
        updateDebugInfo('初期化フラグ設定完了');
        
        // 年の選択肢を追加
        updateDebugInfo('年の選択肢追加中...');
        yearSelect.innerHTML = '<option value="">選択</option>';
        for (let y = 2025; y >= 1900; y--) {
          const opt = document.createElement("option");
          opt.value = y;
          opt.textContent = y + "年";
          yearSelect.appendChild(opt);
        }
        updateDebugInfo(`年の選択肢追加完了: ${yearSelect.options.length - 1}個`);
        
        // 月の選択肢を追加
        updateDebugInfo('月の選択肢追加中...');
        monthSelect.innerHTML = '<option value="">選択</option>';
        for (let m = 1; m <= 12; m++) {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m + "月";
          monthSelect.appendChild(opt);
        }
        updateDebugInfo(`月の選択肢追加完了: ${monthSelect.options.length - 1}個`);
        
        // 日の選択肢を追加
        updateDebugInfo('日の選択肢追加中...');
        daySelect.innerHTML = '<option value="">選択</option>';
        for (let d = 1; d <= 31; d++) {
          const opt = document.createElement("option");
          opt.value = d;
          opt.textContent = d + "日";
          daySelect.appendChild(opt);
        }
        updateDebugInfo(`日の選択肢追加完了: ${daySelect.options.length - 1}個`);
        
        // イベントリスナーの設定
        updateDebugInfo('イベントリスナー設定中...');
        setupEventListeners();
        
        updateDebugInfo('=== 初期化完了 ===');
        checkSelectBoxStatus();
        
      } catch (error) {
        updateDebugInfo(`ERROR: 初期化エラー - ${error.message}`);
        console.error('初期化エラー:', error);
        isInitialized = false;
      }
    }

    // イベントリスナーの設定
    function setupEventListeners() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      // 年の変更イベント
      if (yearSelect) {
        yearSelect.addEventListener("change", function() {
          updateDebugInfo(`年変更イベント発火: ${this.value}`);
          adjustDayOptions();
        });
        updateDebugInfo('年のイベントリスナー追加完了');
      }
      
      // 月の変更イベント
      if (monthSelect) {
        monthSelect.addEventListener("change", function() {
          updateDebugInfo(`月変更イベント発火: ${this.value}`);
          adjustDayOptions();
        });
        updateDebugInfo('月のイベントリスナー追加完了');
      }
      
      // 日の変更イベント
      if (daySelect) {
        daySelect.addEventListener("change", function() {
          updateDebugInfo(`日変更イベント発火: ${this.value}`);
        });
        updateDebugInfo('日のイベントリスナー追加完了');
      }
    }

    // 日の選択肢を調整する関数
    function adjustDayOptions() {
      updateDebugInfo('日付調整開始...');
      
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (!yearSelect || !monthSelect || !daySelect) {
        updateDebugInfo('ERROR: 日付調整 - 要素が見つかりません');
        return;
      }
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      
      updateDebugInfo(`日付調整: 年=${year}, 月=${month}`);
      
      if (!year || !month) {
        updateDebugInfo('年または月が未選択のため調整をスキップ');
        return;
      }
      
      const daysInMonth = new Date(year, month, 0).getDate();
      const currentDay = daySelect.value;
      
      updateDebugInfo(`${year}年${month}月の日数: ${daysInMonth}日`);
      
      // 日の選択肢を再生成
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= daysInMonth; d++) {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d + "日";
        daySelect.appendChild(opt);
      }
      
      updateDebugInfo(`日の選択肢更新完了: ${daySelect.options.length - 1}個`);
      
      // 以前選択されていた日が有効な範囲内であれば復元
      if (currentDay && parseInt(currentDay) <= daysInMonth) {
        daySelect.value = currentDay;
        updateDebugInfo(`日付復元: ${currentDay}日`);
      }
    }

    // フォーム送信処理
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      updateDebugInfo('フォーム送信イベント発火');
      
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      const year = yearSelect ? yearSelect.value : 'N/A';
      const month = monthSelect ? monthSelect.value : 'N/A';
      const day = daySelect ? daySelect.value : 'N/A';
      
      updateDebugInfo(`送信された値: 年=${year}, 月=${month}, 日=${day}`);
      
      if (!year || !month || !day) {
        updateDebugInfo('ERROR: 生年月日が未選択');
        alert("生年月日をすべて選択してください。");
        return;
      }
      
      alert(`選択された生年月日: ${year}年${month}月${day}日`);
    });

    // 初期化処理
    function initialize() {
      updateDebugInfo('=== アプリケーション開始 ===');
      updateDebugInfo(`ブラウザ: ${navigator.userAgent}`);
      updateDebugInfo(`画面サイズ: ${window.innerWidth}x${window.innerHeight}`);
      updateDebugInfo(`DOM状態: ${document.readyState}`);
      
      initializeSelects();
    }

    // DOMContentLoadedで初期化
    document.addEventListener("DOMContentLoaded", function() {
      updateDebugInfo('DOMContentLoadedイベント発火');
      initialize();
    });

    // 既にDOMが読み込まれている場合の対応
    if (document.readyState !== 'loading') {
      updateDebugInfo('DOM既に読み込み済み - 即座に初期化');
      initialize();
    } else {
      updateDebugInfo('DOM読み込み待機中...');
    }
  </script>
</body>
</html>
