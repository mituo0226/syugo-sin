<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    .birth-form {
      width: 90%;
      max-width: 400px;
      text-align: center;
      padding: 30px;
      background: rgba(13, 13, 26, 0.95);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .birth-form h3 { color: #66ccff; margin-bottom: 20px; font-size: 1.3em; }
    .birth-form label { display: block; margin: 10px 0 5px; color: #99ccff; text-align: left; font-weight: bold; }
    .birth-form select {
      padding: 12px; margin-bottom: 15px; border-radius: 6px;
      border: 1px solid rgba(102,204,255,0.3);
      font-size: 1em; background: rgba(255,255,255,0.1); color: #fff;
      width: 100%; max-width: 150px; cursor: pointer;
    }
    .form-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
    .form-group { flex: 1; text-align: center; }
    .birth-form button {
      padding: 16px 40px; font-size: 1.3em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none; border-radius: 8px; font-weight: bold;
      cursor: pointer; color: #000; width: 100%; max-width: 300px;
      margin-top: 10px; transition: all 0.3s ease;
    }
    .birth-form button:hover { background: linear-gradient(90deg, #99e0ff, #66ccff); transform: scale(1.05); }
    .back-button {
      position: absolute; top: 20px; left: 20px;
      background: rgba(13, 13, 26, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #99ccff; padding: 10px 15px; border-radius: 8px; cursor: pointer;
    }

    /* 鑑定結果表示 */
    .result { display:none; max-width:600px; margin:auto; background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.2); border-radius:12px; padding:20px;
      box-shadow:0 0 20px rgba(147,51,234,.4); position:relative; }
    img.guardian { width:120px; border-radius:50%; margin:10px auto; display:block; }
    .glow-text { animation:textGlow 2s ease-in-out infinite alternate; }
    @keyframes textGlow {
      0%{text-shadow:0 0 10px rgba(157,78,221,.8)}
      100%{text-shadow:0 0 20px rgba(157,78,221,1),0 0 30px rgba(199,125,255,.6)}
    }

    /* ローディング画面 */
    #loadingScreen { display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center;
      flex-direction:column; z-index:9999; }
    .loading-spinner{width:100px;height:100px;position:relative;margin:0 auto}
    .loading-spinner::before,.loading-spinner::after{
      content:'';position:absolute;width:100%;height:100%;border-radius:50%;
      background:conic-gradient(from 0deg,transparent,#9d4edd,#c77dff,#ff6b9d,transparent);
      animation:spiral 3s linear infinite
    }
    .loading-spinner::after{animation:spiral 2s linear infinite reverse;filter:blur(1px);opacity:.9;width:80%;height:80%;top:10%;left:10%}
    @keyframes spiral{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    #loadingScreen p{color:#fff;font-size:1.2em;margin-top:1em;animation:blink 1.5s infinite}
    @keyframes blink{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
  </style>
</head>
<body>
  <div class="container">
    <!-- 戻るボタン -->
    <button class="back-button" onclick="goBack()">← 戻る</button>
    
    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <h3>あなたの生年月日を教えてください</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="year">西暦</label>
          <select id="year" required></select>
        </div>
        <div class="form-group">
          <label for="month">月</label>
          <select id="month" required></select>
        </div>
        <div class="form-group">
          <label for="day">日</label>
          <select id="day" required></select>
        </div>
      </div>
      <button type="submit">守護神を導き出す</button>
    </form>

    <!-- ローディング画面 -->
    <div id="loadingScreen">
      <div class="loading-spinner"></div>
      <p>神託を降ろしています…</p>
    </div>

    <!-- 鑑定結果 -->
    <div class="result" id="resultBox">
      <h1 class="glow-text">神託</h1>
      <div id="guardian"></div>
      <p id="oracle"></p>
      <p><a id="detailLink" class="glow-text" style="color:#9d4edd;cursor:pointer;">さらに詳しく運命を占う</a></p>
    </div>
  </div>
  
  <script>
    // 初期化
    function initializeSelects() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">選択</option>';
      for (let y = 2025; y >= 1900; y--) {
        const opt = document.createElement("option");
        opt.value = y; opt.textContent = y + "年"; yearSelect.appendChild(opt);
      }
      const monthSelect = document.getElementById("month");
      monthSelect.innerHTML = '<option value="">選択</option>';
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement("option");
        opt.value = m; opt.textContent = m + "月"; monthSelect.appendChild(opt);
      }
      const daySelect = document.getElementById("day");
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement("option");
        opt.value = d; opt.textContent = d + "日"; daySelect.appendChild(opt);
      }
    }
    function goBack(){ window.location.href='index.html'; }

    // 守護神データ
    const guardians = {
      '子':{name:'千手観音',desc:'無限の慈悲をもって汝を抱擁する者なり',image:'syugo-son/photo/senju.jpg'},
      '丑':{name:'虚空蔵菩薩',desc:'無尽の智慧を授けし導き手なり',image:'syugo-son/photo/kokuzo.jpg'},
      '寅':{name:'虚空蔵菩薩',desc:'無尽の智慧を授けし導き手なり',image:'syugo-son/photo/kokuzo.jpg'},
      '卯':{name:'文殊菩薩',desc:'智慧の剣をもって迷いを断つ者なり',image:'syugo-son/photo/monju.jpg'},
      '辰':{name:'普賢菩薩',desc:'実践の徳を授ける者なり',image:'syugo-son/photo/fugen.jpg'},
      '巳':{name:'普賢菩薩',desc:'実践の徳を授ける者なり',image:'syugo-son/photo/fugen.jpg'},
      '午':{name:'勢至菩薩',desc:'智慧の光を放ち衆生を救う者なり',image:'syugo-son/photo/seishi.jpg'},
      '未':{name:'大日如来',desc:'宇宙の理をもって全てを照らす者なり',image:'syugo-son/photo/dainichi.jpg'},
      '申':{name:'大日如来',desc:'宇宙の理をもって全てを照らす者なり',image:'syugo-son/photo/dainichi.jpg'},
      '酉':{name:'不動明王',desc:'不動の意志にて悪を退ける者なり',image:'syugo-son/photo/fudo.jpg'},
      '戌':{name:'阿弥陀如来',desc:'無量の慈悲をもって救済する者なり',image:'syugo-son/photo/amida.jpg'},
      '亥':{name:'阿弥陀如来',desc:'無量の慈悲をもって救済する者なり',image:'syugo-son/photo/amida.jpg'}
    };
    const zodiacs = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const monthTraits = {1:"寒月に生まれし静謐の心を持ち",2:"雪解けを待つ忍耐の徳を授かり",3:"芽吹きの息吹を宿す魂を抱き",4:"萌ゆる命の躍動を胸に刻み",5:"薫風と共に歩む軽やかな心を携え",6:"豊穣の光を授かる運命に生まれ",7:"深き水面の如き洞察を得て",8:"烈日の炎に祝福されし者なり",9:"実りの秋に育まれし叡智を持ち",10:"黄昏に咲く決意の花を宿し",11:"夜霜をも溶かす感受性を抱き",12:"雪華の中に咲く慈愛の心を備える"};
    const dayTraits = {1:"新たなる道を拓く先駆者なり",2:"調和を重んじる清き心を持つ者",3:"喜びを分かち合う光の使い",4:"堅実に積み上げる力を授かりし者",5:"自由と変化を愛する風の魂",6:"慈しみ深き慈悲の持ち主",7:"深遠なる洞察を授かる者",8:"権威と達成の星を宿す者",9:"無私の奉仕を選びし者",11:"霊性に目覚めし導き手",22:"大いなる責務を担う魂"};

    // タイプライター効果
    function typeWriter(el, text, speed=50){ let i=0; el.innerHTML=''; (function t(){ if(i<text.length){ el.innerHTML+=text.charAt(i++); setTimeout(t,speed);} })(); }

    // フォーム送信処理
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const y = parseInt(document.getElementById("year").value);
      const m = parseInt(document.getElementById("month").value);
      const d = parseInt(document.getElementById("day").value);
      if (!y || !m || !d) { alert("すべての項目を選択してください。"); return; }

      // 鑑定中アニメーション開始
      document.getElementById("birthForm").style.display="none";
      const loading = document.getElementById("loadingScreen");
      loading.style.display="flex";

      // 3秒後に結果表示
      setTimeout(()=>{
        loading.style.display="none";
        const zodiac = zodiacs[(y - 4) % 12];
        const guardian = guardians[zodiac];
        const monthText = monthTraits[m] || "";
        const dayText = dayTraits[d] || "独自の使命を携えし者";
        document.getElementById("guardian").innerHTML =
          `<img class="guardian" src="${guardian.image}" alt="${guardian.name}">
           <div><strong class="glow-text">そなたを守護するは ${guardian.name}</strong></div>
           <div>${guardian.desc}</div>`;
        const oracleText = `「汝に告ぐ
  ${guardian.name}は常にそなたを見守り
  心弱き時には慈悲を注ぎ
  道を誤る時には智慧の灯を掲げん

  ${m}月に生まれし汝
  ${monthText}

  生まれしその日は「${d}」
  ${dayText}

  この運命を胸に刻み
  恐れることなく進むがよい
  汝の歩む道は
  光と共に在る」`;
        document.getElementById("resultBox").style.display="block";
        typeWriter(document.getElementById("oracle"), oracleText, 70);
        document.getElementById("detailLink").onclick=()=>{ window.location.href=`confirm.html?year=${y}&month=${m}&day=${d}`; }
      },3000);
    });

    window.addEventListener("load", initializeSelects);
  </script>
</body>
</html>
