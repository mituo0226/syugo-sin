<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;

    /* 龍と守護神の表示スタイル */
    .dragon-reveal {
      text-align: center;
      margin-bottom: 40px;
      animation: dragonAppear 2s ease-in-out;
    }
    
    .dragon-image {
      max-width: 100px;

      border-radius: 10px;

    .dragon-placeholder {

    @keyframes dragonAppear {
      0% {

      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

    @keyframes dragonGlow {
      0% {

      100% {

    /* ローディング画面 */

    }

      animation:spiral 2s linear infinite reverse;

    @keyframes spiral{

<body>

  
  <div class="container">

    
    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <h3>あなたの生年月日を教えてください</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="year">西暦</label>
          <select id="year" required>
            <option value="">選択</option>
          </select>
        </div>
        <div class="form-group">
          <label for="month">月</label>
          <select id="month" required>
            <option value="">選択</option>
          </select>
        </div>
        <div class="form-group">
          <label for="day">日</label>
          <select id="day" required>
            <option value="">選択</option>
          </select>
        </div>
      </div>
      <button type="submit">守護神を導き出す</button>
    </form>

    <!-- ローディング画面 -->
    <div id="loadingScreen">
      <div class="loading-spinner"></div>
      <p>神託を降ろしています…</p>
    </div>

    <!-- 鑑定結果 -->
    <div class="result" id="resultBox">
      <h2 class="glow-text">あなたの守護神を伝えよう･･･</h2>
      <div id="guardian"></div>
      <p id="oracle"></p>

    </div>
  </div>
  
  <script>

     
     // 守護神の言葉ページに移動する関数
     function goToGuardianMessage(guardianName, zodiacSign) {
       console.log('goToGuardianMessage called with:', guardianName, zodiacSign);
       // URLパラメータとして守護神の情報を渡す
       const params = new URLSearchParams({
         name: guardianName,
         zodiac: zodiacSign
       });
       const url = `syugo-sin.html?${params.toString()}`;
       console.log('Redirecting to:', url);
       window.location.href = url;
     }

    // セレクトボックスの初期化関数
    function initializeSelects() {
      console.log('Initializing select boxes...');
      
      try {
        // 年の選択肢を追加
        const yearSelect = document.getElementById("year");
        if (yearSelect) {
          yearSelect.innerHTML = '<option value="">選択</option>';
          for (let y = 2025; y >= 1900; y--) {
            const opt = document.createElement("option");
            opt.value = y;
            opt.textContent = y + "年";
            yearSelect.appendChild(opt);
          }
          console.log('Year select initialized with', yearSelect.children.length - 1, 'options');
        } else {
          console.error('Year select element not found');
        }
        
        // 月の選択肢を追加
        const monthSelect = document.getElementById("month");
        if (monthSelect) {
          monthSelect.innerHTML = '<option value="">選択</option>';
          for (let m = 1; m <= 12; m++) {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m + "月";
            monthSelect.appendChild(opt);
          }
          console.log('Month select initialized with', monthSelect.children.length - 1, 'options');
        } else {
          console.error('Month select element not found');
        }
        
        // 日の選択肢を追加
        const daySelect = document.getElementById("day");
        if (daySelect) {
          daySelect.innerHTML = '<option value="">選択</option>';
          for (let d = 1; d <= 31; d++) {
            const opt = document.createElement("option");
            opt.value = d;
            opt.textContent = d + "日";
            daySelect.appendChild(opt);
          }
          console.log('Day select initialized with', daySelect.children.length - 1, 'options');
        } else {
          console.error('Day select element not found');
        }
        
        // イベントリスナーの設定
        setupEventListeners();
        
      } catch (error) {
        console.error('Error in initializeSelects:', error);
      }
    }

    // イベントリスナーの設定
    function setupEventListeners() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (monthSelect) {
        monthSelect.addEventListener("change", function() {
          adjustDayOptions();
          validateCurrentInput();
        });
      }
      
      if (yearSelect) {
        yearSelect.addEventListener("change", function() {
          adjustDayOptions();
          validateCurrentInput();
        });
      }
      
      if (daySelect) {
        daySelect.addEventListener("change", function() {
          validateCurrentInput();
        });
      }
    }

    // 日の選択肢を調整する関数
    function adjustDayOptions() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (!yearSelect || !monthSelect || !daySelect) return;
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      
      if (!year || !month) return;
      
      const daysInMonth = new Date(year, month, 0).getDate();
      
      // 現在選択されている日を保存
      const currentDay = daySelect.value;
      
      // 日の選択肢を再生成
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= daysInMonth; d++) {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d + "日";
        daySelect.appendChild(opt);
      }
      
      // 以前選択されていた日が有効な範囲内であれば復元
      if (currentDay && parseInt(currentDay) <= daysInMonth) {
        daySelect.value = currentDay;
      }
    }

    // 現在の入力を検証する関数
    function validateCurrentInput() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (!yearSelect || !monthSelect || !daySelect) return;
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      const day = parseInt(daySelect.value);
      
      // すべての値が選択されている場合のみ検証
      if (year && month && day) {
        const inputDate = new Date(year, month - 1, day);
        const today = new Date();
        
        // 日付が有効かチェック
        if (inputDate.getFullYear() !== year || 
            inputDate.getMonth() !== month - 1 || 
            inputDate.getDate() !== day) {
          showErrorMessage("無効な日付です。");
          return false;
        }
        
        // 未来の日付かチェック
        if (inputDate > today) {
          showErrorMessage("未来の日付は選択できません。");
          return false;
        }
        
        // 年齢制限チェック（120歳以上）
        const age = today.getFullYear() - year;
        if (age > 120) {
          showErrorMessage("120歳以上の方は選択できません。");
          return false;
        }
        
        clearErrorDisplay();
        return true;
      }
      
      return false;
    }

        text-align: center;

      `;
      errorDiv.textContent = message;

      [yearSelect, monthSelect, daySelect].forEach(select => {

          select.style.boxShadow = "0 0 10px rgba(255, 107, 107, 0.5)";
