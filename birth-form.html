<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: relative;
      min-height: 100vh;
    }
    
    /* 神秘的な光の演出 */
    #mysticalEffect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 2s ease-in-out;
      pointer-events: none;
    }
    
    #mysticalEffect.show {
      opacity: 1;
    }
    
    .light-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #66ccff, transparent),
        radial-gradient(2px 2px at 40px 70px, #3399ff, transparent),
        radial-gradient(1px 1px at 90px 40px, #99e0ff, transparent),
        radial-gradient(1px 1px at 130px 80px, #66ccff, transparent),
        radial-gradient(2px 2px at 160px 30px, #3399ff, transparent);
      background-repeat: repeat;
      background-size: 200px 100px;
      animation: particleFloat 8s linear infinite;
    }
    
    @keyframes particleFloat {
      0% {
        transform: translateY(0px);
      }
      100% {
        transform: translateY(-100px);
      }
    }
    
    .energy-field {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 2px solid rgba(102, 204, 255, 0.6);
      border-radius: 50%;
      animation: energyPulse 3s ease-in-out infinite;
      box-shadow: 
        0 0 20px rgba(102, 204, 255, 0.4),
        inset 0 0 20px rgba(102, 204, 255, 0.2);
    }
    
    @keyframes energyPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }
    
    /* 龍と守護神の表示スタイル */
    .dragon-reveal {
      text-align: center;
      margin-bottom: 20px;
      animation: dragonAppear 2s ease-in-out;
    }
    
    .dragon-image {
      max-width: 150px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(102, 204, 255, 0.6);
      animation: dragonGlow 3s ease-in-out infinite alternate;
    }
    
    .dragon-placeholder {
      font-size: 4em;
      animation: dragonGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes dragonAppear {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(50px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    @keyframes dragonGlow {
      0% {
        filter: brightness(1) drop-shadow(0 0 10px rgba(102, 204, 255, 0.5));
      }
      100% {
        filter: brightness(1.3) drop-shadow(0 0 20px rgba(102, 204, 255, 0.8));
      }
    }
    
    .guardian-reveal {
      animation: guardianAppear 2s ease-in-out 0.5s both;
    }
    
    @keyframes guardianAppear {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(30px);

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);

<body>
  <!-- 神秘的な光の演出 -->
  <div id="mysticalEffect">
    <div class="light-particles"></div>
    <div class="energy-field"></div>
  </div>
  
  <div class="container">
    <!-- 戻るボタン -->
    <button class="back-button" onclick="goBack()">← 戻る</button>
    
    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <h3>あなたの生年月日を教えてください</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="year">西暦</label>
          <select id="year" required></select>
        </div>
        <div class="form-group">
          <label for="month">月</label>
          <select id="month" required></select>
        </div>
        <div class="form-group">
          <label for="day">日</label>
          <select id="day" required></select>
        </div>
      </div>
      <button type="submit">守護神を導き出す</button>
    </form>

    <!-- ローディング画面 -->
    <div id="loadingScreen">
      <div class="loading-spinner"></div>
      <p>神託を降ろしています…</p>
    </div>

    <!-- 鑑定結果 -->
    <div class="result" id="resultBox">
      <h1 class="glow-text">神託</h1>
      <div id="guardian"></div>
      <p id="oracle"></p>
      <p><a id="detailLink" class="glow-text" style="color:#9d4edd;cursor:pointer;">さらに詳しく運命を占う</a></p>
    </div>
  </div>
  
  <script>
    // ボタンをクリックしたらアラートを出す処理
        // フォーム送信時に入力が空ならエラーを表示 
    // 初期化
    function initializeSelects() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">選択</option>';
      for (let y = 2025; y >= 1900; y--) {
        const opt = document.createElement("option");
        opt.value = y; opt.textContent = y + "年"; yearSelect.appendChild(opt);
      }
      const monthSelect = document.getElementById("month");
      monthSelect.innerHTML = '<option value="">選択</option>';
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement("option");
        opt.value = m; opt.textContent = m + "月"; monthSelect.appendChild(opt);
      }
      const daySelect = document.getElementById("day");
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement("option");
        opt.value = d; opt.textContent = d + "日"; daySelect.appendChild(opt);
      }
      
      // リアルタイムバリデーションの設定
      setupRealTimeValidation();
    }
    
    // リアルタイムバリデーション設定
    function setupRealTimeValidation() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      // 月が変更されたときに日の選択肢を調整
      monthSelect.addEventListener("change", function() {
        adjustDayOptions();
        validateCurrentInput();
      });
      
      // 年が変更されたときに日の選択肢を調整（うるう年のため）
      yearSelect.addEventListener("change", function() {
        adjustDayOptions();
        validateCurrentInput();
      });
      
      // 日が変更されたときにバリデーション
      daySelect.addEventListener("change", function() {
        validateCurrentInput();
      });
    }
    
    // 日の選択肢を調整（うるう年と月の日数に応じて）
    function adjustDayOptions() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      
      if (!year || !month) {
        // 年または月が選択されていない場合は31日まで表示
        daySelect.innerHTML = '<option value="">選択</option>';
        for (let d = 1; d <= 31; d++) {
          const opt = document.createElement("option");
          opt.value = d; opt.textContent = d + "日"; daySelect.appendChild(opt);
        }
        return;
      }
      
      // 選択された年月の日数を計算
      const daysInMonth = new Date(year, month, 0).getDate();
      
      // 日の選択肢を再構築
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= daysInMonth; d++) {
        const opt = document.createElement("option");
        opt.value = d; opt.textContent = d + "日"; daySelect.appendChild(opt);
      }
    }
    
    // 現在の入力値をリアルタイムでバリデーション
    function validateCurrentInput() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      const y = parseInt(yearSelect.value);
      const m = parseInt(monthSelect.value);
      const d = parseInt(daySelect.value);
      
      // すべての値が入力されている場合のみバリデーション
      if (y && m && d) {
        // 日付の妥当性チェック
        const date = new Date(y, m - 1, d);
        if (date.getFullYear() === y && date.getMonth() === m - 1 && date.getDate() === d) {
          // 有効な日付の場合、エラー表示をクリア
          clearErrorDisplay();
        }
      }
    }
    function goBack(){ window.location.href='index.html'; }

    // エラーメッセージ表示関数
    function showErrorMessage(message) {
      // 既存のエラーメッセージを削除
      const existingError = document.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }
      
      // 新しいエラーメッセージを作成
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      errorDiv.style.cssText = `
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 8px;
        padding: 12px;
        margin: 15px 0;
        text-align: center;
        font-weight: bold;
        animation: errorShake 0.5s ease-in-out;
      `;
      
      // フォームの前に挿入
      const form = document.getElementById('birthForm');
      form.parentNode.insertBefore(errorDiv, form);
      
      // エラーメッセージまでスクロール
      setTimeout(() => {
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
    
    // エラーフィールドのハイライト関数
    function highlightErrorFields(yearSelect, monthSelect, daySelect, y, m, d) {
      // すべてのエラーハイライトをクリア
      clearErrorHighlights();
      
      // エラーのある項目をハイライト
      if (!y) yearSelect.style.borderColor = '#ff6b6b';
      if (!m) monthSelect.style.borderColor = '#ff6b6b';
      if (!d) daySelect.style.borderColor = '#ff6b6b';
      
      // 値はあるが範囲外の場合
      if (y && (y < 1900 || y > new Date().getFullYear())) yearSelect.style.borderColor = '#ff6b6b';
      if (m && (m < 1 || m > 12)) monthSelect.style.borderColor = '#ff6b6b';
      if (d && (d < 1 || d > 31)) daySelect.style.borderColor = '#ff6b6b';
      
      // 存在しない日付の場合
      if (y && m && d) {
        const date = new Date(y, m - 1, d);
        if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) {
          yearSelect.style.borderColor = '#ff6b6b';
          monthSelect.style.borderColor = '#ff6b6b';
          daySelect.style.borderColor = '#ff6b6b';
        }
      }
    }
    
    // エラーハイライトをクリアする関数
    function clearErrorHighlights() {
      const selects = document.querySelectorAll('#year, #month, #day');
      selects.forEach(select => {
        select.style.borderColor = 'rgba(102,204,255,0.3)';
      });
    }
    
    // エラー表示をクリアする関数
    function clearErrorDisplay() {
      const existingError = document.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }
      const existingSuccess = document.querySelector('.success-message');
      if (existingSuccess) {
        existingSuccess.remove();
      }
      clearErrorHighlights();
    }

         // タイプライター表示効果
     function typeWriter(el, text, speed=100) {
       el.innerHTML = '';
       el.style.opacity = '1';
       el.style.transform = 'translateY(0)';
       
       let i = 0;
       function type() {
         if (i < text.length) {
           el.innerHTML += text.charAt(i);
           i++;
           setTimeout(type, speed);
         } else {
           // タイプライター完了後に再度スクロールして文章全体を表示
           setTimeout(() => {
             el.scrollIntoView({ 
               behavior: 'smooth', 
               block: 'center' 
             });
           }, 500);
         }
       }
       
       setTimeout(type, 200);
     }

      // 値の取得と変換
      const y = parseInt(yearSelect.value);
      const m = parseInt(monthSelect.value);
      const d = parseInt(daySelect.value);
      
      // 入力値の検証
      let isValid = true;
      let errorMessage = "";
      
      // 1. 必須項目チェック
      if (!y || !m || !d) {
        isValid = false;
        errorMessage = "すべての項目を選択してください。";
      }
      
      // 2. 年齢範囲チェック（1900年〜現在）
      if (isValid && (y < 1900 || y > new Date().getFullYear())) {
        isValid = false;
        errorMessage = "生年は1900年から現在の年までで選択してください。";
      }
      
      // 3. 月の範囲チェック
      if (isValid && (m < 1 || m > 12)) {
        isValid = false;
        errorMessage = "月は1月から12月までで選択してください。";
      }
      
      // 4. 日の範囲チェック（基本的な範囲）
      if (isValid && (d < 1 || d > 31)) {
        isValid = false;
        errorMessage = "日は1日から31日までで選択してください。";
      }
      
      // 5. 日付の妥当性チェック（存在する日付かどうか）
      if (isValid) {
        const date = new Date(y, m - 1, d);
        if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) {
          isValid = false;
          errorMessage = "存在しない日付です。正しい日付を選択してください。";
        }
      }
      
      // 6. 未来の日付チェック
      if (isValid) {
        const today = new Date();
        today.setHours(0, 0, 0, 0); // 時刻をリセットして日付のみで比較
        const inputDate = new Date(y, m - 1, d);
        if (inputDate > today) {
          isValid = false;
          errorMessage = "未来の日付は選択できません。";
        }
      }
      
      // 7. 極端に古い日付のチェック（120歳以上）
      if (isValid) {
        const today = new Date();
        const age = today.getFullYear() - y;
        if (age > 120) {
          isValid = false;
          errorMessage = "生年が古すぎます。正しい生年を入力してください。";
        }
      }
      
      // エラーがある場合は処理を停止
      if (!isValid) {
        // エラーメッセージを表示
        showErrorMessage(errorMessage);
        
        // エラーのある項目をハイライト
        highlightErrorFields(yearSelect, monthSelect, daySelect, y, m, d);
        
        return;
      }
      
      // バリデーション成功時の処理
      clearErrorDisplay();
      
      // 成功メッセージを表示（オプション）
      showSuccessMessage();
