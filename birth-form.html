<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    .birth-form {
      width: 90%;
      max-width: 400px;
      text-align: center;
      padding: 30px;
      background: rgba(13, 13, 26, 0.95);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .birth-form h3 { color: #66ccff; margin-bottom: 20px; font-size: 1.3em; }
    .birth-form label { display: block; margin: 10px 0 5px; color: #99ccff; text-align: left; font-weight: bold; }
    .birth-form select {
      padding: 12px; margin-bottom: 15px; border-radius: 6px;
      border: 1px solid rgba(102,204,255,0.3);
      font-size: 1em; background: rgba(255,255,255,0.1); color: #fff;
      width: 100%; max-width: 150px; cursor: pointer;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 16px;
      padding-right: 30px;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }
    .form-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
    .form-group { flex: 1; text-align: center; }
    .birth-form button {
      padding: 16px 40px; font-size: 1.3em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none; border-radius: 8px; font-weight: bold;
      cursor: pointer; color: #000; width: 100%; max-width: 300px;
      margin-top: 10px; transition: all 0.3s ease;
    }
    .birth-form button:hover { background: linear-gradient(90deg, #99e0ff, #66ccff); transform: scale(1.05); }
    .back-button {
      position: absolute; top: 20px; left: 20px;
      background: rgba(13, 13, 26, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #99ccff; padding: 10px 15px; border-radius: 8px; cursor: pointer;
    }

               /* 鑑定結果表示 */
      .result { display:none; max-width:600px; margin:auto; background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.2); border-radius:12px; padding:20px;
        box-shadow:0 0 20px rgba(147,51,234,.4); position:relative; }
             #oracle {
         line-height: 1.8;
         font-size: 1.1em;
         text-align: left;
         white-space: pre-line;
         opacity: 0;
         transform: translateY(20px);
         transition: opacity 0.8s ease-out, transform 0.8s ease-out;
       }
     img.guardian { 
       width:120px; 
       border-radius:50%; 
       margin:10px auto; 
       display:block; 
       animation: guardianGlow 3s ease-in-out infinite alternate, guardianFloat 4s ease-in-out infinite;
       box-shadow: 0 0 30px rgba(102, 204, 255, 0.6), 0 0 60px rgba(157, 78, 221, 0.4);
     }
     @keyframes guardianGlow {
       0% { 
         box-shadow: 0 0 20px rgba(102, 204, 255, 0.4), 0 0 40px rgba(157, 78, 221, 0.3);
         filter: brightness(1);
       }
       100% { 
         box-shadow: 0 0 40px rgba(102, 204, 255, 0.8), 0 0 80px rgba(157, 78, 221, 0.6);
         filter: brightness(1.2);
       }
     }
     @keyframes guardianFloat {
       0%, 100% { transform: translateY(0px) rotate(0deg); }
       25% { transform: translateY(-3px) rotate(0.5deg); }
       50% { transform: translateY(-5px) rotate(0deg); }
       75% { transform: translateY(-3px) rotate(-0.5deg); }
     }
    .glow-text { animation:textGlow 2s ease-in-out infinite alternate; }
    @keyframes textGlow {
      0%{text-shadow:0 0 10px rgba(157,78,221,.8)}
      100%{text-shadow:0 0 20px rgba(157,78,221,1),0 0 30px rgba(199,125,255,.6)}
    }

                   /* ローディング画面 */
      #loadingScreen { 
        display:none; 
        position:fixed; 
        top:0; 
        left:0; 
        right:0; 
        bottom:0;
        background:rgba(0,0,0,.8); 
        align-items:center; 
        justify-content:center;
        flex-direction:column; 
        z-index:9999; 
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
      }
      #loadingScreen.show {
        opacity: 1;
      }
    .loading-spinner{width:100px;height:100px;position:relative;margin:0 auto}
    .loading-spinner::before,.loading-spinner::after{
      content:'';position:absolute;width:100%;height:100%;border-radius:50%;
      background:conic-gradient(from 0deg,transparent,#9d4edd,#c77dff,#ff6b9d,transparent);
      animation:spiral 3s linear infinite
    }
    .loading-spinner::after{animation:spiral 2s linear infinite reverse;filter:blur(1px);opacity:.9;width:80%;height:80%;top:10%;left:10%}
    @keyframes spiral{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    #loadingScreen p{color:#fff;font-size:1.2em;margin-top:1em;animation:blink 1.5s infinite}
    @keyframes blink{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
    
         /* iPhone向け調整 */

       body {

      }
      .birth-form button {

      }
      .form-row {
        flex-direction: column;

      }
      .form-group {

      }

       }
      .result {
        padding: 15px;
        margin: 10px;
      }
             .guardian {

         animation: guardianGlow 3s ease-in-out infinite alternate, guardianFloat 4s ease-in-out infinite;
         box-shadow: 0 0 20px rgba(102, 204, 255, 0.6), 0 0 40px rgba(157, 78, 221, 0.4) !important;
       }
    }
    
         /* iPhone X以降のノッチ対応 */
     @supports (padding: max(0px)) {
       .container {
         padding-top: max(40px, env(safe-area-inset-top));
         padding-bottom: max(20px, env(safe-area-inset-bottom));
       }
       .back-button {
         top: max(10px, env(safe-area-inset-top) + 5px);
         left: max(15px, env(safe-area-inset-left) + 5px);
       }
     }
  </style>
</head>
<body>
  <div class="container">
    <!-- 戻るボタン -->
    <button class="back-button" onclick="goBack()">← 戻る</button>
    
    <!-- 生年月日入力フォーム -->

      <button type="submit">守護神を導き出す</button>

    <div id="loadingScreen">
      <div class="loading-spinner"></div>

    <!-- 鑑定結果 -->

  </div>
  
  <script>
    // 初期化
    function initializeSelects() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">選択</option>';
      for (let y = 2025; y >= 1900; y--) {
        const opt = document.createElement("option");
        opt.value = y; opt.textContent = y + "年"; yearSelect.appendChild(opt);
      }
      const monthSelect = document.getElementById("month");
      monthSelect.innerHTML = '<option value="">選択</option>';
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement("option");
        opt.value = m; opt.textContent = m + "月"; monthSelect.appendChild(opt);
      }
      const daySelect = document.getElementById("day");
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement("option");
        opt.value = d; opt.textContent = d + "日"; daySelect.appendChild(opt);
      }
    }
    function goBack(){ window.location.href='index.html'; }

                   // 守護神データ

    const monthTraits = {1:"寒月に生まれし静謐の心を持ち",2:"雪解けを待つ忍耐の徳を授かり",3:"芽吹きの息吹を宿す魂を抱き",4:"萌ゆる命の躍動を胸に刻み",5:"薫風と共に歩む軽やかな心を携え",6:"豊穣の光を授かる運命に生まれ",7:"深き水面の如き洞察を得て",8:"烈日の炎に祝福されし者なり",9:"実りの秋に育まれし叡智を持ち",10:"黄昏に咲く決意の花を宿し",11:"夜霜をも溶かす感受性を抱き",12:"雪華の中に咲く慈愛の心を備える"};

         // 神秘的な表示効果
     function mysticalReveal(el, text, speed=100) {
       el.innerHTML = '';
       el.style.opacity = '0';
       el.style.transform = 'translateY(20px)';
       el.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
       
       const words = text.split('\n');
       let currentIndex = 0;
       
       function revealNextWord() {
         if (currentIndex < words.length) {
           if (currentIndex > 0) {
             el.innerHTML += '<br>';
           }
           el.innerHTML += words[currentIndex];
           el.style.opacity = '1';
           el.style.transform = 'translateY(0)';
           
           currentIndex++;
           setTimeout(revealNextWord, speed * 2);
         }
       }
       
       setTimeout(revealNextWord, 200);
     }

    // フォーム送信処理
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const y = parseInt(document.getElementById("year").value);
      const m = parseInt(document.getElementById("month").value);
      const d = parseInt(document.getElementById("day").value);
      
      // バリデーション
      if (!y || !m || !d) { 
        alert("すべての項目を選択してください。"); 
        return; 
      }
      
      // 日付の妥当性チェック
      const date = new Date(y, m - 1, d);
      if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) {
        alert("正しい日付を選択してください。");
        return;
      }
      
      // 未来の日付チェック
      const today = new Date();
      if (date > today) {
        alert("未来の日付は選択できません。");
        return;
      }

                    // 鑑定中アニメーション開始

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               img.onload = function() {

                    <div><strong class="glow-text">そなたを守護するは ${guardian.name}</strong></div>
                    <div>${guardian.desc}</div>`;
              
                  const oracleText = `「汝に告ぐ

        ${guardian.name}は常にそなたを見守り
        心弱き時には慈悲を注ぎ
        道を誤る時には智慧の灯を掲げん

        ${m}月に生まれし汝
        ${monthText}

        生まれしその日は「${d}」
        ${dayText}

        この運命を胸に刻み
        恐れることなく進むがよい
        汝の歩む道は
        光と共に在る

        ${guardian.personal}」`;
              
                  document.getElementById("resultBox").style.display="block";
                  mysticalReveal(document.getElementById("oracle"), oracleText, 120);
                  
                  document.getElementById("detailLink").onclick=()=>{ window.location.href=`confirm.html?year=${y}&month=${m}&day=${d}`; }
                };
           
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               img.onerror = function() {
                // 画像読み込みエラー時の処理
                document.getElementById("guardian").innerHTML =

               document.getElementById("resultBox").style.display="block";
