<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生年月日入力 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: relative;
      min-height: 100vh;
    }
    
    /* 神秘的な光の演出 */
    #mysticalEffect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 2s ease-in-out;
      pointer-events: none;
    }
    
    #mysticalEffect.show {
      opacity: 1;
    }
    
    .light-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #66ccff, transparent),
        radial-gradient(2px 2px at 40px 70px, #3399ff, transparent),
        radial-gradient(1px 1px at 90px 40px, #99e0ff, transparent),
        radial-gradient(1px 1px at 130px 80px, #66ccff, transparent),
        radial-gradient(2px 2px at 160px 30px, #3399ff, transparent);
      background-repeat: repeat;
      background-size: 200px 100px;
      animation: particleFloat 8s linear infinite;
    }
    
    @keyframes particleFloat {
      0% {
        transform: translateY(0px);
      }
      100% {
        transform: translateY(-100px);
      }
    }
    
    .energy-field {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 2px solid rgba(102, 204, 255, 0.6);
      border-radius: 50%;
      animation: energyPulse 3s ease-in-out infinite;
      box-shadow: 
        0 0 20px rgba(102, 204, 255, 0.4),
        inset 0 0 20px rgba(102, 204, 255, 0.2);
    }
    
    @keyframes energyPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }
    
    /* 龍と守護神の表示スタイル */
    .dragon-reveal {
      text-align: center;
      margin-bottom: 20px;
      animation: dragonAppear 2s ease-in-out;
    }
    
    .dragon-image {
      max-width: 150px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(102, 204, 255, 0.6);
      animation: dragonGlow 3s ease-in-out infinite alternate;
    }
    
    .dragon-placeholder {
      font-size: 4em;
      animation: dragonGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes dragonAppear {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(50px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    @keyframes dragonGlow {
      0% {
        filter: brightness(1) drop-shadow(0 0 10px rgba(102, 204, 255, 0.5));
      }
      100% {
        filter: brightness(1.3) drop-shadow(0 0 20px rgba(102, 204, 255, 0.8));
      }
    }
    
    .guardian-reveal {
      animation: guardianAppear 2s ease-in-out 0.5s both;
    }
    
    @keyframes guardianAppear {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    /* PC向け神秘的な演出調整 */
    @media (min-width: 768px) {
      .energy-field {
        width: 400px;
        height: 400px;
      }
      
      .dragon-image {
        max-width: 200px;
      }
    }
    
    /* モバイル向け固定レイアウト */
    @media (max-width: 600px) {
      body {
        position: fixed;
        width: 100%;
        height: 100%;
      }
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
      position: relative;
      z-index: 1;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }
    
    .container.show {
      opacity: 1;
    }
    
    /* PC向けコンテナ調整 */
    @media (min-width: 768px) {
      .container {
        padding: 40px 20px;
        justify-content: flex-start;
        padding-top: 80px;
        min-height: auto;
        height: auto;
      }
    }
    
    .birth-form {
      width: 90%;
      max-width: 400px;
      text-align: center;
      padding: 30px;
      background: rgba(13, 13, 26, 0.95);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    
    /* PC向けフォーム調整 */
    @media (min-width: 768px) {
      .birth-form {
        max-width: 500px;
        padding: 40px;
        margin: 20px auto;
      }
    }
    
    @media (min-width: 1024px) {
      .birth-form {
        max-width: 600px;
        padding: 50px;
      }
    }
    
    .birth-form h3 { 
      color: #66ccff; 
      margin-bottom: 20px; 
      font-size: 1.3em; 
    }
    
    .birth-form label { 
      display: block; 
      margin: 10px 0 5px; 
      color: #99ccff; 
      text-align: left; 
      font-weight: bold; 
    }
    
    /* PC向けタイトルとラベル調整 */
    @media (min-width: 768px) {
      .birth-form h3 {
        font-size: 1.5em;
        margin-bottom: 30px;
      }
      .birth-form label {
        font-size: 1.1em;
        margin: 15px 0 8px;
      }
    }
    
    .birth-form select {
      padding: 12px; 
      margin-bottom: 15px; 
      border-radius: 6px;
      border: 1px solid rgba(102,204,255,0.3);
      font-size: 1em; 
      background: rgba(255,255,255,0.1); 
      color: #fff;
      width: 100%; 
      max-width: 150px; 
      cursor: pointer;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 16px;
      padding-right: 30px;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }
    
    /* PC向けセレクトボックス調整 */
    @media (min-width: 768px) {
      .birth-form select {
        font-size: 1.1em;
        padding: 15px;
        max-width: 180px;
        margin-bottom: 20px;
      }
    }
    
    .form-row { 
      display: flex; 
      justify-content: space-between; 
      gap: 10px; 
      margin-bottom: 20px; 
    }
    
    .form-group { 
      flex: 1; 
      text-align: center; 
    }
    
    /* PC向けフォームレイアウト調整 */
    @media (min-width: 768px) {
      .form-row {
        gap: 20px;
        margin-bottom: 30px;
        justify-content: center;
      }
      .form-group {
        flex: 0 1 auto;
        min-width: 120px;
      }
    }
    
    .birth-form button {
      padding: 16px 40px; 
      font-size: 1.3em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none; 
      border-radius: 8px; 
      font-weight: bold;
      cursor: pointer; 
      color: #000; 
      width: 100%; 
      max-width: 300px;
      margin-top: 10px; 
      transition: all 0.3s ease;
    }
    
    /* PC向けボタン調整 */
    @media (min-width: 768px) {
      .birth-form button {
        font-size: 1.4em;
        padding: 18px 50px;
        max-width: 350px;
        margin-top: 20px;
      }
    }
    
    .birth-form button:hover { 
      background: linear-gradient(90deg, #99e0ff, #66ccff); 
      transform: scale(1.05); 
    }
    
    .back-button {
      position: absolute; 
      top: 20px; 
      left: 20px;
      background: rgba(13, 13, 26, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #99ccff; 
      padding: 10px 15px; 
      border-radius: 8px; 
      cursor: pointer;
    }
    
    /* PC向け戻るボタン調整 */
    @media (min-width: 768px) {
      .back-button {
        top: 30px;
        left: 30px;
        padding: 12px 20px;
        font-size: 1.1em;
      }
    }

    /* 鑑定結果表示 */
    .result { 
      display:none; 
      max-width:600px; 
      margin:auto; 
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.2); 
      border-radius:12px; 
      padding:20px;
      box-shadow:0 0 20px rgba(147,51,234,.4); 
      position:relative; 
    }
    
    /* PC向け結果表示調整 */
    @media (min-width: 768px) {
      .result {
        max-width: 800px;
        padding: 40px;
        margin: 30px auto;
        scroll-margin-top: 20px;
      }
    }
    
    #oracle {
      line-height: 1.8;
      font-size: 1.1em;
      text-align: left;
      white-space: pre-line;
    }
    
    /* PC向け神託テキスト調整 */
    @media (min-width: 768px) {
      #oracle {
        font-size: 1.2em;
        line-height: 2.0;
        max-width: 700px;
        margin: 0 auto;
      }
    }
    
    img.guardian { 
      width:120px; 
      border-radius:50%; 
      margin:10px auto; 
      display:block; 
      animation: guardianGlow 3s ease-in-out infinite alternate, guardianFloat 4s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(102, 204, 255, 0.6), 0 0 60px rgba(157, 78, 221, 0.4);
    }
    
    /* PC向け守護神画像調整 */
    @media (min-width: 768px) {
      img.guardian {
        width: 150px;
        margin: 20px auto;
      }
    }
    
    @keyframes guardianGlow {
      0% { 
        box-shadow: 0 0 20px rgba(102, 204, 255, 0.4), 0 0 40px rgba(157, 78, 221, 0.3);
        filter: brightness(1);
      }
      100% { 
        box-shadow: 0 0 40px rgba(102, 204, 255, 0.8), 0 0 80px rgba(157, 78, 221, 0.6);
        filter: brightness(1.2);
      }
    }
    
    @keyframes guardianFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-3px) rotate(0.5deg); }
      50% { transform: translateY(-5px) rotate(0deg); }
      75% { transform: translateY(-3px) rotate(-0.5deg); }
    }
    
    .glow-text { 
      animation:textGlow 2s ease-in-out infinite alternate; 
    }
    
    @keyframes textGlow {
      0%{text-shadow:0 0 10px rgba(157,78,221,.8)}
      100%{text-shadow:0 0 20px rgba(157,78,221,1),0 0 30px rgba(199,125,255,.6)}
    }

    /* ローディング画面 */
    #loadingScreen { 
      display:none; 
      position:fixed; 
      top:0; 
      left:0; 
      right:0; 
      bottom:0;
      background:rgba(0,0,0,.8); 
      align-items:center; 
      justify-content:center;
      flex-direction:column; 
      z-index:9999; 
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    
    /* PC向けローディング画面調整 */
    @media (min-width: 768px) {
      #loadingScreen p {
        font-size: 1.4em;
      }
      .loading-spinner {
        width: 120px;
        height: 120px;
      }
    }
    
    #loadingScreen.show {
      opacity: 1;
    }
    
    .loading-spinner{
      width:100px;
      height:100px;
      position:relative;
      margin:0 auto
    }
    
    .loading-spinner::before,.loading-spinner::after{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      background:conic-gradient(from 0deg,transparent,#9d4edd,#c77dff,#ff6b9d,transparent);
      animation:spiral 3s linear infinite
    }
    
    .loading-spinner::after{
      animation:spiral 2s linear infinite reverse;
      filter:blur(1px);
      opacity:.9;
      width:80%;
      height:80%;
      top:10%;
      left:10%
    }
    
    @keyframes spiral{
      0%{transform:rotate(0)}
      100%{transform:rotate(360deg)}
    }
    
    #loadingScreen p{
      color:#fff;
      font-size:1.2em;
      margin-top:1em;
      animation:blink 1.5s infinite
    }
    
    @keyframes blink{
      0%{opacity:1}
      50%{opacity:.4}
      100%{opacity:1}
    }
    
    /* エラー時のアニメーション */
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    /* 成功時のアニメーション */
    @keyframes successFade {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    /* PC向けメッセージ調整 */
    @media (min-width: 768px) {
      .error-message, .success-message {
        margin: 20px auto;
        padding: 15px 20px;
        font-size: 1.1em;
        max-width: 500px;
      }
    }
    
    /* iPhone向け調整 */
    @media (max-width: 600px) {
      .error-message, .success-message {
        margin: 10px 5px;
        padding: 10px;
        font-size: 0.9em;
      }
      
      body {
        position: fixed;
        overflow: hidden;
      }
      .container {
        height: 100vh;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
        padding: 40px 15px 20px;
        justify-content: flex-start;
        padding-top: 40px;
      }
      
      .birth-form {
        padding: 25px;
        background: rgba(13, 13, 26, 0.95);
        border-radius: 15px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        width: calc(100% - 40px);
        max-width: 380px;
        margin-top: 20px;
      }
      
      .birth-form select { 
        font-size: 1.1em; 
        padding: 12px;
        width: 100% !important;
        max-width: 100px !important;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 8px center;
        background-size: 16px;
        padding-right: 30px;
      }
      
      .birth-form button { 
        font-size: 1.2em; 
        padding: 16px 20px;
        -webkit-appearance: none;
        border-radius: 8px;
        width: 100% !important;
        max-width: 300px !important;
      }
      
      .form-row {
        flex-direction: column;
        gap: 15px;
      }
      
      .form-group {
        text-align: center;
      }
      
      .back-button {
        top: 10px;
        left: 15px;
        padding: 8px 12px;
        font-size: 0.9em;
      }
      
      .result {
        padding: 15px;
        margin: 10px;
      }
      
      .guardian {
        width: 100px !important;
        animation: guardianGlow 3s ease-in-out infinite alternate, guardianFloat 4s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(102, 204, 255, 0.6), 0 0 40px rgba(157, 78, 221, 0.4) !important;
      }
    }
    
    /* iPhone X以降のノッチ対応（モバイルのみ） */
    @media (max-width: 600px) {
      @supports (padding: max(0px)) {
        .container {
          padding-top: max(40px, env(safe-area-inset-top));
          padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .back-button {
          top: max(10px, env(safe-area-inset-top) + 5px);
          left: max(15px, env(safe-area-inset-left) + 5px);
        }
      }
    }
  </style>
</head>
<body>
  <!-- 神秘的な光の演出 -->
  <div id="mysticalEffect">
    <div class="light-particles"></div>
    <div class="energy-field"></div>
  </div>
  
  <div class="container">
    <!-- 戻るボタン -->
    <button class="back-button" onclick="goBack()">← 戻る</button>
    
    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <h3>あなたの生年月日を教えてください</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="year">西暦</label>
          <select id="year" required>
            <option value="">選択</option>
          </select>
        </div>
        <div class="form-group">
          <label for="month">月</label>
          <select id="month" required>
            <option value="">選択</option>
          </select>
        </div>
        <div class="form-group">
          <label for="day">日</label>
          <select id="day" required>
            <option value="">選択</option>
          </select>
        </div>
      </div>
      <button type="submit">守護神を導き出す</button>
    </form>

    <!-- ローディング画面 -->
    <div id="loadingScreen">
      <div class="loading-spinner"></div>
      <p>神託を降ろしています…</p>
    </div>

    <!-- 鑑定結果 -->
    <div class="result" id="resultBox">
      <h1 class="glow-text">神託</h1>
      <div id="guardian"></div>
      <p id="oracle"></p>
      <p><a id="detailLink" class="glow-text" style="color:#9d4edd;cursor:pointer;">さらに詳しく運命を占う</a></p>
    </div>
  </div>
  
  <script>
    // 戻るボタンの機能
    function goBack() {
      window.history.back();
    }

    // セレクトボックスの初期化関数
    function initializeSelects() {
      console.log('Initializing select boxes...');
      
      try {
        // 年の選択肢を追加
        const yearSelect = document.getElementById("year");
        if (yearSelect) {
          yearSelect.innerHTML = '<option value="">選択</option>';
          for (let y = 2025; y >= 1900; y--) {
            const opt = document.createElement("option");
            opt.value = y;
            opt.textContent = y + "年";
            yearSelect.appendChild(opt);
          }
          console.log('Year select initialized with', yearSelect.children.length - 1, 'options');
        } else {
          console.error('Year select element not found');
        }
        
        // 月の選択肢を追加
        const monthSelect = document.getElementById("month");
        if (monthSelect) {
          monthSelect.innerHTML = '<option value="">選択</option>';
          for (let m = 1; m <= 12; m++) {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m + "月";
            monthSelect.appendChild(opt);
          }
          console.log('Month select initialized with', monthSelect.children.length - 1, 'options');
        } else {
          console.error('Month select element not found');
        }
        
        // 日の選択肢を追加
        const daySelect = document.getElementById("day");
        if (daySelect) {
          daySelect.innerHTML = '<option value="">選択</option>';
          for (let d = 1; d <= 31; d++) {
            const opt = document.createElement("option");
            opt.value = d;
            opt.textContent = d + "日";
            daySelect.appendChild(opt);
          }
          console.log('Day select initialized with', daySelect.children.length - 1, 'options');
        } else {
          console.error('Day select element not found');
        }
        
        // イベントリスナーの設定
        setupEventListeners();
        
      } catch (error) {
        console.error('Error in initializeSelects:', error);
      }
    }

    // イベントリスナーの設定
    function setupEventListeners() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (monthSelect) {
        monthSelect.addEventListener("change", function() {
          adjustDayOptions();
          validateCurrentInput();
        });
      }
      
      if (yearSelect) {
        yearSelect.addEventListener("change", function() {
          adjustDayOptions();
          validateCurrentInput();
        });
      }
      
      if (daySelect) {
        daySelect.addEventListener("change", function() {
          validateCurrentInput();
        });
      }
    }

    // 日の選択肢を調整する関数
    function adjustDayOptions() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (!yearSelect || !monthSelect || !daySelect) return;
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      
      if (!year || !month) return;
      
      const daysInMonth = new Date(year, month, 0).getDate();
      
      // 現在選択されている日を保存
      const currentDay = daySelect.value;
      
      // 日の選択肢を再生成
      daySelect.innerHTML = '<option value="">選択</option>';
      for (let d = 1; d <= daysInMonth; d++) {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d + "日";
        daySelect.appendChild(opt);
      }
      
      // 以前選択されていた日が有効な範囲内であれば復元
      if (currentDay && parseInt(currentDay) <= daysInMonth) {
        daySelect.value = currentDay;
      }
    }

    // 現在の入力を検証する関数
    function validateCurrentInput() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      
      if (!yearSelect || !monthSelect || !daySelect) return;
      
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);
      const day = parseInt(daySelect.value);
      
      // すべての値が選択されている場合のみ検証
      if (year && month && day) {
        const inputDate = new Date(year, month - 1, day);
        const today = new Date();
        
        // 日付が有効かチェック
        if (inputDate.getFullYear() !== year || 
            inputDate.getMonth() !== month - 1 || 
            inputDate.getDate() !== day) {
          showErrorMessage("無効な日付です。");
          return false;
        }
        
        // 未来の日付かチェック
        if (inputDate > today) {
          showErrorMessage("未来の日付は選択できません。");
          return false;
        }
        
        // 年齢制限チェック（120歳以上）
        const age = today.getFullYear() - year;
        if (age > 120) {
          showErrorMessage("120歳以上の方は選択できません。");
          return false;
        }
        
        clearErrorDisplay();
        return true;
      }
      
      return false;
    }

      errorDiv.style.cssText = `
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid #ff6b6b;
        border-radius: 8px;
        padding: 10px;
        margin: 10px 0;
        text-align: center;
        animation: errorShake 0.5s ease-in-out;
      `;
      errorDiv.textContent = message;
      
      const form = document.getElementById("birthForm");
      form.appendChild(errorDiv);
      
      // エラーフィールドをハイライト
      highlightErrorFields();
    }

      [yearSelect, monthSelect, daySelect].forEach(select => {
        if (select && !select.value) {
          select.style.borderColor = "#ff6b6b";
          select.style.boxShadow = "0 0 10px rgba(255, 107, 107, 0.5)";
        }
      });
    }

      [yearSelect, monthSelect, daySelect].forEach(select => {
        if (select) {
          select.style.borderColor = "rgba(102,204,255,0.3)";
          select.style.boxShadow = "inset 0 0 5px rgba(102,204,255,0.4)";

      return zodiacSigns[zodiacIndex];
