
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>守護神占い｜個別相談</title>
  <style>
    body { background:#140826; color:#fff; font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
    .wrap { max-width: 720px; margin: 48px auto; padding: 24px; background: rgba(255,255,255,.05); border-radius: 16px; box-shadow: 0 0 0 1px rgba(255,255,255,.07) inset; }
    h1 { margin: 0 0 6px; font-size: 28px; text-align:center; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background: rgba(255,255,255,.08); font-size:.95em; }
    textarea { width:100%; min-height: 160px; padding:12px; border-radius:12px; border:none; outline:none; background:rgba(255,255,255,.08); color:#fff; }
    .row { margin-top: 12px; display:flex; gap:12px; align-items:center; justify-content:center; }
    .btn { appearance:none; border:none; border-radius:999px; padding:10px 16px; background:#8b46ff; color:#fff; cursor:pointer; }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }
    pre { white-space:pre-wrap; word-break:break-word; background:rgba(0,0,0,.25); padding:16px; border-radius:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>お悩み相談フォーム</h1>
    <div id="dobBadge" class="badge" style="display:none;"></div>

    <div class="row"><textarea id="q" placeholder="例）東京在住で、交際相手は北海道です…"></textarea></div>
    <div class="row">
      <button id="send" class="btn">鑑定する</button>
    </div>
    <div class="row"><pre id="out"></pre></div>
  </div>

<script>
  const $ = (s)=>document.querySelector(s);
  const qEl = $('#q'), sendBtn = $('#send'), out = $('#out');

  // --- DOB取得（URL or sessionStorage）
  (function initDOB(){
    const p = new URLSearchParams(location.search);
    let y = parseInt(p.get('year')), m = parseInt(p.get('month')), d = parseInt(p.get('day'));
    if (!(y&&m&&d)) {
      try {
        const saved = JSON.parse(sessionStorage.getItem('ss_user_profile')||"null");
        if (saved) { y = +saved.year; m = +saved.month; d = +saved.day; }
      } catch(_) {}
    }
    window.__DOB__ = { year: y||null, month: m||null, day: d||null };
    const badge = document.getElementById('dobBadge');
    if (badge && y && m && d) {
      badge.style.display = 'inline-block';
      badge.textContent = `生年月日：${y}年${m}月${d}日（把握済み）`;
    }
  })();

  // --- API endpoints: primary (Workers) + fallback (backup API)
  const PRIMARY = (window.SYUGO_PRIMARY_URL || "/api/consult"); // 既存のWorkers
  const BACKUP  = (window.SYUGO_BACKUP_URL  || "https://your-app.onrender.com/api/consult"); // ←デプロイ後に置換

  async function callAPI(payload){
    // 1st try: Primary
    let res = await fetch(PRIMARY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      // 試しに内容を覗いて地域ブロックならバックアップへ
      try {
        const t = await res.clone().json();
        const regionBlocked = (t?.code === 'region_blocked') || (t?.error?.code === 'unsupported_country_region_territory');
        if (regionBlocked && BACKUP && BACKUP.startsWith('http')) {
          res = await fetch(BACKUP, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
        }
      } catch (_) {}
    }
    return res;
  }

  function friendly(text, status){
    try {
      const data = JSON.parse(text);
      if (status >= 200 && status < 300) {
        return data?.message || text;
      }
      const isRegion = data?.code === 'region_blocked' || data?.error?.code === 'unsupported_country_region_territory';
      if (isRegion) {
        return 'ただいま接続経路の都合により鑑定サーバへ到達できません。\\nVPN/プロキシをOFF、時間を置く、または別回線でお試しください。';
      }
      return data?.error || data?.message || '通信エラーが発生しました。しばらくしてからお試しください。';
    } catch {
      return text;
    }
  }

  sendBtn.addEventListener('click', async ()=>{
    const prompt = (qEl.value||'').trim();
    if (!prompt) { qEl.focus(); return; }
    sendBtn.disabled = true; out.textContent = '鑑定中…';

    const payload = { text: prompt, year: (__DOB__?.year||null), month: (__DOB__?.month||null), day: (__DOB__?.day||null) };

    try{
      const res = await callAPI(payload);
      const text = await res.text();
      out.textContent = friendly(text, res.status);
    }catch(e){
      out.textContent = '通信に失敗しました。時間を置いてお試しください。';
    }finally{
      sendBtn.disabled = false;
    }
  });
</script>
</body>
</html>
