<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>守護神占い｜相談フォーム</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#1a0b2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    body {
      background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
      color: #fff;
      font-family: 'Zen Old Mincho', serif;
      text-align: center;
      padding: 30px;
      overflow-x: hidden;
      position: relative;
    }

    /* 霧エフェクト */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(199, 125, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: mistMove 20s ease-in-out infinite;
    }

    @keyframes mistMove {
      0%, 100% {
        transform: translateX(0) translateY(0);
      }
      25% {
        transform: translateX(-10px) translateY(-5px);
      }
      50% {
        transform: translateX(5px) translateY(-10px);
      }
      75% {
        transform: translateX(-5px) translateY(5px);
      }
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(147,51,234,0.4);
      opacity: 0;
      transition: opacity 1s;
      position: relative;
      overflow: hidden;
    }

    /* 浮遊する光の粒子 */
    .floating-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .floating-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, #c77dff, transparent);
      border-radius: 50%;
      animation: floatAround 8s infinite linear;
    }

    .floating-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .floating-particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
    .floating-particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }
    .floating-particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
    .floating-particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1s; }
    .floating-particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 3s; }

    @keyframes floatAround {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translate(20px, -20px) rotate(360deg);
        opacity: 0;
      }
    }

    .container::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      background: radial-gradient(circle, rgba(157, 78, 221, 0.3) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
      z-index: -1;
      border-radius: 16px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.6;
      }
    }

    h1 {
      font-size: 1.5em;
      margin-bottom: 0.5em;
      animation: textGlow 2s ease-in-out infinite alternate;
      text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
    }

    @keyframes textGlow {
      0% {
        text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
      }
      100% {
        text-shadow: 0 0 20px rgba(157, 78, 221, 1), 0 0 30px rgba(199, 125, 255, 0.6);
      }
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ddd;
      font-size: 1.1em;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: 1px solid rgba(157, 78, 221, 0.3);
      border-radius: 8px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-family: 'Zen Old Mincho', serif;
      transition: all 0.3s ease;
    }

    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #9d4edd;
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
      background: rgba(255, 255, 255, 0.15);
    }

    textarea::placeholder, input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #9d4edd;
      color: #fff;
      font-family: 'Zen Old Mincho', serif;
      transition: all 0.3s ease;
      margin: 5px;
    }

    button:hover {
      background: #c77dff;
      transform: scale(1.05);
    }

    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }

    .muted {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
    }

    .out {
      white-space: pre-wrap;
      border: 1px solid rgba(157, 78, 221, 0.3);
      padding: 15px;
      border-radius: 8px;
      min-height: 120px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: 'Zen Old Mincho', serif;
      text-align: left;
      position: relative;
    }

    .row-2col {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    .badge {
      font-size: 12px;
      border: 1px solid rgba(157, 78, 221, 0.5);
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(157, 78, 221, 0.2);
      color: #fff;
    }

    .err {
      color: #ff6b9d;
      text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #9d4edd;
      text-decoration: underline;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #c77dff;
      text-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
    }

    /* ローディング画面 */
    #loadingScreen {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.8);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:9999;
      animation: fadeIn 1s forwards;
    }

    #loadingScreen p {
      color:#fff;
      font-size:1.2em;
      margin-top:1em;
      animation: blink 1.5s infinite;
    }

    .loading-spinner {
      width: 100px;
      height: 100px;
      position: relative;
      margin: 0 auto;
    }

    .loading-spinner::before,
    .loading-spinner::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, #9d4edd, #c77dff, #ff6b9d, transparent);
      animation: spiral 3s linear infinite;
    }

    .loading-spinner::before {
      animation: spiral 3s linear infinite;
      filter: blur(2px);
      opacity: 0.7;
    }

    .loading-spinner::after {
      animation: spiral 2s linear infinite reverse;
      filter: blur(1px);
      opacity: 0.9;
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
    }

    @keyframes spiral {
      0% {
        transform: rotate(0deg) scale(1);
        filter: hue-rotate(0deg);
      }
      25% {
        transform: rotate(90deg) scale(1.1);
        filter: hue-rotate(90deg);
      }
      50% {
        transform: rotate(180deg) scale(0.9);
        filter: hue-rotate(180deg);
      }
      75% {
        transform: rotate(270deg) scale(1.1);
        filter: hue-rotate(270deg);
      }
      100% {
        transform: rotate(360deg) scale(1);
        filter: hue-rotate(360deg);
      }
    }

    @keyframes blink {
      0% {opacity:1;}
      50% {opacity:0.4;}
      100% {opacity:1;}
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    @keyframes fadeOut {
      from {opacity:1;}
      to {opacity:0;}
    }

    @media (max-width: 640px) {
      body {
        padding: 15px;
      }
      .container {
        margin: 20px auto;
        padding: 20px;
      }
      .actions {
        flex-direction: column;
      }
      button {
        width: 100%;
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div class="loading-spinner"></div>
  <p>相談フォームを準備中です…</p>
</div>

<div class="container">
  <div class="floating-particles">
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
  </div>
  
  <h1>お悩み相談フォーム</h1>
  
  <div class="form-group">
    <label for="prompt">相談内容</label>
    <textarea id="prompt" rows="6" placeholder="ここに相談内容を入力してください。例）今の仕事を続けるべきか迷っています。"
      autocomplete="off"></textarea>

    <div class="row-2col">
      <div class="muted">このフォームは <code>Cloudflare Workers → OpenAI</code> を経由して回答します。</div>
      <div class="badge"><span id="count">0</span> 文字</div>
    </div>
  </div>

  <div class="actions">
    <button id="send">送信</button>
    <button id="clear" type="button">クリア</button>
    <span class="muted" id="status" aria-live="polite"></span>
  </div>

  <div class="form-group">
    <div id="out" class="out" aria-live="polite"></div>
  </div>

  <a href="index.html" class="back-link">← 戻る</a>
</div>

<script>
  // === 設定（あなたの Worker API） ===
  const API_URL = 'https://syugo-sin-kantei-api.mituo0226.workers.dev/consult';

  // === 要素参照 ===
  const $ = (s) => document.querySelector(s);
  const promptEl = $('#prompt');
  const sendBtn  = $('#send');
  const clearBtn = $('#clear');
  const outEl    = $('#out');
  const statusEl = $('#status');
  const countEl  = $('#count');

  // ローディング演出
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loadingScreen');
      loader.style.animation = 'fadeOut 1s forwards';
      setTimeout(() => {
        loader.remove();
        document.querySelector('.container').style.opacity = '1';
      }, 1000);
    }, 3000); // 3秒演出
  });

  // 文字数カウンタ
  const updateCount = () => { countEl.textContent = (promptEl.value || '').length; };
  promptEl.addEventListener('input', updateCount);
  updateCount();

  // クリア
  clearBtn.addEventListener('click', () => {
    promptEl.value = '';
    updateCount();
    outEl.textContent = '';
    statusEl.textContent = '';
    promptEl.focus();
  });

  // 送信（Enter+Ctrl/Cmdで送信も可）
  promptEl.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // メイン送信処理
  sendBtn.addEventListener('click', async () => {
    const prompt = (promptEl.value || '').trim();
    if (!prompt) {
      outEl.innerHTML = '<span class="err">入力が空です。内容を入力してください。</span>';
      promptEl.focus();
      return;
    }

    // UIロック
    sendBtn.disabled = true;
    clearBtn.disabled = true;
    statusEl.textContent = '送信中…';

    try {
      // タイムアウト（30秒）
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 30000);

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
        signal: controller.signal
      }).finally(() => clearTimeout(timer));

      const text = await res.text();

      // まずはHTTPステータスを表示（デバッグ時に役立つ）
      let display = `HTTP ${res.status}\n`;
      try {
        const data = JSON.parse(text);
        if (!res.ok) {
          // エラー時
          display += (data?.error || text || 'エラーが発生しました。');
        } else {
          display += JSON.stringify(data, null, 2);
        }
      } catch {
        display += text; // JSON以外の本文
      }
      outEl.textContent = display;

      // ステータス表示
      if (res.ok) {
        statusEl.textContent = '送信完了';
      } else {
        statusEl.innerHTML = '<span class="err">エラー</span>';
      }
    } catch (e) {
      outEl.innerHTML = `<span class="err">通信エラー: ${e?.message || e}</span>`;
      statusEl.innerHTML = '<span class="err">通信エラー</span>';
    } finally {
      sendBtn.disabled = false;
      clearBtn.disabled = false;
    }
  });
</script>
</body>
</html>
