<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お悩み鑑定</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-b from-purple-900 to-purple-700 text-white flex items-center justify-center min-h-screen">

<div class="bg-purple-800 p-6 rounded-lg shadow-lg w-full max-w-md">
  <h1 class="text-xl font-bold mb-4 text-center">具体的なお悩みをお聞かせください</h1>
  <textarea id="questionInput" class="w-full p-3 rounded bg-purple-900 text-white mb-4" rows="4" placeholder="最近夜眠れない...など"></textarea>
  <button id="consultBtn" class="w-full bg-purple-500 hover:bg-purple-600 p-3 rounded font-bold">鑑定する</button>
  <h2 class="text-lg mt-4">鑑定結果</h2>
  <p id="resultArea" class="mt-2">ここに結果が表示されます。</p>
</div>

<script>
// DOMContentLoadedイベントでスクリプトの初期化を確実に行う
document.addEventListener('DOMContentLoaded', function() {
    console.log('スクリプトが読み込まれました');
    
    // ボタンクリックイベントを追加
    const consultBtn = document.getElementById('consultBtn');
    if (consultBtn) {
        consultBtn.addEventListener('click', divine);
    }
});

async function divine() {
    console.log('divine関数が実行されました');
    
    const question = document.getElementById("questionInput");
    const resultArea = document.getElementById("resultArea");
    
    // 要素の存在確認
    if (!question || !resultArea) {
        console.error('必要な要素が見つかりません');
        return;
    }
    
    const questionText = question.value.trim();
    
    if (!questionText) {
        resultArea.textContent = "質問内容を入力してください。";
        return;
    }

    try {
        resultArea.textContent = "鑑定中です…";
        console.log('APIリクエストを送信中...');

        const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({ question: questionText })
        });

        console.log('レスポンス受信:', response.status);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: サーバー通信に失敗しました。`);
        }

        const data = await response.json();
        console.log('レスポンスデータ:', data);
        
        if (data.answer) {
            resultArea.textContent = data.answer;
        } else if (data.reply) {
            resultArea.textContent = data.reply;
        } else {
            resultArea.textContent = "結果が取得できませんでした。";
        }
    } catch (error) {
        console.error('エラーが発生しました:', error);
        resultArea.textContent = "サーバー通信に失敗しました。";
    }
}
</script>

</body>
</html>
