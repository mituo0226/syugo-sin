<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>守護神 個別相談</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-purple-900 to-black text-white flex items-center justify-center min-h-screen">

<div class="bg-purple-800 p-6 rounded-lg shadow-lg w-full max-w-md">
  <h1 class="text-2xl font-bold mb-4 text-center">守護神 個別相談</h1>
  
  <label for="prompt" class="block mb-2">【相談】</label>
  <textarea id="prompt" class="w-full p-2 rounded text-black" rows="4" placeholder="具体的なお悩みをご記入ください"></textarea>
  
  <button id="consultBtn" class="mt-4 w-full bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded">
    鑑定する
  </button>
  
  <div class="mt-4">
    <h2 class="text-lg font-bold">鑑定結果</h2>
    <p id="resultArea" class="mt-2 text-gray-200">まだ結果はありません。</p>
  </div>
</div>

<script>
document.getElementById("consultBtn").addEventListener("click", async () => {
  const prompt = document.getElementById("prompt").value.trim();
  const resultArea = document.getElementById("resultArea");

  if (!prompt) {
    resultArea.textContent = "相談内容を入力してください。";
    return;
  }

  resultArea.textContent = "鑑定中です…";

  try {
    const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) {
      throw new Error(`サーバーエラー: ${response.status}`);
    }

    const data = await response.json();
    if (data.result) {
      resultArea.textContent = data.result;
    } else {
      resultArea.textContent = "結果が空でした。";
    }
  } catch (err) {
    resultArea.textContent = `通信エラー: ${err.message}`;
  }
});
</script>

</body>
</html>
