<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>龍の個別鑑定（API検証版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin:0; background:#0b0b10; color:#e9e9f1; }
  .wrap { max-width: 860px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 22px; margin: 0 0 12px; }
  .badge { display:none; font-size: 14px; opacity:.85; background:#1a1a24; border:1px solid #2d2d3a; border-radius:8px; padding:8px 10px; margin: 8px 0 16px; }
  label { display:block; margin: 16px 0 6px; font-weight: 600; }
  textarea { width:100%; min-height:120px; padding:10px; border-radius:8px; border:1px solid #2d2d3a; outline:none; background:#12121a; color:#e9e9f1; }
  select, input[type="text"] { width:100%; padding:10px; border-radius:8px; border:1px solid #2d2d3a; outline:none; background:#12121a; color:#e9e9f1; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .actions { margin-top: 18px; display:flex; gap:12px; align-items:center; }
  button { cursor:pointer; border:0; border-radius:10px; padding:12px 18px; background:#7c3aed; color:white; font-weight:700; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .muted { font-size: 12px; opacity:.8; }
  .out { margin-top: 22px; background:#0f0f15; border:1px solid #2d2d3a; border-radius:12px; padding:16px; min-height:140px; white-space:pre-wrap; line-height:1.8; }
  .loading { display:inline-block; width:1em; height:1em; border:.18em solid #ffffff44; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg);} }
  .hint { margin-top:8px; font-size:12px; opacity:.75; }
  .ok { color:#67e8f9; }
  .err { color:#fca5a5; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>龍の個別鑑定（API 接続テスト）</h1>
    <div id="dobBadge" class="badge"></div>

    <label for="question">ご相談内容</label>
    <textarea id="question" placeholder="例）仕事の方向性に迷っています。今後の流れと具体的な一歩を知りたいです。"></textarea>

    <div class="row">
      <div>
        <label for="category">カテゴリ</label>
        <select id="category">
          <option value="仕事" selected>仕事</option>
          <option value="恋愛">恋愛</option>
          <option value="健康">健康</option>
          <option value="金運">金運</option>
          <option value="家族">家族</option>
        </select>
      </div>
      <div>
        <label for="api">API エンドポイント</label>
        <!-- 必要なら差し替え可。基本はこのままでOK -->
        <input id="api" type="text" value="https://syugo-sin-kantei-api.mituo0226.workers.dev/api/consult">
        <div class="hint">通常は変更不要です。/api/consult を含んでいることを確認してください。</div>
      </div>
    </div>

    <div class="actions">
      <button id="send">鑑定を依頼する</button>
      <button id="reset">新しい鑑定を始める</button>
      <span class="muted">※ テスト時は <span class="ok">deep.html?year=1990&month=4&day=15</span> で開いてください</span>
    </div>

    <div id="result" class="out" aria-live="polite"></div>
  </div>

<script>
'use strict';

// --- DOB 必須チェック（無ければ index.html に戻す） -------------------------
(function initDOB(){
  const p = new URLSearchParams(location.search);
  const y = +p.get('year'), m = +p.get('month'), d = +p.get('day');

  if(!(y && m && d)){
    alert("生年月日が未指定です。index.html から入力してお進みください。\n\nテストの場合は:\n deep.html?year=1990&month=4&day=15 で開けます。");
    location.href = "index.html";
    return;
  }

  // 以降の送信用に保存
  window.__DOB__ = { year: y, month: m, day: d };

  // 画面表示
  const badge = document.getElementById('dobBadge');
  badge.style.display = 'inline-block';
  badge.textContent = `生年月日：${y}年${m}月${d}日（取得済み）`;
})();

// --- 送信処理 ---------------------------------------------------------------
// スレッドID: ブラウザ側に保存（無ければ発行）
function getThreadId() {
  const key = "kantei_thread_id";
  let id = localStorage.getItem(key);
  if (!id) {
    id = "t_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    localStorage.setItem(key, id);
  }
  return id;
}

// 履歴: 直近4往復だけを保存/送信
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("kantei_history")||"[]"); }
  catch(e){ return []; }
}
function saveHistory(hist) {
  localStorage.setItem("kantei_history", JSON.stringify(hist.slice(-8)));
}

document.getElementById('send').addEventListener('click', async () => {
  const btn = document.getElementById('send');
  const out = document.getElementById('result');
  const api = document.getElementById('api').value.trim();
  const category = document.getElementById('category').value;
  const question = document.getElementById('question').value.trim();

  if(!question){
    alert("ご相談内容を入力してください。");
    return;
  }

  // 表示を「鑑定中…」に
  btn.disabled = true;
  out.innerHTML = `<span class="loading"></span>鑑定中です。しばらくお待ちください…`;

  const history = loadHistory(); // [{role, content}]
  const threadId = getThreadId();

  // 送信ペイロード
  const payload = {
    year: window.__DOB__?.year,
    month: window.__DOB__?.month,
    day: window.__DOB__?.day,
    category,
    question,
    threadId: threadId,
    history: history   // 直近をAPIに渡す
  };

  // 送信前にユーザー発話を履歴に追加（表示テキストから作成）
  history.push({ role: "user", content: question });

  try {
    const res = await fetch(api, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      const text = await res.text().catch(()=> '');
      throw new Error(`API ${res.status} ${res.statusText} ${text?'- '+text:''}`);
    }

    const data = await res.json();
    const msg = (data && (data.message || data.reply)) ? (data.message || data.reply) : JSON.stringify(data, null, 2);
    typeWriter(out, msg);

    // 返信メッセージを履歴に追加
    history.push({ role: "assistant", content: data.message || "" });
    saveHistory(history);

  } catch (err) {
    out.innerHTML = `<span class="err">エラー:</span> ${err.message || err}`;
  } finally {
    btn.disabled = false;
  }
});

// --- 新しい鑑定を始める -----------------------------------------------------
document.getElementById('reset').addEventListener('click', () => {
  localStorage.removeItem("kantei_history");
  localStorage.removeItem("kantei_thread_id");
  document.getElementById('question').value = '';
  document.getElementById('result').textContent = '';
  alert("過去の鑑定履歴をリセットしました。新しい鑑定を始められます。");
});

// --- タイプライター演出（読みやすさのため軽めに） ---------------------------
function typeWriter(el, text){
  el.textContent = '';
  let i = 0;
  (function tick(){
    if(i < text.length){
      el.textContent += text.charAt(i++);
      setTimeout(tick, 18);
    }
  })();
}
</script>
</body>
</html>
