<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守護神 個別相談</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-b from-purple-900 to-purple-700 text-white flex flex-col items-center p-4">
    <h1 class="text-2xl font-bold mb-4">守護神 個別相談</h1>

    <textarea id="userInput" class="w-full p-2 rounded bg-purple-800 text-white mb-4" rows="4" placeholder="具体的なお悩みをお聞かせください"></textarea>
    <button id="consultBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded">鑑定する</button>

    <div id="resultArea" class="mt-6 p-4 bg-purple-800 rounded w-full"></div>

    <script>
        document.getElementById("consultBtn").addEventListener("click", async () => {
            const prompt = document.getElementById("userInput").value.trim();
            const resultArea = document.getElementById("resultArea");
            if (!prompt) {
                resultArea.textContent = "内容を入力してください。";
                return;
            }

            resultArea.textContent = "鑑定中…";

            try {
                const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                
                if (!data.result) {
                    resultArea.textContent = "結果が空でした。";
                    return;
                }

                // 必要なら split して整形
                // const parts = data.result.split("\n").filter(line => line.trim() !== "");
                // resultArea.innerHTML = parts.map(p => `<p>${p}</p>`).join("");

                resultArea.textContent = data.result;

            } catch (error) {
                resultArea.textContent = "サーバー通信に失敗しました。";
                console.error(error);
            }
        });
    </script>
</body>
</html>
