<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>守護神 個別相談</title>
  <script>
    async function consult() {
      const input = document.getElementById("question").value.trim();
      const resultBox = document.getElementById("result");
      resultBox.innerText = "鑑定中...";

      if (!input) {
        resultBox.innerText = "質問を入力してください。";
        return;
      }

      try {
        const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: input })
        });

        if (!response.ok) {
          resultBox.innerText = `サーバーエラー (${response.status})`;
          return;
        }

        const data = await response.json();

        if (!data || !data.result) {
          resultBox.innerText = "結果を取得できませんでした。";
          return;
        }

        // 安全に表示
        resultBox.innerText = data.result;
      } catch (err) {
        console.error(err);
        resultBox.innerText = "通信エラーが発生しました。";
      }
    }
  </script>
</head>
<body style="background: #1a0026; color: white; font-family: sans-serif;">
  <h2 style="text-align:center;">守護神 個別相談</h2>
  <div style="max-width: 400px; margin: auto; padding: 20px;">
    <textarea id="question" placeholder="お悩みを入力してください" 
              style="width: 100%; height: 100px; padding: 10px;"></textarea>
    <button onclick="consult()" 
            style="width: 100%; margin-top: 10px; padding: 10px; background: purple; color: white; border: none;">
      鑑定する
    </button>
    <div id="result" style="margin-top: 15px; min-height: 60px;"></div>
  </div>
</body>
</html>
