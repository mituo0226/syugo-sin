<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神占い｜個別鑑定</title>
<style>
body {
  background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
  color: #fff;
  font-family: 'Zen Old Mincho', serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
  position: relative;
}

/* 霧エフェクト */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(199, 125, 255, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: mistMove 20s ease-in-out infinite;
}

@keyframes mistMove {
  0%, 100% {
    transform: translateX(0) translateY(0);
  }
  25% {
    transform: translateX(-10px) translateY(-5px);
  }
  50% {
    transform: translateX(5px) translateY(-10px);
  }
  75% {
    transform: translateX(-5px) translateY(5px);
  }
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(147,51,234,0.4);
  opacity: 0; /* 最初は非表示 */
  transition: opacity 1s;
  position: relative;
  overflow: hidden;
}

/* 浮遊する光の粒子 */
.floating-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.floating-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: radial-gradient(circle, #c77dff, transparent);
  border-radius: 50%;
  animation: floatAround 8s infinite linear;
}

.floating-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.floating-particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
.floating-particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }
.floating-particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
.floating-particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1s; }
.floating-particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 3s; }

@keyframes floatAround {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translate(20px, -20px) rotate(360deg);
    opacity: 0;
  }
}

.container::before {
  content: '';
  position: absolute;
  top: -20px;
  left: -20px;
  right: -20px;
  bottom: -20px;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.3) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
  z-index: -1;
  border-radius: 16px;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.6;
  }
}

h1 {
  font-size: 1.5em;
  margin-bottom: 0.5em;
}

p {
  margin: 1em 0;
  white-space: pre-wrap;
}

label {
  display: block;
  margin: 16px 0 6px;
  font-weight: 600;
  text-align: left;
}

textarea, select, input[type="text"] {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 1em;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}

.actions {
  margin-top: 18px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  cursor: pointer;
  border: 0;
  border-radius: 10px;
  padding: 12px 18px;
  background: #9d4edd;
  color: white;
  font-weight: 700;
  transition: all 0.3s ease;
}

button:hover {
  background: #c77dff;
  transform: scale(1.05);
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: #9d4edd;
  color: #fff;
  border: none;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background: #c77dff;
  transform: scale(1.05);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.muted {
  font-size: 12px;
  opacity: 0.8;
  color: #b9a9d9;
}

.out {
  margin-top: 22px;
  background: transparent;
  border: none;
  padding: 20px;
  min-height: 200px;
  white-space: pre-wrap;
  line-height: 2;
  text-align: center;
  font-size: 1.1em;
  color: #fff;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
}

.loading {
  display: inline-block;
  width: 1em;
  height: 1em;
  border: 0.18em solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  vertical-align: -2px;
  margin-right: 8px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.hint {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.75;
  color: #b9a9d9;
}

.ok {
  color: #67e8f9;
}

.err {
  color: #fca5a5;
}

.badge {
  display: none;
  font-size: 14px;
  opacity: 0.85;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 8px 10px;
  margin: 8px 0 16px;
}

/* 重要なテキストの光る演出 */
.glow-text {
  animation: textGlow 2s ease-in-out infinite alternate;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
}

@keyframes textGlow {
  0% {
    text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
  }
  100% {
    text-shadow: 0 0 20px rgba(157, 78, 221, 1), 0 0 30px rgba(199, 125, 255, 0.6);
  }
}

/* ローディング画面 */
#loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  animation: fadeIn 1s forwards;
}

#loadingScreen p {
  color: #fff;
  font-size: 1.2em;
  margin-top: 1em;
  animation: blink 1.5s infinite;
}

.loading-spinner {
  width: 100px;
  height: 100px;
  position: relative;
  margin: 0 auto;
}

.loading-spinner::before,
.loading-spinner::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent, #9d4edd, #c77dff, #ff6b9d, transparent);
  animation: spiral 3s linear infinite;
}

.loading-spinner::before {
  filter: blur(2px);
  opacity: 0.7;
}

.loading-spinner::after {
  animation: spiral 2s linear infinite reverse;
  filter: blur(1px);
  opacity: 0.9;
  width: 80%;
  height: 80%;
  top: 10%;
  left: 10%;
}

@keyframes spiral {
  0% {
    transform: rotate(0deg) scale(1);
    filter: hue-rotate(0deg);
  }
  25% {
    transform: rotate(90deg) scale(1.1);
    filter: hue-rotate(90deg);
  }
  50% {
    transform: rotate(180deg) scale(0.9);
    filter: hue-rotate(180deg);
  }
  75% {
    transform: rotate(270deg) scale(1.1);
    filter: hue-rotate(270deg);
  }
  100% {
    transform: rotate(360deg) scale(1);
    filter: hue-rotate(360deg);
  }
}

@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.4;}
  100% {opacity: 1;}
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeOut {
  from {opacity: 1;}
  to {opacity: 0;}
}
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div class="loading-spinner"></div>
  <p>霊視を開始しています…</p>
</div>

<div class="container">
  <div class="floating-particles">
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
  </div>
  
  <h1 class="glow-text">個別鑑定</h1>
  <div id="dobBadge" class="badge"></div>

  <label for="question">ご相談内容</label>
  <textarea id="question" placeholder="例）仕事の方向性に迷っています。今後の流れと具体的な一歩を知りたいです。"></textarea>

  <div class="actions">
    <button id="send">鑑定を依頼する</button>
  </div>

  <div id="result" class="out" aria-live="polite"></div>
  
  <!-- 新しい鑑定ボタン（結果表示後に表示） -->
  <div id="newConsultation" style="display: none; margin-top: 30px;">
    <button id="newConsultBtn" class="btn">新しい鑑定を始める</button>
  </div>
</div>

<script>
/* ローディング演出 */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.container').style.opacity = '1';
  }, 500);
});

'use strict';

// --- DOB 必須チェック（無ければ index.html に戻す） -------------------------
(function initDOB(){
  const p = new URLSearchParams(location.search);
  const y = +p.get('year'), m = +p.get('month'), d = +p.get('day');

  if(!(y && m && d)){
    alert("生年月日が未指定です。index.html から入力してお進みください。\n\nテストの場合は:\n deep.html?year=1990&month=4&day=15 で開けます。");
    location.href = "index.html";
    return;
  }

  // 以降の送信用に保存
  window.__DOB__ = { year: y, month: m, day: d };

  // 画面表示
  const badge = document.getElementById('dobBadge');
  badge.style.display = 'inline-block';
  badge.textContent = `生年月日：${y}年${m}月${d}日`;
})();

// --- 送信処理 ---------------------------------------------------------------
// スレッドID: ブラウザ側に保存（無ければ発行）
function getThreadId() {
  const key = "kantei_thread_id";
  let id = localStorage.getItem(key);
  if (!id) {
    id = "t_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    localStorage.setItem(key, id);
  }
  return id;
}

// 履歴: 直近4往復だけを保存/送信
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("kantei_history")||"[]"); }
  catch(e){ return []; }
}
function saveHistory(hist) {
  localStorage.setItem("kantei_history", JSON.stringify(hist.slice(-8)));
}

// 話題変更検出
function detectTopicShift(text){
  return /別件|話題を変える|次の相談|新しい相談|ところで|ちなみに/.test(text);
}

document.getElementById('send').addEventListener('click', async () => {
  const btn = document.getElementById('send');
  const out = document.getElementById('result');
  const questionInput = document.getElementById('question');
  const newConsultation = document.getElementById('newConsultation');
  const api = 'https://syugo-sin-kantei-api.mituo0226.workers.dev/api/consult';
  const category = '総合';
  const question = questionInput.value.trim();

  if(!question){
    alert("ご相談内容を入力してください。");
    return;
  }

  // ローディング画面を表示
  const loader = document.getElementById('loadingScreen');
  loader.style.display = 'flex';

  const topicShift = detectTopicShift(question);
  const history = loadHistory(); // [{role, content}]
  const threadId = getThreadId();

  // 送信ペイロード
  const payload = {
    year: window.__DOB__?.year,
    month: window.__DOB__?.month,
    day: window.__DOB__?.day,
    category,
    question,
    threadId: threadId,
    history: history,   // 直近をAPIに渡す
    topicShift          // ★ 追加
  };

  // 送信前にユーザー発話を履歴に追加（表示テキストから作成）
  history.push({ role: "user", content: question });

  try {
    const res = await fetch(api, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      const text = await res.text().catch(()=> '');
      throw new Error(`API ${res.status} ${res.statusText} ${text?'- '+text:''}`);
    }

    const text = await res.text();
    
    // 成功時の表示テキストの決定ロジックを差し替え
    let display = '';
    try {
      const data = JSON.parse(text);
      if (!res.ok) {
        throw new Error(`API ${res.status} ${res.statusText} ${text?'- '+text:''}`);
      } else {
        if (Array.isArray(data?.paragraphs) && data.paragraphs.length) {
          display = data.paragraphs.join('\n\n'); // APIが段落配列を返す将来拡張にも対応
        } else if (typeof data?.message === 'string') {
          display = toParagraphText(data.message); // ← 段落化してからタイピング
        } else {
          display = toParagraphText(text);
        }
      }
    } catch {
      display = toParagraphText(text);
    }
    
    // ローディング画面を非表示
    loader.style.display = 'none';
    
    // 鑑定フォームを非表示
    questionInput.style.display = 'none';
    btn.style.display = 'none';
    
    // 結果を表示（タイピング演出）
    setTimeout(()=>{ 
      typeWriter(out, display, 30); 
    }, 250);
    
    // 新しい鑑定ボタンを表示
    newConsultation.style.display = 'block';

    // 返信メッセージを履歴に追加（元のメッセージを保存）
    try {
      const data = JSON.parse(text);
      history.push({ role: "assistant", content: data.message || "" });
    } catch {
      history.push({ role: "assistant", content: text });
    }
    saveHistory(history);

  } catch (err) {
    loader.style.display = 'none';
    out.innerHTML = `<span class="err">エラー:</span> ${err.message || err}`;
    btn.disabled = false;
  }
});

// 新しい鑑定を始めるボタンのイベント
document.getElementById('newConsultBtn').addEventListener('click', () => {
  const questionInput = document.getElementById('question');
  const btn = document.getElementById('send');
  const out = document.getElementById('result');
  const newConsultation = document.getElementById('newConsultation');
  
  // フォームをリセット
  questionInput.value = '';
  questionInput.style.display = 'block';
  btn.style.display = 'inline-block';
  btn.disabled = false;
  
  // 結果をクリア
  out.textContent = '';
  
  // 新しい鑑定ボタンを非表示
  newConsultation.style.display = 'none';
  
  // 入力欄にフォーカス
  questionInput.focus();
});



// 追加：段落テキストを作る（タイピング演出用。段落間に空行）
function toParagraphText(text) {
  const t = String(text || '').replace(/\r\n/g, '\n').trim();
  let paras = t.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);
  if (paras.length <= 1) {
    const sents = t.split(/(?<=[。！？])/);
    paras = [];
    for (let i = 0; i < sents.length; ) {
      const take = Math.min(4, Math.max(2, sents.length - i));
      paras.push(sents.slice(i, i + take).join('').trim());
      i += take;
    }
  }
  return paras.join('\n\n');
}

// --- タイプライター演出（result.htmlと同じ表現） ---------------------------
function typeWriter(el, text, speed=80){
  let i = 0;
  el.innerHTML = '';
  (function tick(){
    if(i < text.length){
      el.innerHTML += text.charAt(i++);
      setTimeout(tick, speed);
    }
  })();
}

const CREDIT_KEY = 'ss_credit_minutes';
const getCredit = () => +(sessionStorage.getItem(CREDIT_KEY) || 0);
const setCredit = (v) => sessionStorage.setItem(CREDIT_KEY, Math.max(0, +v));
const useCredit = (m) => setCredit(getCredit() - (+m||0));

// URLに ?add=XX があれば加算（後から追加購入した場合など）
(() => {
  const p = new URLSearchParams(location.search);
  const add = +p.get('add') || 0;
  if (add > 0) setCredit(getCredit() + add);
})();

// 残り時間バッジを表示（フォームのバッジ行に足す）
(function renderCreditBadge(){
  const holder = document.querySelector('.row-2col');
  if (!holder) return;
  const b = document.createElement('span');
  b.className = 'badge';
  b.id = 'creditBadge';
  b.style.marginLeft = '8px';
  b.textContent = `残り鑑定時間：${getCredit()}分`;
  holder.appendChild(b);

  // 送信のたびに5分消費（必要なら値を調整）
  const send = document.getElementById('send');
  send?.addEventListener('click', () => {
    // ここで不足ならアラートして中断する運用にもできる
    // if (getCredit() <= 0) { alert('鑑定時間がありません。追加購入してください。'); return; }
    useCredit(5);
    const badge = document.getElementById('creditBadge');
    if (badge) badge.textContent = `残り鑑定時間：${getCredit()}分`;
  }, { capture: true });
})();
</script>
</body>
</html>
