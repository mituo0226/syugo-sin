<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守護神 個別相談</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-b from-purple-900 to-purple-700 text-white flex flex-col items-center p-4">
    <h1 class="text-2xl font-bold mb-4">守護神 個別相談</h1>

    <textarea id="userInput" class="w-full p-2 rounded bg-purple-800 text-white mb-4" rows="4" placeholder="具体的なお悩みをお聞かせください"></textarea>
    <button id="consultBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded">鑑定する</button>

    <div id="resultArea" class="mt-6 p-4 bg-purple-800 rounded w-full"></div>

    <script>
        // DOMContentLoadedイベントで確実に初期化
        document.addEventListener('DOMContentLoaded', function() {
            const consultBtn = document.getElementById("consultBtn");
            if (consultBtn) {
                consultBtn.addEventListener("click", handleConsult);
            }
        });

        async function handleConsult() {
            const prompt = document.getElementById("userInput").value.trim();
            const resultArea = document.getElementById("resultArea");
            
            if (!prompt) {
                resultArea.textContent = "内容を入力してください。";
                return;
            }

            resultArea.textContent = "鑑定中…";

            try {
                const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({ prompt })
                });

                // レスポンスステータスをチェック
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: サーバーエラーが発生しました`);
                }

                const data = await response.json();
                console.log('APIレスポンス:', data);
                
                // 複数のレスポンス形式に対応
                let result = null;
                if (data.result) {
                    result = data.result;
                } else if (data.answer) {
                    result = data.answer;
                } else if (data.reply) {
                    result = data.reply;
                } else if (data.message) {
                    result = data.message;
                }
                
                if (result) {
                    resultArea.textContent = result;
                } else {
                    resultArea.textContent = "結果が取得できませんでした。";
                }

            } catch (error) {
                console.error('エラー詳細:', error);
                resultArea.textContent = "サーバー通信に失敗しました。";
            }
        }
    </script>
</body>
</html>
