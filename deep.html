<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>相談フォーム | deep.html</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
    body { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .card { border: 1px solid rgba(0,0,0,.1); border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .row { display: grid; gap: 12px; }
    label { font-weight: 600; }
    textarea, input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { padding: 10px 16px; font-size: 16px; border-radius: 8px; border: 0; cursor: pointer; background: #2563eb; color: #fff; }
    button[disabled] { opacity: .6; cursor: not-allowed; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .muted { color: #666; font-size: 13px; }
    .out { white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; border-radius: 8px; min-height: 96px; background: rgba(0,0,0,.02); }
    .row-2col { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .right { text-align: right; }
    .badge { font-size: 12px; border: 1px solid #ddd; padding: 2px 8px; border-radius: 999px; }
    .err { color: #b91c1c; }
    @media (max-width: 640px) {
      body { margin: 16px auto; }
    }
  </style>
</head>
<body>
  <h1>相談フォーム</h1>
  <div class="card row" role="region" aria-label="相談フォーム">
    <div class="row">
      <label for="prompt">相談内容</label>
      <textarea id="prompt" rows="6" placeholder="ここに相談内容を入力してください。例）今の仕事を続けるべきか迷っています。"
        autocomplete="off"></textarea>

      <div class="row-2col">
        <div class="muted">このフォームは <code>Cloudflare Workers → OpenAI</code> を経由して回答します。</div>
        <div class="badge"><span id="count">0</span> 文字</div>
      </div>
    </div>

    <div class="actions">
      <button id="send">送信</button>
      <button id="clear" type="button">クリア</button>
      <span class="muted" id="status" aria-live="polite"></span>
    </div>

    <div class="row">
      <label for="out">回答</label>
      <div id="out" class="out" aria-live="polite">未送信です。</div>
    </div>
  </div>

  <script>
    // === 設定（あなたの Worker API） ===
    const API_URL = 'https://syugo-sin-kantei-api.mituo0226.workers.dev/consult';

    // === 要素参照 ===
    const $ = (s) => document.querySelector(s);
    const promptEl = $('#prompt');
    const sendBtn  = $('#send');
    const clearBtn = $('#clear');
    const outEl    = $('#out');
    const statusEl = $('#status');
    const countEl  = $('#count');

    // 文字数カウンタ
    const updateCount = () => { countEl.textContent = (promptEl.value || '').length; };
    promptEl.addEventListener('input', updateCount);
    updateCount();

    // クリア
    clearBtn.addEventListener('click', () => {
      promptEl.value = '';
      updateCount();
      outEl.textContent = '未送信です。';
      statusEl.textContent = '';
      promptEl.focus();
    });

    // 送信（Enter+Ctrl/Cmdで送信も可）
    promptEl.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        sendBtn.click();
      }
    });

    // メイン送信処理
    sendBtn.addEventListener('click', async () => {
      const prompt = (promptEl.value || '').trim();
      if (!prompt) {
        outEl.innerHTML = '<span class="err">入力が空です。内容を入力してください。</span>';
        promptEl.focus();
        return;
      }

      // UIロック
      sendBtn.disabled = true;
      clearBtn.disabled = true;
      statusEl.textContent = '送信中…';

      try {
        // タイムアウト（30秒）
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 30000);

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
          signal: controller.signal
        }).finally(() => clearTimeout(timer));

        const text = await res.text();

        // まずはHTTPステータスを表示（デバッグ時に役立つ）
        let display = `HTTP ${res.status}\n`;
        try {
          const data = JSON.parse(text);
          if (!res.ok) {
            // エラー時
            display += (data?.error || text || 'エラーが発生しました。');
          } else {
            display += JSON.stringify(data, null, 2);
          }
        } catch {
          display += text; // JSON以外の本文
        }
        outEl.textContent = display;

        // ステータス表示
        if (res.ok) {
          statusEl.textContent = '成功';
        } else {
          statusEl.innerHTML = '<span class="err">エラー</span>';
        }
      } catch (e) {
        outEl.innerHTML = `<span class="err">通信エラー: ${e?.message || e}</span>`;
        statusEl.innerHTML = '<span class="err">通信エラー</span>';
      } finally {
        sendBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
