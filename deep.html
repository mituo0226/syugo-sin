<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神占い｜詳細相談</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
  color: #fff;
  font-family: 'Zen Old Mincho', serif;
  text-align: center;
  padding: 30px;
}
</style>
</head>
<body>
<div class="max-w-lg mx-auto">
<h1 class="text-2xl mb-4">具体的なお悩みをお聞かせください</h1>

<div class="mb-4">
  <textarea id="details" rows="4" class="w-full p-2 bg-gray-800 border border-purple-500 rounded" placeholder="例: 長年の片思いに決着をつけたい..."></textarea>
</div>

<button onclick="divine()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded">鑑定する</button>

<div id="result" class="mt-6 hidden">
  <h2 class="text-xl font-semibold mb-4">鑑定結果</h2>
  <div id="message" class="text-left whitespace-pre-wrap"></div>
</div>
</div>

<script>
document.getElementById("consultForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const message = document.getElementById("userMessage").value;
    const resultDiv = document.getElementById("result");
    resultDiv.textContent = "鑑定中です...";

    try {
        const response = await fetch("https://syugo-sin-kantei-api.mituo0226.workers.dev/consult", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        if (!response.ok) {
            throw new Error("サーバーエラーが発生しました");
        }

        const data = await response.json();
        if (data.reply) {
            resultDiv.textContent = data.reply;
        } else {
            resultDiv.textContent = "結果が取得できませんでした。";
        }
    } catch (error) {
        console.error(error);
        resultDiv.textContent = "サーバー通信に失敗しました。";
    }
});
</script>
</body>
</html>
