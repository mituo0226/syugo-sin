<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神占い｜個別鑑定</title>
<style>
body {
  background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
  color: #fff;
  font-family: 'Zen Old Mincho', serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
  position: relative;
}

/* 霧エフェクト */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(199, 125, 255, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: mistMove 20s ease-in-out infinite;
}

@keyframes mistMove {
  0%, 100% {
    transform: translateX(0) translateY(0);
  }
  25% {
    transform: translateX(-10px) translateY(-5px);
  }
  50% {
    transform: translateX(5px) translateY(-10px);
  }
  75% {
    transform: translateX(-5px) translateY(5px);
  }
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(147,51,234,0.4);
  opacity: 0; /* 最初は非表示 */
  transition: opacity 1s;
  position: relative;
  overflow: hidden;
}

/* 浮遊する光の粒子 */
.floating-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.floating-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: radial-gradient(circle, #c77dff, transparent);
  border-radius: 50%;
  animation: floatAround 8s infinite linear;
}

.floating-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.floating-particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
.floating-particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }
.floating-particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
.floating-particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1s; }
.floating-particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 3s; }

@keyframes floatAround {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translate(20px, -20px) rotate(360deg);
    opacity: 0;
  }
}

.container::before {
  content: '';
  position: absolute;
  top: -20px;
  left: -20px;
  right: -20px;
  bottom: -20px;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.3) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
  z-index: -1;
  border-radius: 16px;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.6;
  }
}

h1 {
  font-size: 1.5em;
  margin-bottom: 0.5em;
}

p {
  margin: 1em 0;
  white-space: pre-wrap;
}

label {
  display: block;
  margin: 16px 0 6px;
  font-weight: 600;
  text-align: left;
}

textarea, select, input[type="text"] {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 1em;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}

.actions {
  margin-top: 18px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  cursor: pointer;
  border: 0;
  border-radius: 10px;
  padding: 12px 18px;
  background: #9d4edd;
  color: white;
  font-weight: 700;
  transition: all 0.3s ease;
}

button:hover {
  background: #c77dff;
  transform: scale(1.05);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.muted {
  font-size: 12px;
  opacity: 0.8;
  color: #b9a9d9;
}

.out {
  margin-top: 22px;
  background: transparent;
  border: none;
  padding: 20px;
  min-height: 200px;
  white-space: pre-wrap;
  line-height: 2;
  text-align: center;
  font-size: 1.1em;
  color: #fff;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
}

.loading {
  display: inline-block;
  width: 1em;
  height: 1em;
  border: 0.18em solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  vertical-align: -2px;
  margin-right: 8px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.hint {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.75;
  color: #b9a9d9;
}

.ok {
  color: #67e8f9;
}

.err {
  color: #fca5a5;
}

.badge {
  display: none;
  font-size: 14px;
  opacity: 0.85;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 8px 10px;
  margin: 8px 0 16px;
}

/* 重要なテキストの光る演出 */
.glow-text {
  animation: textGlow 2s ease-in-out infinite alternate;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
}

@keyframes textGlow {
  0% {
    text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
  }
  100% {
    text-shadow: 0 0 20px rgba(157, 78, 221, 1), 0 0 30px rgba(199, 125, 255, 0.6);
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="floating-particles">
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
  </div>
  
  <h1 class="glow-text">個別鑑定</h1>
  <div id="dobBadge" class="badge"></div>

  <label for="question">ご相談内容</label>
  <textarea id="question" placeholder="例）仕事の方向性に迷っています。今後の流れと具体的な一歩を知りたいです。"></textarea>

  <div class="actions">
    <button id="send">鑑定を依頼する</button>
  </div>

  <div id="result" class="out" aria-live="polite"></div>
</div>

<script>
/* ローディング演出 */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.container').style.opacity = '1';
  }, 500);
});

'use strict';

// --- DOB 必須チェック（無ければ index.html に戻す） -------------------------
(function initDOB(){
  const p = new URLSearchParams(location.search);
  const y = +p.get('year'), m = +p.get('month'), d = +p.get('day');

  if(!(y && m && d)){
    alert("生年月日が未指定です。index.html から入力してお進みください。\n\nテストの場合は:\n deep.html?year=1990&month=4&day=15 で開けます。");
    location.href = "index.html";
    return;
  }

  // 以降の送信用に保存
  window.__DOB__ = { year: y, month: m, day: d };

  // 画面表示
  const badge = document.getElementById('dobBadge');
  badge.style.display = 'inline-block';
  badge.textContent = `生年月日：${y}年${m}月${d}日`;
})();

// --- 送信処理 ---------------------------------------------------------------
// スレッドID: ブラウザ側に保存（無ければ発行）
function getThreadId() {
  const key = "kantei_thread_id";
  let id = localStorage.getItem(key);
  if (!id) {
    id = "t_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    localStorage.setItem(key, id);
  }
  return id;
}

// 履歴: 直近4往復だけを保存/送信
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("kantei_history")||"[]"); }
  catch(e){ return []; }
}
function saveHistory(hist) {
  localStorage.setItem("kantei_history", JSON.stringify(hist.slice(-8)));
}

// 話題変更検出
function detectTopicShift(text){
  return /別件|話題を変える|次の相談|新しい相談|ところで|ちなみに/.test(text);
}

document.getElementById('send').addEventListener('click', async () => {
  const btn = document.getElementById('send');
  const out = document.getElementById('result');
  const api = 'https://syugo-sin-kantei-api.mituo0226.workers.dev/api/consult';
  const category = '総合';
  const question = document.getElementById('question').value.trim();

  if(!question){
    alert("ご相談内容を入力してください。");
    return;
  }

  // 表示を「鑑定中…」に
  btn.disabled = true;
  out.innerHTML = `<span class="loading"></span>鑑定中です。しばらくお待ちください…`;

  const topicShift = detectTopicShift(question);
  const history = loadHistory(); // [{role, content}]
  const threadId = getThreadId();

  // 送信ペイロード
  const payload = {
    year: window.__DOB__?.year,
    month: window.__DOB__?.month,
    day: window.__DOB__?.day,
    category,
    question,
    threadId: threadId,
    history: history,   // 直近をAPIに渡す
    topicShift          // ★ 追加
  };

  // 送信前にユーザー発話を履歴に追加（表示テキストから作成）
  history.push({ role: "user", content: question });

  try {
    const res = await fetch(api, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      const text = await res.text().catch(()=> '');
      throw new Error(`API ${res.status} ${res.statusText} ${text?'- '+text:''}`);
    }

    const data = await res.json();
    const msg = (data && (data.message || data.reply)) ? (data.message || data.reply) : JSON.stringify(data, null, 2);
    typeWriter(out, msg);

    // 返信メッセージを履歴に追加
    history.push({ role: "assistant", content: data.message || "" });
    saveHistory(history);

  } catch (err) {
    out.innerHTML = `<span class="err">エラー:</span> ${err.message || err}`;
  } finally {
    btn.disabled = false;
  }
});



// --- タイプライター演出（読みやすさのため軽めに） ---------------------------
function typeWriter(el, text){
  el.textContent = '';
  let i = 0;
  (function tick(){
    if(i < text.length){
      el.textContent += text.charAt(i++);
      setTimeout(tick, 18);
    }
  })();
}
</script>
</body>
</html>
