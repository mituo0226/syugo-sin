<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>霊視結果のご用意ができました｜龍の鑑定 確認</title>
<style>
  :root{
    --bg:#140b25; --panel:#281a4b; --ink:#f3eaff; --muted:#b9a9d9; --accent:#8b5cf6;
    --lead-bg:#2f2b77; --lead-ink:#d7e6ff;
  }
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Segoe UI,Roboto,Arial,Meiryo,sans-serif}
  .wrap{max-width:900px;margin:56px auto;padding:0 20px}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.35);padding:40px}
  h1{font-size:28px;text-align:center;margin:0 0 12px;font-weight:700;letter-spacing:.08em}
  .meta{color:var(--muted);text-align:center;margin-bottom:18px}
  .lead{
    background:var(--lead-bg);color:var(--lead-ink);
    border-radius:12px;padding:14px 16px;line-height:1.8;margin:18px 0 14px;font-weight:600
  }
  .mosaic{
    position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
    border-radius:14px;padding:22px;min-height:220px;line-height:1.9
  }
  .mosaic.is-blurred .mosaic__veil{
    position:absolute;inset:0;background:rgba(20,11,37,.45);backdrop-filter:blur(8px);
    border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;
    text-align:center;padding:18px;font-weight:600
  }
  .actions{margin-top:22px;text-align:center}
  .btn{appearance:none;border:none;background:var(--accent);color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;cursor:pointer}
  .note{margin:22px 0;color:var(--muted);text-align:center}
  .back{display:inline-block;margin-top:10px;color:#cdbaf7;text-decoration:underline}
  code.badge{background:#3a2f65;color:#e9e3ff;border-radius:999px;padding:4px 10px;font-size:12px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>霊視結果のご用意ができました</h1>
    <div class="meta">
      <div>【相談ジャンル】<span id="viewCategory">—</span></div>
      <div>【ご相談内容】<span id="viewQuestion">—</span></div>
      <div id="dobBadge" class="meta"></div>
    </div>

    <!-- 常に見える固定二行 -->
    <div class="lead">
      あなたが抱える問題は、過去の因縁と深く繋がっています。<br />
      その因縁は、今この瞬間もあなたの行動や選択を支配しています。
    </div>

    <!-- モザイク領域（paid=1 で解除／未入金は定型文＋ぼかしのまま） -->
    <div id="mosaic" class="mosaic is-blurred">
      <div id="mosaicContent"></div>
      <div class="mosaic__veil" id="veil">この先は有料区画です。<br/>お支払い完了後に全文が表示されます。</div>
    </div>

    <div class="actions">
      <button id="toDeep" class="btn">さらに詳しい個別鑑定へ進む</button>
      <a id="backLink" href="index.html" class="back">最初のページに戻る</a>
      <div class="note">本日中のご購入で守護神の護符画像を進呈 <code class="badge">特典</code></div>
    </div>
  </div>
</div>

<script>
(function(){
  const q = new URLSearchParams(location.search);
  const year  = +q.get('year');
  const month = +q.get('month');
  const day   = +q.get('day');
  const paid  = q.get('paid') === '1';
  const category = q.get('category') || q.get('cat') || '総合';
  const question = q.get('text') || q.get('question') || '';

  const apiEndpoint = q.get('api') || 'https://syugo-sin-kantei-api.mituo0226.workers.dev/api/consult';

  // 表示
  document.getElementById('viewCategory').textContent = category;
  document.getElementById('viewQuestion').textContent = question || '—';
  const dobBadge = document.getElementById('dobBadge');
  if (year && month && day) dobBadge.textContent = `生年月日：${year}年${month}月${day}日`;

  // deep.html へ誘導（クエリ引き継ぎ）
  const deepUrl = `deep.html?year=${year}&month=${month}&day=${day}&category=${encodeURIComponent(category)}`;
  document.getElementById('toDeep').addEventListener('click', ()=> location.href = deepUrl);

  // モザイク本文の描画関数
  const contentEl = document.getElementById('mosaicContent');
  const mosaicEl  = document.getElementById('mosaic');
  const veilEl    = document.getElementById('veil');

  // 未入金：APIは呼ばず、定型文のみ（コスト回避）
  const TEMPLATE = `あなたの内側に繰り返し現れる迷いは、日々の選択の癖と深く結びついております。
一度立ち止まり、心身のリズムを整え、言葉・行動・環境のいずれから小さな修正を始めてください。
三日・七日・二十一日の周期で見直すほど、因縁の結び目はほどけてまいります。`;

  if (!paid) {
    contentEl.textContent = TEMPLATE;
    // ぼかしは維持（is-blurredのまま）
    return;
  }

  // 入金済み：APIを呼んで本文を差し替え、モザイク解除
  if (!(year && month && day)) {
    contentEl.textContent = '生年月日が不足しています。最初のページからやり直してください。';
    return;
  }

  // deep.html と同じ鑑定APIに投げる
  (async ()=>{
    try{
      const res = await fetch(apiEndpoint, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          year, month, day,
          category,
          question,
          // confirmでは初回扱いで十分なので履歴は送らない（コスト最小化＆確実性）
          history: [],
          threadId: `confirm_${Date.now()}`
        })
      });
      if(!res.ok){
        contentEl.textContent = `鑑定文の取得に失敗しました（${res.status}）`;
        return;
      }
      const data = await res.json();
      contentEl.textContent = (data && data.message) ? data.message : '鑑定文を取得できませんでした。';
      // モザイク解除
      mosaicEl.classList.remove('is-blurred');
      if (veilEl) veilEl.remove();
    }catch(e){
      contentEl.textContent = '通信エラーにより鑑定文の取得に失敗しました。時間をおいてお試しください。';
    }
  })();
})();
</script>
</body>
</html>
