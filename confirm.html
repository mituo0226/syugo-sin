<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守護神占い｜霊視結果確認</title>
<style>
body {
  background: linear-gradient(to bottom, #1a0b2e, #2e1a47);
  color: #fff;
  font-family: 'Zen Old Mincho', serif;
  text-align: center;
  padding: 30px;
  overflow-x: hidden;
  position: relative;
}

/* 霧エフェクト */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(199, 125, 255, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(255, 107, 157, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: mistMove 20s ease-in-out infinite;
}

@keyframes mistMove {
  0%, 100% {
    transform: translateX(0) translateY(0);
  }
  25% {
    transform: translateX(-10px) translateY(-5px);
  }
  50% {
    transform: translateX(5px) translateY(-10px);
  }
  75% {
    transform: translateX(-5px) translateY(5px);
  }
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(147,51,234,0.4);
  opacity: 0; /* 最初は非表示 */
  transition: opacity 1s;
  position: relative;
  overflow: hidden;
}

/* 浮遊する光の粒子 */
.floating-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.floating-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: radial-gradient(circle, #c77dff, transparent);
  border-radius: 50%;
  animation: floatAround 8s infinite linear;
}

.floating-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.floating-particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 2s; }
.floating-particle:nth-child(3) { left: 20%; top: 70%; animation-delay: 4s; }
.floating-particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 6s; }
.floating-particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1s; }
.floating-particle:nth-child(6) { left: 30%; top: 60%; animation-delay: 3s; }

@keyframes floatAround {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translate(20px, -20px) rotate(360deg);
    opacity: 0;
  }
}

.container::before {
  content: '';
  position: absolute;
  top: -20px;
  left: -20px;
  right: -20px;
  bottom: -20px;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.3) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
  z-index: -1;
  border-radius: 16px;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.6;
  }
}

h1 {
  font-size: 1.5em;
  margin-bottom: 0.5em;
}

p {
  margin: 1em 0;
  white-space: pre-wrap;
}

.meta {
  color: #b9a9d9;
  text-align: center;
  margin-bottom: 18px;
  font-size: 0.9em;
}

.lead {
  background: rgba(47, 43, 119, 0.6);
  color: #d7e6ff;
  border-radius: 12px;
  padding: 14px 16px;
  line-height: 1.8;
  margin: 18px 0 14px;
  font-weight: 600;
}

.mosaic {
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 22px;
  min-height: 220px;
  line-height: 1.9;
  margin: 20px 0;
}

.mosaic.is-blurred .mosaic__veil {
  position: absolute;
  inset: 0;
  background: rgba(20,11,37,0.45);
  backdrop-filter: blur(8px);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  padding: 18px;
  font-weight: 600;
}

.actions {
  margin-top: 22px;
  text-align: center;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: #9d4edd;
  color: #fff;
  border: none;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background: #c77dff;
  transform: scale(1.05);
}

.note {
  margin: 22px 0;
  color: #b9a9d9;
  text-align: center;
  font-size: 0.9em;
}

.back {
  display: inline-block;
  margin-top: 10px;
  color: #9d4edd;
  text-decoration: underline;
}

.badge {
  background: #3a2f65;
  color: #e9e3ff;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  margin-left: 6px;
}

/* 重要なテキストの光る演出 */
.glow-text {
  animation: textGlow 2s ease-in-out infinite alternate;
  text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
}

@keyframes textGlow {
  0% {
    text-shadow: 0 0 10px rgba(157, 78, 221, 0.8);
  }
  100% {
    text-shadow: 0 0 20px rgba(157, 78, 221, 1), 0 0 30px rgba(199, 125, 255, 0.6);
  }
}

/* 幻想的なローディングアニメーション */
#loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  animation: fadeIn 1s forwards;
  overflow: hidden;
}

.particles, .mystical-orbs {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, #9d4edd, transparent);
  border-radius: 50%;
  animation: float 6s infinite linear;
}

.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 20%; animation-delay: 1s; }
.particle:nth-child(3) { left: 30%; animation-delay: 2s; }
.particle:nth-child(4) { left: 40%; animation-delay: 3s; }
.particle:nth-child(5) { left: 50%; animation-delay: 4s; }
.particle:nth-child(6) { left: 60%; animation-delay: 5s; }
.particle:nth-child(7) { left: 70%; animation-delay: 0.5s; }
.particle:nth-child(8) { left: 80%; animation-delay: 1.5s; }
.particle:nth-child(9) { left: 90%; animation-delay: 2.5s; }
.particle:nth-child(10) { left: 15%; animation-delay: 3.5s; }

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100px) rotate(360deg);
    opacity: 0;
  }
}

.orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(157,78,221,0.8), transparent);
  box-shadow: 0 0 20px rgba(157,78,221,0.6);
  animation: orbFloat 4s ease-in-out infinite;
}

.orb1 {
  width: 30px;
  height: 30px;
  top: 20%;
  left: 20%;
  animation-delay: 0s;
}

.orb2 {
  width: 20px;
  height: 20px;
  top: 60%;
  right: 25%;
  animation-delay: 1.5s;
  background: radial-gradient(circle, rgba(199,125,255,0.8), transparent);
  box-shadow: 0 0 15px rgba(199,125,255,0.6);
}

.orb3 {
  width: 25px;
  height: 25px;
  bottom: 30%;
  left: 60%;
  animation-delay: 3s;
  background: radial-gradient(circle, rgba(255,107,157,0.8), transparent);
  box-shadow: 0 0 18px rgba(255,107,157,0.6);
}

@keyframes orbFloat {
  0%, 100% {
    transform: translateY(0) scale(1);
    opacity: 0.7;
  }
  25% {
    transform: translateY(-20px) scale(1.2);
    opacity: 1;
  }
  50% {
    transform: translateY(-10px) scale(0.8);
    opacity: 0.5;
  }
  75% {
    transform: translateY(-30px) scale(1.1);
    opacity: 0.9;
  }
}

#loadingScreen p {
  color: #fff;
  font-size: 1.2em;
  margin-top: 1em;
  animation: blink 1.5s infinite;
}

.loading-spinner {
  width: 100px;
  height: 100px;
  position: relative;
  margin: 0 auto;
}

.loading-spinner::before,
.loading-spinner::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent, #9d4edd, #c77dff, #ff6b9d, transparent);
  animation: spiral 3s linear infinite;
}

.loading-spinner::before {
  filter: blur(2px);
  opacity: 0.7;
}

.loading-spinner::after {
  animation: spiral 2s linear infinite reverse;
  filter: blur(1px);
  opacity: 0.9;
  width: 80%;
  height: 80%;
  top: 10%;
  left: 10%;
}

@keyframes spiral {
  0% {
    transform: rotate(0deg) scale(1);
    filter: hue-rotate(0deg);
  }
  25% {
    transform: rotate(90deg) scale(1.1);
    filter: hue-rotate(90deg);
  }
  50% {
    transform: rotate(180deg) scale(0.9);
    filter: hue-rotate(180deg);
  }
  75% {
    transform: rotate(270deg) scale(1.1);
    filter: hue-rotate(270deg);
  }
  100% {
    transform: rotate(360deg) scale(1);
    filter: hue-rotate(360deg);
  }
}

@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.4;}
  100% {opacity: 1;}
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeOut {
  from {opacity: 1;}
  to {opacity: 0;}
}
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="mystical-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="loading-spinner"></div>
  <p>神託を降ろしています…</p>
</div>

<div class="container">
  <div class="floating-particles">
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
    <div class="floating-particle"></div>
  </div>
  
  <h1 class="glow-text">霊視結果のご用意ができました</h1>
  
  <!-- h1 のすぐ下あたりに以下を追加 -->
  <p id="purchasedPlan" style="opacity:.9;margin-top:.2em"></p>
  
  <div class="meta">
    <div>【相談ジャンル】<span id="viewCategory">—</span></div>
    <div>【ご相談内容】<span id="viewQuestion">—</span></div>
    <div id="dobBadge" class="meta"></div>
  </div>

  <!-- 常に見える固定二行 -->
  <p>
    あなたが抱える問題は、過去の因縁と深く繋がっています。<br />
    その因縁は、今この瞬間もあなたの行動や選択を支配しています。
  </p>

  <!-- モザイク領域（paid=1 で解除／未入金は定型文＋ぼかしのまま） -->
  <div id="mosaic" class="mosaic is-blurred">
    <div id="mosaicContent"></div>
    <div class="mosaic__veil" id="veil">この先は有料区画です。<br/>お支払い完了後に全文が表示されます。</div>
  </div>

  <!-- h1の近くに（残り時間バッジ＆ボタンを出す置き場） -->
  <p id="creditInfo" style="display:none;opacity:.9;margin:.5em 0"></p>
  <p id="toDeepWrap" style="display:none">
    <a id="toDeepLink" class="purchase-button" href="deep.html">個別鑑定に進む</a>
  </p>

  <div class="actions">
    <button id="toDeepBtn" class="btn">全文を読む</button>
    <a id="backLink" href="index.html" class="back">最初のページに戻る</a>
    <div class="note">本日中のご購入で守護神の護符画像を進呈 <span class="badge">特典</span></div>
  </div>
</div>

<script>
/* ローディング演出 */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.container').style.opacity = '1';
  }, 500);
});

(function(){
  const q = new URLSearchParams(location.search);
  const year  = +q.get('year');
  const month = +q.get('month');
  const day   = +q.get('day');
  const paid  = q.get('paid') === '1';
  const category = q.get('category') || q.get('cat') || '総合';
  const question = q.get('text') || q.get('question') || '';

  const apiEndpoint = q.get('api') || 'https://syugo-sin-kantei-api.mituo0226.workers.dev/api/consult';

  // 既存の params 取得の直後に追記
  const planMap = {
    P5:"お試し5分（¥1,000）",
    P10:"お手軽10分（¥3,000）",
    P30:"人気ナンバーワン30分（¥5,000）",
    P60:"お買い得60分（¥8,000）",
    P120:"超お買い得120分（¥12,000）",
    P240:"まとめ買い超お得240分（¥20,000）"
  };
  const planId = new URLSearchParams(location.search).get('plan');
  if (planId && planMap[planId]) {
    const el = document.getElementById('purchasedPlan');
    el.textContent = `ご購入プラン：${planMap[planId]}`;
  }

  // 表示
  document.getElementById('viewCategory').textContent = category;
  document.getElementById('viewQuestion').textContent = question || '—';
  const dobBadge = document.getElementById('dobBadge');
  if (year && month && day) dobBadge.textContent = `生年月日：${year}年${month}月${day}日`;

  // ボタンの設定（paid=1の場合は鑑定を進める、そうでなければ全文を読む）
  const btn = document.getElementById('toDeepBtn');
  
  if (paid) {
    // モザイクが外れた場合：鑑定を進める
    btn.textContent = '鑑定を進める';
    const deepUrl = `deep.html?year=${year}&month=${month}&day=${day}&category=${encodeURIComponent(category)}`;
    btn.addEventListener('click', ()=> location.href = deepUrl);
  } else {
    // モザイクがかかっている場合：全文を読む
    btn.textContent = '全文を読む';
    const purchaseUrl = `purchase.html?year=${year}&month=${month}&day=${day}&category=${encodeURIComponent(category)}&question=${encodeURIComponent(question)}`;
    btn.addEventListener('click', ()=> location.href = purchaseUrl);
  }

  // 追加：段落レンダリング関数（空行で<p>を作る。空行が無ければ句点でまとめる）
  function renderParagraphsFrom(text) {
    const t = String(text || '').replace(/\r\n/g, '\n').trim();
    let paras = t.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);

    if (paras.length <= 1) {
      // 空行が無いときは句点区切りを2〜4文ずつ束ねて段落化
      const sents = t.split(/(?<=[。！？])/);
      paras = [];
      for (let i = 0; i < sents.length; ) {
        const take = Math.min(4, Math.max(2, sents.length - i));
        paras.push(sents.slice(i, i + take).join('').trim());
        i += take;
      }
    }
    return paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }

  // モザイク本文の描画関数
  const contentEl = document.getElementById('mosaicContent');
  const mosaicEl  = document.getElementById('mosaic');
  const veilEl    = document.getElementById('veil');

  // 未入金：APIは呼ばず、定型文のみ（コスト回避）
  const TEMPLATE = `あなたの内側に繰り返し現れる迷いは、日々の選択の癖と深く結びついております。
一度立ち止まり、心身のリズムを整え、言葉・行動・環境のいずれから小さな修正を始めてください。
三日・七日・二十一日の周期で見直すほど、因縁の結び目はほどけてまいります。`;

  // 入金済み：APIを呼んで本文を差し替え、モザイク解除
  if (!(year && month && day)) {
    contentEl.textContent = '生年月日が不足しています。最初のページからやり直してください。';
    return;
  }

  if (!paid) {
    contentEl.textContent = TEMPLATE;
    // ぼかしは維持（is-blurredのまま）
    // 早期リターンを削除してボタン設定を確実に実行
    return; // 未入金の場合はここで終了
  }

  // 入金済みの場合のみAPIを呼び出す
  (async ()=>{
    // ローディングアニメーションを表示
    const loader = document.getElementById('loadingScreen');
    loader.style.display = 'flex';
    
    try{
      const res = await fetch(apiEndpoint, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          year, month, day,
          category,
          text: question,
          // confirmでは初回扱いで十分なので履歴は送らない（コスト最小化＆確実性）
          history: [],
          threadId: `confirm_${Date.now()}`
        })
      });
      if(!res.ok){
        contentEl.textContent = `鑑定文の取得に失敗しました（${res.status}）`;
        loader.style.display = 'none';
        return;
      }
      const data = await res.json();
      const message = (data && data.message) ? data.message : '鑑定文を取得できませんでした。';
      
      // ★ モザイク解除＋本文差し替え（段落対応）
      mosaicEl.classList.remove('is-blurred');
      contentEl.innerHTML = renderParagraphsFrom(message);
      
      // ローディングアニメーションをフェードアウト
      loader.style.animation = 'fadeOut 1s forwards';
      setTimeout(() => {
        loader.style.display = 'none';
        if (veilEl) veilEl.remove();
      }, 1000);
      
    }catch(e){
      contentEl.textContent = '通信エラーにより鑑定文の取得に失敗しました。時間をおいてお試しください。';
      loader.style.display = 'none';
    }
  })();
})();
</script>

<script>
(function(){
  const CREDIT_KEY = 'ss_credit_minutes';
  const p = new URLSearchParams(location.search);
  const min = +p.get('min') || 0;

  // URLにminがあれば上書き保存（購入チケットの分数を持つ）
  if (min > 0) sessionStorage.setItem(CREDIT_KEY, String(min));

  // いまの残り分数を取得
  const cur = +(sessionStorage.getItem(CREDIT_KEY) || 0);

  // 残分があるならバッジ表示＆「個別鑑定へ」ボタン表示
  if (cur > 0) {
    const info = document.getElementById('creditInfo');
    info.textContent = `残り鑑定時間：${cur}分`;
    info.style.display = 'block';

    const toDeepWrap = document.getElementById('toDeepWrap');
    toDeepWrap.style.display = 'block';
  }
})();
</script>
</body>
</html>
