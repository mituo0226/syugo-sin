<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神アドバイス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .hero img {
      max-width: 360px;
      opacity: 0;
      transform: scale(0.95);
      transition: all 2s ease;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,150,255,0.5);
    }
    #storyText {
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 800px;
      margin: 30px auto;
      white-space: pre-line;
      text-align: left;
      opacity: 0;
    }
    #storyText p { margin: 15px 0; }

    /* 生年月日入力フォーム */
    .birth-form {
      margin-top: 40px;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .birth-form label {
      display: block;
      margin: 10px 0 5px;
      color: #99ccff;
      text-align: left;
    }
    .birth-form select {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      font-size: 1em;
      background: rgba(255,255,255,0.1);
      color: #fff;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }
    #year { width: 10ch; }
    #month, #day { width: 8ch; }

    .birth-form button {
      padding: 14px 40px;
      font-size: 1.2em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }
    .birth-form button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- 龍の画像 -->
    <img src="https://syugo-sin.com/photo/ryu.png" alt="AI鑑定師 龍" id="ryuImage">

    <!-- セリフ表示 -->
    <div id="storyText"></div>

    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <label for="year">西暦</label>
      <select id="year" required></select>

      <label for="month">月</label>
      <select id="month" required></select>

      <label for="day">日</label>
      <select id="day" required></select>

      <button type="submit">守護神を導き出す</button>
    </form>
  </section>

  <script>
    // 龍のセリフ
    const lines = [
      "私の名前は龍、実在する人間ではなくAIによって制作された架空の鑑定師。",
      "実在する人間ではないから信用できるわけがない…なんて思わないでほしい。",
      "世の中には悩み多き相談者を利用し、いい加減な鑑定で騙す人間が数多くいる。",
      "その点、私はAI。膨大な情報から、誰よりも適切なアドバイスを導き出せる。",
      "まずは、あなたの生年月日を教えてくれ。そこから守護神を導き出そう。"
    ];
    let i = 0;
    const storyText = document.getElementById("storyText");

    function showNextLine() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            i++;
            setTimeout(showNextLine, 1200);
          }
        }, 50);
      } else {
        // フォームをフェードイン
        document.querySelector(".birth-form").style.opacity = 1;
      }
    }

    // ページロード後の演出
    window.addEventListener("load", () => {
      const img = document.getElementById("ryuImage");
      setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "scale(1)";
        setTimeout(showNextLine, 1500);
      }, 800);
    });

    // 西暦プルダウン（1900〜2025）
    const yearSelect = document.getElementById("year");
    for (let y = 2025; y >= 1900; y--) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }
    // 月プルダウン
    const monthSelect = document.getElementById("month");
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      monthSelect.appendChild(opt);
    }
    // 日プルダウン
    const daySelect = document.getElementById("day");
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      daySelect.appendChild(opt);
    }

    // フォーム送信で result.html に遷移
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const y = yearSelect.value;
      const m = monthSelect.value;
      const d = daySelect.value;
      window.location.href = `result.html?year=${y}&month=${m}&day=${d}`;
    });
  </script>
</body>
</html>
