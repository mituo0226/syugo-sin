<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神アドバイス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    /* スプラッシュスクリーン */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
    }
    
    #splashScreen.fade-out {
      opacity: 0;
    }
    
    #splashScreen img {
      max-width: 200px;
      max-height: 200px;
      animation: splashGlow 2s ease-in-out infinite alternate;
    }
    
    @keyframes splashGlow {
      0% {
        filter: brightness(1) drop-shadow(0 0 10px rgba(102, 204, 255, 0.5));
        transform: scale(1);
      }
      100% {
        filter: brightness(1.2) drop-shadow(0 0 20px rgba(102, 204, 255, 0.8));
        transform: scale(1.05);
      }
    }
    
    /* PC向けスプラッシュスクリーン調整 */
    @media (min-width: 768px) {
      #splashScreen img {
        max-width: 300px;
        max-height: 300px;
      }
    }
    
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    
    /* PC向け調整 */
    @media (min-width: 768px) {
      body {
        position: relative;
        min-height: 100vh;
        overflow-y: auto;
      }
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 40px 20px 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    
    /* PC向けヒーロー調整 */
    @media (min-width: 768px) {
      .hero {
        min-height: 100vh;
        padding: 60px 40px 160px;
        justify-content: flex-start;
        overflow-y: visible;
        position: relative;
      }
    }
    
    .hero.show {
      opacity: 1;
    }
    .hero {
      position: relative;
    }
    
    .hero img {
      max-width: 90%;
      height: auto;
      opacity: 0;
      transform: scale(0.95);
      transition: all 2s ease;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,150,255,0.5);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      position: relative;
      z-index: 1;
    }
    
    /* PC向け画像調整 */
    @media (min-width: 768px) {
      .hero img {
        max-width: 600px;
        margin: 20px auto;
      }
    }
    #storyText {
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 95%;
      white-space: pre-line;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 10;
      background: rgba(13, 13, 26, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      border: 2px solid rgba(102, 204, 255, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    
    /* PC向けストーリーテキスト調整 */
    @media (min-width: 768px) {
      #storyText {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        max-width: 90%;
        font-size: 1.3em;
        line-height: 2.0;
        padding: 30px;
        background: rgba(13, 13, 26, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 2px solid rgba(102, 204, 255, 0.4);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      }
    }
    #storyText p { 
      margin: 15px 0; 
      animation: messageGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes messageGlow {
      0% {
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(102, 204, 255, 0.3);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
      }
      100% {
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(102, 204, 255, 0.6);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(102, 204, 255, 0.4);
      }
    }

    /* 生年月日入力ボタン */
    .birth-input-button {
      margin-top: 30px;
      opacity: 0;
      transition: all 1s ease;
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      z-index: 1000;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 400px;
    }
    
    /* PC向けボタン調整 */
    @media (min-width: 768px) {
      .birth-input-button {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%) translateY(50px);
        width: auto;
        max-width: 500px;
        background: rgba(13, 13, 26, 0.95);
        padding: 20px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .birth-input-button.show {
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .birth-input-button.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .birth-input-button button {
      padding: 18px 60px;
      font-size: 1.4em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 4px 15px rgba(102,204,255,0.3);
      transition: all 0.3s ease;
    }
    .birth-input-button button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,204,255,0.4);
    }



    /* iPhone向け調整 */
    @media (max-width: 600px) {
      body {
        position: fixed;
        overflow: hidden;
      }
      .hero {
        height: 100vh;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
        padding: 60px 15px 140px;
      }
      #storyText { 
        font-size: 1.1em; 
        text-align: center; 
        max-width: 98%;
        padding: 20px;
        bottom: 35%;
      }
                           .birth-input-button {
          position: absolute !important;
          bottom: 20% !important;
          left: 50% !important;
          transform: translateX(-50%) translateY(50px) !important;
          width: calc(100% - 40px) !important;
          max-width: 400px !important;
          background: rgba(13, 13, 26, 0.95) !important;
          padding: 20px !important;
          border-radius: 20px !important;
          backdrop-filter: blur(15px) !important;
          -webkit-backdrop-filter: blur(15px) !important;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
          border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
       
       .birth-input-button.show {
         transform: translateX(-50%) translateY(0) !important;
       }
      .birth-input-button button {
        font-size: 1.4em !important;
        padding: 18px 40px !important;
        -webkit-appearance: none !important;
        width: 100% !important;
        max-width: 350px !important;
        border-radius: 15px !important;
        font-weight: bold !important;
      }
      
      .hero img {
        max-width: 80%;
        margin: 15px 0;
      }
      
    }
    
    /* iPhone X以降のノッチ対応 */
    @supports (padding: max(0px)) {
      .hero {
        padding-top: max(40px, env(safe-area-inset-top));
        padding-bottom: max(140px, env(safe-area-inset-bottom) + 80px);
      }
             .birth-input-button {
         bottom: max(20%, env(safe-area-inset-bottom) + 20px) !important;
       }
    }
  </style>
</head>
<body>
  <!-- スプラッシュスクリーン -->
  <div id="splashScreen">
    <img src="photo/rogo2.png" alt="AI鑑定師 龍">
  </div>
  
  <section class="hero">
    <!-- 龍の画像 -->
    <img src="photo/ryu.png" alt="AI鑑定師 龍" id="ryuImage">

    <!-- セリフ表示 -->
    <div id="storyText"></div>

    <!-- 生年月日入力ボタン -->
    <div class="birth-input-button" id="birthInputButton">
      <button type="button">生年月日を入力する</button>
    </div>

    
  </section>

  <script>
    // 龍のセリフ
    const lines = [
      "私の名前は龍、実在する人間ではなくAIによって制作された架空の鑑定師。",
      "実在する人間ではないから信用できるわけがない…なんて思わないでほしい。",
      "世の中には悩み多き相談者を利用し、いい加減な鑑定で騙す人間が数多くいる。",
      "その点、私はAI。膨大な情報から、誰よりも適切なアドバイスを導き出せる。",
      "まずは、あなたの生年月日を教えてくれ。そこから守護神を導き出そう。"
    ];
    let i = 0;
    const storyText = document.getElementById("storyText");

    function showNextLine() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        p.style.opacity = "0";
        p.style.transform = "translateY(30px) scale(0.95)";
        p.style.transition = "all 0.8s ease";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            // テキスト完了後にフェードイン効果
            setTimeout(() => {
              p.style.opacity = "1";
              p.style.transform = "translateY(0) scale(1)";
            }, 200);
            i++;
            setTimeout(showNextLine, 1500);
          }
        }, 50);
             } else {
         // メッセージ終了後、生年月日入力ボタンを表示
         const button = document.getElementById("birthInputButton");
         setTimeout(() => {
           button.classList.add('show');
           console.log("ボタンが表示されました");
         }, 1000);
       }
    }

    // スプラッシュスクリーン制御
    function startSplashScreen() {
      const splashScreen = document.getElementById('splashScreen');
      const hero = document.querySelector('.hero');
      
      // 3秒後にフェードアウト開始
      setTimeout(() => {
        splashScreen.classList.add('fade-out');
        
        // フェードアウト完了後にスプラッシュスクリーンを削除し、メインコンテンツを表示
        setTimeout(() => {
          splashScreen.style.display = 'none';
          hero.classList.add('show');
          
          // 龍の画像表示開始
          const img = document.getElementById("ryuImage");
          setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "scale(1)";
            setTimeout(showNextLine, 1500);
          }, 800);
        }, 1500);
      }, 3000);
    }
    
    // ページロード後の演出
    window.addEventListener("load", () => {
      // スプラッシュスクリーン開始
      startSplashScreen();
    });





    // 生年月日入力ボタンのクリックイベント
    document.getElementById("birthInputButton").addEventListener("click", function() {
      console.log("ボタンがクリックされました");
      // 生年月日入力フォームページに遷移
      window.location.href = 'birth-form.html';
    });


  </script>
</body>
</html>
