<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神アドバイス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* iOS スムーズスクロール */
      touch-action: manipulation; /* iPhone タッチ最適化 */
      position: fixed;
      width: 100%;
      height: 100%;
    }
    .hero {
      min-height: 100vh; /* iPhone対応 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* 上から配置 */
      text-align: center;
      padding: 60px 20px 120px; /* 下部にボタン用の余白を増加 */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      z-index: 1;
    }
    .hero img {
      max-width: 90%; /* スマホで自然に縮小 */
      height: auto;
      opacity: 0;
      transform: scale(0.95);
      transition: all 2s ease;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,150,255,0.5);
      user-select: none; /* 画像選択を無効化 */
      -webkit-user-select: none;
      -webkit-touch-callout: none; /* iOS 長押しメニューを無効化 */
    }
    #storyText {
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 800px;
      margin: 30px auto;
      white-space: pre-line;
      text-align: left;
      opacity: 0;
    }
    #storyText p { margin: 15px 0; }

    /* 生年月日入力ボタン */
    .birth-input-button {
      margin-top: 30px;
      opacity: 0;
      transition: opacity 1s ease;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 400px;
    }
    .birth-input-button button {
      padding: 18px 60px;
      font-size: 1.4em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 4px 15px rgba(102,204,255,0.3);
      transition: all 0.3s ease;
    }
    .birth-input-button button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,204,255,0.4);
    }

    /* 生年月日入力フォーム */
    .birth-form {
      margin-top: 40px;
      opacity: 0;
      transition: opacity 1.5s ease;
      display: none; /* 初期状態では非表示 */
    }
    .birth-form label {
      display: block;
      margin: 10px 0 5px;
      color: #99ccff;
      text-align: left;
    }
    .birth-form select {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      font-size: 1em;
      background: rgba(255,255,255,0.1);
      color: #fff;
      box-shadow: inset 0 0 5px rgba(102,204,255,0.4);
    }
    #year { width: 10ch; }
    #month, #day { width: 8ch; }

    .birth-form button {
      padding: 14px 40px;
      font-size: 1.2em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }
    .birth-form button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: scale(1.05);
    }

            /* iPhone向け調整 */
    @media (max-width: 600px) {
      body {
        position: fixed;
        overflow: hidden;
      }
      .hero {
        height: 100vh;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
        padding: 80px 15px 140px; /* 下部にボタン用の余白を増加 */
      }
      #storyText { 
        font-size: 1.1em; 
        text-align: center; 
        margin: 20px auto;
      }
      .birth-input-button {
        position: fixed !important;
        bottom: 30px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: calc(100% - 40px) !important;
        max-width: 400px !important;
        background: rgba(13, 13, 26, 0.95) !important;
        padding: 20px !important;
        border-radius: 20px !important;
        backdrop-filter: blur(15px) !important;
        -webkit-backdrop-filter: blur(15px) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
      }
      .birth-input-button button {
        font-size: 1.4em !important;
        padding: 18px 40px !important;
        -webkit-appearance: none !important;
        width: 100% !important;
        max-width: 350px !important;
        border-radius: 15px !important;
        font-weight: bold !important;
      }
      .birth-form select { font-size: 1.1em; }
      .birth-form button { 
        font-size: 1.2em; 
        padding: 16px 45px;
        -webkit-appearance: none;
        border-radius: 8px;
      }
      .hero img {
        max-width: 80%; /* iPhoneでより小さく */
        margin: 15px 0;
      }
    }
    
    /* iPhone X以降のノッチ対応 */
    @supports (padding: max(0px)) {
      .hero {
        padding-top: max(60px, env(safe-area-inset-top));
        padding-bottom: max(140px, env(safe-area-inset-bottom) + 80px);
      }
      .birth-input-button {
        bottom: max(30px, env(safe-area-inset-bottom) + 20px) !important;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- 龍の画像 -->
    <img src="https://syugo-sin.com/photo/ryu.png" alt="AI鑑定師 龍" id="ryuImage">

    <!-- セリフ表示 -->
    <div id="storyText"></div>

    <!-- 生年月日入力ボタン -->
    <div class="birth-input-button" id="birthInputButton">
      <button type="button">生年月日を入力する</button>
    </div>

    <!-- 生年月日入力フォーム -->
    <form class="birth-form" id="birthForm">
      <label for="year">西暦</label>
      <select id="year" required></select>

      <label for="month">月</label>
      <select id="month" required></select>

      <label for="day">日</label>
      <select id="day" required></select>

      <button type="submit">守護神を導き出す</button>
    </form>
  </section>

  <script>
    // 龍のセリフ
    const lines = [
      "私の名前は龍、実在する人間ではなくAIによって制作された架空の鑑定師。",
      "実在する人間ではないから信用できるわけがない…なんて思わないでほしい。",
      "世の中には悩み多き相談者を利用し、いい加減な鑑定で騙す人間が数多くいる。",
      "その点、私はAI。膨大な情報から、誰よりも適切なアドバイスを導き出せる。",
      "まずは、あなたの生年月日を教えてくれ。そこから守護神を導き出そう。"
    ];
    let i = 0;
    const storyText = document.getElementById("storyText");

    function showNextLine() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            i++;
            setTimeout(showNextLine, 1200);
          }
        }, 50);
      } else {
        // メッセージ終了後、生年月日入力ボタンを表示
        document.getElementById("birthInputButton").style.opacity = 1;
      }
    }

    // ページロード後の演出
    window.addEventListener("load", () => {
      const img = document.getElementById("ryuImage");
      setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "scale(1)";
        setTimeout(showNextLine, 1500);
      }, 800);
    });

    // 西暦プルダウン（1900〜2025）
    const yearSelect = document.getElementById("year");
    for (let y = 2025; y >= 1900; y--) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }
    // 月プルダウン
    const monthSelect = document.getElementById("month");
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      monthSelect.appendChild(opt);
    }
    // 日プルダウン
    const daySelect = document.getElementById("day");
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      daySelect.appendChild(opt);
    }

    // 生年月日入力ボタンのクリックイベント
    document.getElementById("birthInputButton").addEventListener("click", function() {
      // 現在のコンテンツをフェードアウト
      document.getElementById("ryuImage").style.opacity = 0;
      document.getElementById("storyText").style.opacity = 0;
      document.getElementById("birthInputButton").style.opacity = 0;
      
      setTimeout(() => {
        // 生年月日入力フォームを表示
        document.getElementById("birthForm").style.display = "block";
        setTimeout(() => {
          document.getElementById("birthForm").style.opacity = 1;
        }, 100);
      }, 500);
    });

    // iPhoneでのボタン表示を確実にするための追加処理
    function ensureButtonVisibility() {
      const button = document.getElementById("birthInputButton");
      if (button && button.style.opacity === "1") {
        button.style.display = "block";
        button.style.visibility = "visible";
        button.style.position = "fixed";
        button.style.zIndex = "1000";
      }
    }

    // メッセージ終了後のボタン表示を確実にする
    const originalShowNextLine = showNextLine;
    showNextLine = function() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            i++;
            setTimeout(showNextLine, 1200);
          }
        }, 50);
      } else {
        // メッセージ終了後、生年月日入力ボタンを表示
        const button = document.getElementById("birthInputButton");
        button.style.opacity = 1;
        button.style.display = "block";
        button.style.visibility = "visible";
        
        // iPhoneでの表示を確実にする
        setTimeout(ensureButtonVisibility, 100);
        setTimeout(ensureButtonVisibility, 500);
        setTimeout(ensureButtonVisibility, 1000);
      }
    };

    // フォーム送信で result.html に遷移
    document.getElementById("birthForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const y = yearSelect.value;
      const m = monthSelect.value;
      const d = daySelect.value;
      window.location.href = `result.html?year=${y}&month=${m}&day=${d}`;
    });
  </script>
</body>
</html>
