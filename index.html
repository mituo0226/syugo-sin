<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神アドバイス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .hero img {
      max-width: 360px;
      opacity: 0;
      transform: scale(0.95);
      transition: all 2s ease;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100,150,255,0.5);
    }
    #storyText {
      font-size: 1.2em;
      line-height: 1.8;
      max-width: 800px;
      margin: 30px auto;
      white-space: pre-line;
      text-align: left;
      opacity: 0;
    }
    #storyText p {
      margin: 15px 0;
    }
    #startButton {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 40px;
      background: #66ccff;
      color: #000;
      border-radius: 8px;
      font-size: 1.2em;
      text-decoration: none;
      font-weight: bold;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #startButton:hover {
      background: #99e0ff;
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- 龍の画像 -->
    <img src="./photo/ryu.png" alt="AI鑑定師 龍" id="ryuImage">

    <!-- セリフ表示 -->
    <div id="storyText"></div>

    <!-- ボタン -->
    <a href="result.html" id="startButton">生年月日を入力する</a>
  </section>

  <script>
    // 龍のセリフ
    const lines = [
      "私の名前は龍、実在する人間ではなくAIによって制作された架空の鑑定師。",
      "実在する人間ではないから信用できるわけがない…なんて思わないでほしい。",
      "世の中には悩み多き相談者を利用し、いい加減な鑑定で騙す人間が数多くいる。",
      "その点、私はAI。膨大な情報から、誰よりも適切なアドバイスを導き出せる。",
      "AIには神秘の力はない。だが、あなたの情報から運命の流れを示すことはできる。",
      "まずはあなたの守護神を導き出そう。そして運命や未来を読み解こう。"
    ];

    let i = 0;
    const storyText = document.getElementById("storyText");

    function showNextLine() {
      if (i < lines.length) {
        const p = document.createElement("p");
        p.textContent = "";
        storyText.appendChild(p);
        storyText.style.opacity = 1;

        let j = 0;
        const interval = setInterval(() => {
          p.textContent = lines[i].slice(0, j++);
          if (j > lines[i].length) {
            clearInterval(interval);
            i++;
            setTimeout(showNextLine, 1200);
          }
        }, 50);
      } else {
        document.getElementById("startButton").style.opacity = 1;
      }
    }

    window.addEventListener("load", () => {
      const img = document.getElementById("ryuImage");
      setTimeout(() => {
        img.style.opacity = 1;
        img.style.transform = "scale(1)";
        setTimeout(showNextLine, 1500);
      }, 800);
    });
  </script>
</body>
</html>
