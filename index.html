

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI鑑定師 龍 | 守護神アドバイス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      position: relative;
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* PC向け調整 */
    @media (min-width: 768px) {
      body {
        position: relative;
        min-height: 100vh;
        overflow-y: auto;
      }
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 40px 20px 120px;
      position: relative;
      z-index: 1;
    }
    
    /* PC向けコンテナ調整 */
    @media (min-width: 768px) {
      .container {
        padding: 60px 40px 160px;
      }
    }

    /* ロゴマーク */
    .logo {
      max-width: 200px;
      max-height: 200px;
      margin-bottom: 40px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 2s ease;
      position: relative;
      z-index: 2;
    }
    
    .logo.show {
      opacity: 1;
      transform: scale(1);
      animation: logoGlow 2s ease-in-out infinite alternate;
    }
    
    @keyframes logoGlow {
      0% {
        filter: brightness(1) drop-shadow(0 0 10px rgba(102, 204, 255, 0.5));
        transform: scale(1);
      }
      100% {
        filter: brightness(1.2) drop-shadow(0 0 20px rgba(102, 204, 255, 0.8));
        transform: scale(1.05);
      }
    }
    
    /* PC向けロゴ調整 */
    @media (min-width: 768px) {
      .logo {
        max-width: 300px;
        max-height: 300px;
        margin-bottom: 60px;
      }
    }

    /* 番組説明 */
    .intro-text {
      max-width: 700px;
      color: #fff;
      line-height: 1.8;
      padding: 30px;
      margin-bottom: 40px;
      background: rgba(13, 13, 26, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 2px solid rgba(102, 204, 255, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(102, 204, 255, 0.2);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.5s ease;
      position: relative;
      z-index: 1;
    }
    
    .intro-text.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .intro-text h2 { 
      color: #66ccff; 
      margin-bottom: 15px; 
      font-size: 1.5em;
    }
    
    .intro-text p {
      margin: 15px 0;
      font-size: 1.1em;
    }

    /* 鑑定開始ボタン */
    .start-button {
      margin: 40px 0;
      padding: 20px 60px;
      font-size: 1.4em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 8px 25px rgba(102,204,255,0.4);
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease;
    }
    
    .start-button.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .start-button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102,204,255,0.6);
    }
    
    .start-button:active {
      transform: translateY(-1px);
    }

    /* PC向けボタン調整 */
    @media (min-width: 768px) {
      .start-button {
        padding: 25px 80px;
        font-size: 1.6em;
        border-radius: 20px;
      }
    }

    /* フッター */
    .footer {
      margin-top: auto;
      padding: 25px 20px;
      background: rgba(13, 13, 26, 0.8);
      border-top: 1px solid rgba(102, 204, 255, 0.3);
      width: 100%;
      box-sizing: border-box;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }
    
    .footer-links::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(102, 204, 255, 0.5), transparent);
    }
    
    .footer-left {
      display: flex;
      gap: 20px;
      margin-right: 40px;
    }
    
    .footer-right {
      display: flex;
      gap: 20px;
      margin-left: 40px;
    }
    
    .footer-links a {
      color: #66ccff;
      text-decoration: none;
      font-size: 0.9em;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    
    .footer-links a:hover {
      background: rgba(102, 204, 255, 0.1);
      border-color: rgba(102, 204, 255, 0.3);
      transform: translateY(-1px);
    }

    /* PC向けフッター調整 */
    @media (min-width: 768px) {
      .footer {
        padding: 20px 40px;
      }
      
      .footer-links {
        max-width: 600px;
        gap: 15px;
      }
      
      .footer-left,
      .footer-right {
        gap: 15px;
      }
      
      .footer-left {
        margin-right: 30px;
      }
      
      .footer-right {
        margin-left: 30px;
      }
      
      .footer-links a {
        font-size: 0.75em;
        padding: 6px 12px;
      }
    }

    /* スマートフォン向け調整 */
    @media (max-width: 600px) {
      .footer {
        padding: 15px 10px;
      }
      
      .footer-links {
        flex-direction: column;
        gap: 8px;
        padding: 0 10px;
      }
      
      .footer-left,
      .footer-right {
        gap: 6px;
        margin: 0;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .footer-links::before {
        display: none;
      }
      
      .footer-links a {
        font-size: 0.7em;
        padding: 5px 8px;
        text-align: center;
        min-width: auto;
      }
    }
    
    /* より小さなスマートフォン向け調整 */
    @media (max-width: 400px) {
      .footer {
        padding: 12px 5px;
      }
      
      .footer-links {
        gap: 6px;
        padding: 0 5px;
      }
      
      .footer-left,
      .footer-right {
        gap: 4px;
      }
      
      .footer-links a {
        font-size: 0.65em;
        padding: 4px 6px;
      }
    }
      .container {
        padding: 30px 15px 100px;
      }
      
      .logo {
        max-width: 150px;
        max-height: 150px;
        margin-bottom: 30px;
      }
      
      .intro-text {
        padding: 20px;
        margin-bottom: 30px;
        font-size: 0.9em;
      }
      
      .intro-text h2 {
        font-size: 1.3em;
      }
      
      .start-button {
        padding: 18px 40px;
        font-size: 1.3em;
        margin: 30px 0;
      }
      

    }

    /* iPhone X以降のノッチ対応 */
    @supports (padding: max(0px)) {
      .container {
        padding-top: max(40px, env(safe-area-inset-top));
        padding-bottom: max(140px, env(safe-area-inset-bottom) + 80px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ロゴマーク -->
    <img src="photo/rogo2.png" alt="AI鑑定師 龍" class="logo" id="logo">

    <!-- 番組説明 -->
    <div class="intro-text" id="introText">
      <h2>AI Judgment とは</h2>
      <p>
        本サービスは<strong>AIによる会話・カウンセリング体験</strong>を提供する番組です。<br>
        架空のキャラクターを通じてAIがあなたの気持ちを受け止め、<br>
        日常の不安や悩みに寄り添います。<br>
        占いや未来予知ではなく、<strong>エンターテインメントとセルフケア</strong>を目的としています。
      </p>
    </div>

    <!-- 鑑定開始ボタン -->
    <a href="dragon-intro.html" class="start-button" id="startButton">鑑定を開始する</a>

    <!-- フッター -->
    <footer class="footer">
      <div class="footer-links">
        <div class="footer-left">
          <a href="rule/disclaimer.html">免責事項</a>
          <a href="rule/terms.html">利用規約</a>
        </div>
        <div class="footer-right">
          <a href="rule/privacy.html">プライバシーポリシー</a>
          <a href="rule/contact.html">お問い合わせ</a>
          <a href="rule/tokusho.html">特定商取引法に基づく表記</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // ページロード後のアニメーション
    window.addEventListener("load", () => {
      const logo = document.getElementById("logo");
      const introText = document.getElementById("introText");
      const startButton = document.getElementById("startButton");
      
      // 1. ロゴが大きく浮かび上がる
      setTimeout(() => {
        logo.classList.add('show');
      }, 500);
      
      // 2. ロゴに被さるように文字が浮かび上がる
      setTimeout(() => {
        introText.classList.add('show');
      }, 2500);
      
      // 3. 文字が全て表示されたら鑑定開始ボタンがフェードイン
      setTimeout(() => {
        startButton.classList.add('show');
      }, 4000);
    });
  </script>
</body>
</html>
