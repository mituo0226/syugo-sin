<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>守護神占い｜鑑定チケット購入（テスト用）</title>
  <style>
    body{font-family:sans-serif;background:#0f0a1e;color:#fff;margin:0;padding:0;line-height:1.6}
    h1{text-align:center;padding:1em 0}
    .container{max-width:900px;margin:0 auto;padding:1em;display:grid;gap:1em}
    .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
          border-radius:14px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}
    .price{margin:0.5em 0}
    a.purchase-button{display:inline-block;text-align:center;padding:12px 14px;border-radius:8px;
      background:#9d4edd;color:#fff;text-decoration:none;font-weight:700}
    a.purchase-button:hover{background:#c77dff}
    /* overlay */
    .overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);
      align-items:center;justify-content:center}
    .ovcard{max-width:560px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
      border-radius:14px;padding:22px}
    .bigbtn{display:block;margin:10px 0;padding:14px 16px;border-radius:10px;text-align:center;
      text-decoration:none;font-weight:700}
    .bigbtn.primary{background:#9d4edd;color:#fff}
    .bigbtn.secondary{background:#3c2b57;color:#fff}
  </style>
</head>
<body>
  <h1>鑑定チケット購入（テスト）</h1>
  <div id="plans" class="container"></div>

  <!-- overlay -->
  <div id="afterPay" class="overlay">
    <div class="ovcard">
      <p>決済ページを新しいタブで開きました。<br>お支払い完了後、次のどちらかをお選びください。</p>
      <a id="btnFull" class="bigbtn primary">① モザイクを外して全文を見て鑑定を進める</a>
      <a id="btnAdd"  class="bigbtn secondary">② 追加で鑑定時間を購入する / 使ってみる</a>
      <p style="font-size:.9em;opacity:.85">※ 決済が完了していなくても押せます。完了後に押すとスムーズです。</p>
    </div>
  </div>

<script>
const PAYMENT_LINKS = {
  P5  : "https://tbjfoe2qzbuj7oaqubda.stores.jp/", // 5分チケットURL
  P10 : "", // 10分
  P30 : "", // 30分
  P60 : "", // 60分
  P120: "", // 120分
  P240: ""  // 240分
};

const PLANS = [
  { id:"P5",   minutes:5,   label:"お試し5分チケット（¥1,000）" },
  { id:"P10",  minutes:10,  label:"お手軽10分チケット（¥3,000）" },
  { id:"P30",  minutes:30,  label:"人気30分チケット（¥5,000）" },
  { id:"P60",  minutes:60,  label:"お買い得60分チケット（¥8,000）" },
  { id:"P120", minutes:120, label:"超お買い得120分チケット（¥12,000）" },
  { id:"P240", minutes:240, label:"まとめ買い240分チケット（¥20,000）" }
];

const params = new URLSearchParams(location.search);
const dob = { y:params.get('year'), m:params.get('month'), d:params.get('day') };

(function ensurePlanButtons(){
  const grid = document.getElementById('plans');
  grid.innerHTML = PLANS.map(p => {
    const canBuy = !!(PAYMENT_LINKS[p.id] || "").trim();
    const href = canBuy ? PAYMENT_LINKS[p.id] : "#";
    const dis  = canBuy ? "" : ' style="pointer-events:none;opacity:.5"';
    return `
      <div class="card">
        <div>
          <h3>${p.label}</h3>
          <div class="price">鑑定時間：${p.minutes}分</div>
        </div>
        <a class="purchase-button" href="${href}" data-plan="${p.id}" data-min="${p.minutes}" target="_blank" rel="noopener"${dis}>
          ${canBuy ? "このプランを購入する" : "準備中"}
        </a>
      </div>`;
  }).join('');
})();

document.getElementById('plans')?.addEventListener('click', (e) => {
  const a = e.target.closest('a.purchase-button');
  if (!a) return;
  if (!a.href || a.href === "#") { e.preventDefault(); return; }
  const min = +a.getAttribute('data-min') || 0;

  const full = new URL('confirm.html', location.href);
  full.searchParams.set('paid','1');
  if (min > 0) full.searchParams.set('min', String(min));
  if (dob.y && dob.m && dob.d) {
    full.searchParams.set('year', dob.y); full.searchParams.set('month', dob.m); full.searchParams.set('day', dob.d);
  }

  const add = new URL('deep.html', location.href);
  if (min > 0) add.searchParams.set('add', String(min));
  add.searchParams.set('mode','trial');

  document.getElementById('btnFull').setAttribute('href', full.toString());
  document.getElementById('btnAdd').setAttribute('href', add.toString());
  document.getElementById('afterPay').style.display = 'flex';
}, true);
</script>
</body>
</html>
