<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>守護神占い｜鑑定結果購入</title>
<style>
body{background:linear-gradient(to bottom,#1a0b2e,#2e1a47);color:#fff;font-family:'Zen Old Mincho',serif;text-align:center;padding:30px}
.container{max-width:600px;margin:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:20px;box-shadow:0 0 20px rgba(147,51,234,.4)}
h1{font-size:1.5em;margin-bottom:.5em}
p{margin:1em 0;white-space:pre-wrap}
.purchase-button{display:inline-block;margin-top:20px;padding:15px 30px;background:#9d4edd;color:#fff;border-radius:8px;text-decoration:none;font-size:1.1em;transition:.25s}
.purchase-button:hover{background:#c77dff;transform:translateY(-1px)}
.return-link{display:block;margin-top:20px;color:#9d4edd;text-decoration:underline}
.bonus{margin-top:20px;padding:15px;background:rgba(255,255,255,.1);border:1px dashed #c77dff;border-radius:8px;color:#ffccff;font-size:.95em}
.small{font-size:.9em;color:#ccc}
#afterPay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center}
#afterPay>div{max-width:520px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:20px}
</style>
</head>
<body>
<div class="container">
  <h1>鑑定結果の購入手続き</h1>
  <p>このボタンから STORES の決済ページを開きます。お支払い完了後に全文を表示できます。</p>

  <!-- ★ 5分チケット（STORES 商品ページURL） -->
  <a id="buy5" class="purchase-button" href="https://iga35jagvuxd3kwakqjv.stores.jp/items/68a274e19253666dcfe7d8db" target="_blank" rel="noopener">
    占いチケット［お試し5分］を購入する（¥1,000）
  </a>

  <div class="bonus">🎁 <strong>本日中のご購入で守護神の護符画像を進呈</strong></div>
  <p class="small">※決済ページは新しいタブで開きます。お支払い後は下の「全文を表示する」ボタンからお戻りください。</p>
  <a href="index.html" class="return-link">最初のページに戻る</a>
</div>

<!-- 支払い後に戻る導線（モーダル） -->
<div id="afterPay">
  <div>
    <p>決済ページを新しいタブで開きました。<br>お支払い完了後、下のボタンを押して全文を表示してください。</p>
    <p><a id="gotoConfirm" class="purchase-button">お支払い完了 → 全文を表示する</a></p>
  </div>
</div>

<script>
  // confirm.html へ DOB を引き継ぎ（?paid=1 でモザイク解除）
  const urlParams = new URLSearchParams(location.search);
  const ret = new URL(location.origin + location.pathname.replace('purchase.html','confirm.html'));
  ret.searchParams.set('paid','1');
  ['year','month','day'].forEach(k => { const v=urlParams.get(k); if(v) ret.searchParams.set(k,v); });

  // ボタンクリック時：新タブでSTORESを開き、元タブに戻り導線を出す
  document.getElementById('buy5').addEventListener('click', (e) => {
    // 新タブは a[target=_blank] で開くので、ここは「戻る導線」を表示するだけ
    document.getElementById('gotoConfirm').setAttribute('href', ret.toString());
    document.getElementById('afterPay').style.display = 'flex';
  }, false);
</script>
</body>
</html>
