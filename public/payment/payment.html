<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>決済 | AI鑑定師 龍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0d0d1a;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: #fff;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(13, 13, 26, 0.9);
      border-radius: 20px;
      padding: 40px;
      border: 2px solid rgba(102, 204, 255, 0.4);
    }
    
    .title {
      font-size: 2em;
      color: #66ccff;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .product-info {
      background: rgba(102, 204, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }
    
    .product-name {
      font-size: 1.5em;
      color: #ffd700;
      margin-bottom: 10px;
    }
    
    .product-price {
      font-size: 1.2em;
      color: #66ccff;
    }
    
    .payment-form {
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #ccc;
    }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #66ccff;
      box-shadow: 0 0 10px rgba(102, 204, 255, 0.3);
    }
    
    .pay-button {
      width: 100%;
      padding: 20px;
      font-size: 1.3em;
      background: linear-gradient(90deg, #66ccff, #3399ff);
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 6px 20px rgba(102,204,255,0.4);
      transition: all 0.3s ease;
    }
    
    .pay-button:hover {
      background: linear-gradient(90deg, #99e0ff, #66ccff);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,204,255,0.5);
    }
    
    .pay-button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }
    
    .error {
      color: #ff6b6b;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    
            .success {
              color: #66ff66;
              margin-top: 10px;
              padding: 10px;
              background: rgba(102, 255, 102, 0.1);
              border-radius: 8px;
              border: 1px solid rgba(102, 255, 102, 0.3);
            }
            
            .quick-payment {
              background: rgba(102, 204, 255, 0.1);
              padding: 20px;
              border-radius: 10px;
              margin-top: 20px;
              border: 2px solid rgba(102, 204, 255, 0.3);
            }
            
            .quick-payment h3 {
              color: #66ccff;
              margin-bottom: 10px;
              text-align: center;
            }
            
            .quick-payment p {
              color: #ccc;
              text-align: center;
              margin-bottom: 20px;
            }
            
            .quick-pay-button {
              width: 100%;
              padding: 15px;
              font-size: 1.2em;
              background: linear-gradient(90deg, #ffd700, #ffed4e);
              border: none;
              border-radius: 10px;
              font-weight: bold;
              cursor: pointer;
              color: #000;
              margin-bottom: 10px;
              box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
              transition: all 0.3s ease;
            }
            
            .quick-pay-button:hover {
              background: linear-gradient(90deg, #ffed4e, #ffd700);
              transform: translateY(-2px);
              box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            }
            
            .change-payment-button {
              width: 100%;
              padding: 10px;
              font-size: 1em;
              background: transparent;
              border: 1px solid #66ccff;
              border-radius: 8px;
              color: #66ccff;
              cursor: pointer;
              transition: all 0.3s ease;
            }
            
            .change-payment-button:hover {
              background: rgba(102, 204, 255, 0.1);
            }
    
    .test-info {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .test-info h3 {
      color: #ffc107;
      margin-top: 0;
    }
    
    .test-info p {
      margin: 5px 0;
      color: #ccc;
    }
    
    .member-info {
      background: rgba(157, 78, 221, 0.1);
      border: 2px solid rgba(157, 78, 221, 0.3);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .member-info h3 {
      color: #FFD700;
      margin: 0 0 15px 0;
      text-align: center;
      font-size: 1.2em;
    }
    
    .member-info-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(157, 78, 221, 0.2);
    }
    
    .member-info-item:last-child {
      border-bottom: none;
    }
    
    .member-info-label {
      color: #ccc;
      font-weight: normal;
    }
    
    .member-info-value {
      color: #FFD700;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">決済</h1>
    
    <!-- 会員情報表示 -->
    <div id="member-info" class="member-info" style="display: none;">
      <h3>会員情報</h3>
      <div id="member-info-content"></div>
    </div>
    
    <div id="product-info" class="product-info">
      <div class="product-name">AI鑑定師 龍 - 鑑定チケット</div>
      <div class="product-price">¥10</div>
    </div>
    
    <div class="test-info">
      <h3>テスト用カード情報</h3>
      <p>カード番号: 4111 1111 1111 1111</p>
      <p>有効期限: 12/25</p>
      <p>CVC: 111</p>
      <p>郵便番号: 12345</p>
    </div>
    
            <form id="payment-form" class="payment-form">
              <div class="form-group">
                <label for="card-number">カード番号</label>
                <input type="text" id="card-number" name="cc-number" autocomplete="cc-number" placeholder="4111 1111 1111 1111" maxlength="19">
              </div>
              
              <div class="form-group">
                <label for="expiry-date">有効期限</label>
                <input type="text" id="expiry-date" name="cc-exp" autocomplete="cc-exp" placeholder="MM/YY" maxlength="5">
              </div>
              
              <div class="form-group">
                <label for="cvv">CVC</label>
                <input type="text" id="cvv" name="cc-csc" autocomplete="cc-csc" placeholder="111" maxlength="4">
              </div>
              
              <div class="form-group">
                <label for="postal-code">郵便番号</label>
                <input type="text" id="postal-code" name="postal-code" autocomplete="postal-code" placeholder="12345" maxlength="10">
              </div>
      
              <button type="submit" class="pay-button" id="pay-button">
                決済する (¥10)
              </button>
            </form>
            
            <!-- 再購入用クイック決済 -->
            <div id="quick-payment" class="quick-payment" style="display: none;">
              <h3>クイック決済</h3>
              <p>前回の決済情報を使用して簡単に決済できます</p>
              <button type="button" class="quick-pay-button" id="quick-pay-button">
                前回の情報で決済する (¥10)
              </button>
              <button type="button" class="change-payment-button" id="change-payment-button">
                決済情報を変更する
              </button>
            </div>
    
    <div id="error-message" class="error" style="display: none;"></div>
    <div id="success-message" class="success" style="display: none;"></div>
  </div>

  <script>
            // ページ読み込み時の処理
            window.addEventListener('load', async function() {
              console.log('決済ページ読み込み完了');
              
              try {
                // 会員情報を表示
                await displayMemberInfo();
                
                // チケット情報を表示
                displayTicketInfo();
                
                // 前回の決済情報をチェック
                checkPreviousPaymentInfo();
                
                // フォームのイベントリスナーを設定
                setupFormEventListeners();
              } catch (error) {
                console.error('初期化エラー:', error);
                showError('ページの初期化に失敗しました。');
              }
            });
    
            // 前回の決済情報をチェック
            function checkPreviousPaymentInfo() {
              // URLパラメータからUIDを取得
              const urlParams = new URLSearchParams(window.location.search);
              const uid = urlParams.get('uid');
              
              if (!uid) {
                console.log('UIDが取得できません');
                return;
              }
              
              // UID固有の決済情報を取得
              const paymentKey = `paymentInfo_${uid}`;
              const previousPayment = localStorage.getItem(paymentKey);
              
              if (previousPayment) {
                try {
                  const paymentInfo = JSON.parse(previousPayment);
                  console.log(`UID ${uid} の前回の決済情報が見つかりました:`, paymentInfo);
                  
                  // クイック決済を表示
                  showQuickPayment();
                  
                  // クイック決済ボタンのイベントリスナーを設定
                  setupQuickPaymentListeners();
                } catch (error) {
                  console.error('前回の決済情報の解析エラー:', error);
                }
              } else {
                console.log(`UID ${uid} の決済情報は見つかりませんでした`);
              }
            }
            
            // クイック決済を表示
            function showQuickPayment() {
              const paymentForm = document.getElementById('payment-form');
              const quickPayment = document.getElementById('quick-payment');
              
              paymentForm.style.display = 'none';
              quickPayment.style.display = 'block';
            }
            
            // 通常の決済フォームを表示
            function showNormalPayment() {
              const paymentForm = document.getElementById('payment-form');
              const quickPayment = document.getElementById('quick-payment');
              
              paymentForm.style.display = 'block';
              quickPayment.style.display = 'none';
            }
            
            // クイック決済のイベントリスナーを設定
            function setupQuickPaymentListeners() {
              const quickPayButton = document.getElementById('quick-pay-button');
              const changePaymentButton = document.getElementById('change-payment-button');
              
              quickPayButton.addEventListener('click', function() {
                processQuickPayment();
              });
              
              changePaymentButton.addEventListener('click', function() {
                showNormalPayment();
              });
            }
            
            // クイック決済処理
            async function processQuickPayment() {
              const quickPayButton = document.getElementById('quick-pay-button');
              
              // ボタンを無効化
              quickPayButton.disabled = true;
              quickPayButton.textContent = '処理中...';
              
              try {
                // ユーザーIDを取得
                const uid = getUserId();
                
                if (!uid) {
                  showError('ユーザーIDが取得できませんでした。ログインしてください。');
                  return;
                }
                
                // 前回の決済情報を取得
                const paymentKey = `paymentInfo_${uid}`;
                const previousPayment = localStorage.getItem(paymentKey);
                const paymentInfo = JSON.parse(previousPayment);
                
                // 前回と同じカード情報で決済をシミュレート
                await simulatePayment(uid, paymentInfo.cardNumber, paymentInfo.expiryDate, paymentInfo.cvv, paymentInfo.postalCode);
                
              } catch (error) {
                console.error('クイック決済エラー:', error);
                showError('クイック決済処理中にエラーが発生しました。');
              } finally {
                // ボタンを有効化
                quickPayButton.disabled = false;
                quickPayButton.textContent = '前回の情報で決済する (¥10)';
              }
            }
            
            // フォームのイベントリスナーを設定
            function setupFormEventListeners() {
      const form = document.getElementById('payment-form');
      const cardNumber = document.getElementById('card-number');
      const expiryDate = document.getElementById('expiry-date');
      const cvv = document.getElementById('cvv');
      const postalCode = document.getElementById('postal-code');
      
      // カード番号のフォーマット
      cardNumber.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
        e.target.value = value;
      });
      
      // 有効期限のフォーマット
      expiryDate.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length >= 2) {
          value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        e.target.value = value;
      });
      
      // フォーム送信
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        processPayment();
      });
    }
    
    // 決済処理
    async function processPayment() {
      const payButton = document.getElementById('pay-button');
      const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
      const expiryDate = document.getElementById('expiry-date').value;
      const cvv = document.getElementById('cvv').value;
      const postalCode = document.getElementById('postal-code').value;
      
      // バリデーション
      if (!cardNumber || !expiryDate || !cvv || !postalCode) {
        showError('すべての項目を入力してください。');
        return;
      }
      
      if (cardNumber.length < 16) {
        showError('カード番号を正しく入力してください。');
        return;
      }
      
      if (expiryDate.length < 5) {
        showError('有効期限を正しく入力してください。');
        return;
      }
      
      if (cvv.length < 3) {
        showError('CVCを正しく入力してください。');
        return;
      }
      
      // ボタンを無効化
      payButton.disabled = true;
      payButton.textContent = '処理中...';
      
      try {
        // ユーザーIDを取得
        const uid = getUserId();
        
        if (!uid) {
          showError('ユーザーIDが取得できませんでした。ログインしてください。');
          return;
        }
        
        console.log('決済処理開始 - UID:', uid);
        
        // 決済処理をシミュレート
        await simulatePayment(uid, cardNumber, expiryDate, cvv, postalCode);
        
      } catch (error) {
        console.error('決済エラー:', error);
        showError('決済処理中にエラーが発生しました。');
      } finally {
        // ボタンを有効化
        payButton.disabled = false;
        payButton.textContent = '決済する (¥10)';
      }
    }
    
            // 決済処理をシミュレート
            async function simulatePayment(uid, cardNumber, expiryDate, cvv, postalCode) {
              // テストカード番号のチェック
              if (cardNumber === '4111111111111111') {
                // 決済情報を保存（次回のクイック決済用）
                savePaymentInfo(cardNumber, expiryDate, cvv, postalCode);
                
                // チケット情報を取得
                const selectedTicketString = localStorage.getItem('selectedTicket');
                let ticketData = {
                  type: 'standard',
                  name: 'スタンダードプラン',
                  price: 500,
                  minutes: 10
                };
                
                if (selectedTicketString) {
                  try {
                    const selectedTicket = JSON.parse(selectedTicketString);
                    ticketData = {
                      type: selectedTicket.id || selectedTicket.type,
                      name: selectedTicket.name,
                      price: selectedTicket.price,
                      minutes: selectedTicket.minutes
                    };
                  } catch (error) {
                    console.error('チケット情報の解析エラー:', error);
                  }
                }
                
                // 決済確認APIを呼び出し
                try {
                  const checkoutId = `test-checkout-${Date.now()}`;
                  
                  const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      uid: uid,
                      checkoutId: checkoutId,
                      ticketData: ticketData
                    })
                  });
                  
                  const result = await response.json();
                  console.log('決済確認API結果:', result);
                  
                  if (result.ok) {
                    // localStorageに有効期限を保存
                    localStorage.setItem('expireAt', result.expireAt);
                    
                    // 成功をシミュレート
                    showSuccess('決済が完了しました！');
                    
                    // 3秒後にconfirm.htmlにリダイレクト
                    setTimeout(() => {
                      window.location.href = `./confirm.html?uid=${uid}&checkoutId=${checkoutId}`;
                    }, 3000);
                  } else {
                    showError('決済の確認に失敗しました。サポートにお問い合わせください。');
                  }
                } catch (error) {
                  console.error('決済確認APIエラー:', error);
                  showError('決済処理中にエラーが発生しました。サポートにお問い合わせください。');
                }
              } else {
                showError('テストカード番号を使用してください: 4111 1111 1111 1111');
              }
            }
            
            // 決済情報を保存
            function savePaymentInfo(cardNumber, expiryDate, cvv, postalCode) {
              // URLパラメータからUIDを取得
              const urlParams = new URLSearchParams(window.location.search);
              const uid = urlParams.get('uid');
              
              if (!uid) {
                console.error('UIDが取得できません');
                return;
              }
              
              const paymentInfo = {
                cardNumber: cardNumber,
                expiryDate: expiryDate,
                cvv: cvv,
                postalCode: postalCode,
                uid: uid,
                savedAt: new Date().toISOString()
              };
              
              // UID固有のキーで保存
              const paymentKey = `paymentInfo_${uid}`;
              localStorage.setItem(paymentKey, JSON.stringify(paymentInfo));
              console.log(`UID ${uid} の決済情報を保存しました:`, paymentInfo);
            }
    
    // エラーメッセージを表示
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');
      
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
    }
    
    // 成功メッセージを表示
    function showSuccess(message) {
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');
      
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      errorDiv.style.display = 'none';
    }
    
    // 会員情報を表示
    async function displayMemberInfo() {
      try {
        // localStorageからユーザーデータを取得
        const userDataString = localStorage.getItem('userData');
        if (userDataString) {
          const userData = JSON.parse(userDataString);
          
          if (userData.nickname || userData.email) {
            displayMemberInfoFromData(userData);
            return;
          }
        }
        
        // URLパラメータから取得を試行
        const urlParams = new URLSearchParams(window.location.search);
        const nickname = urlParams.get('nickname');
        const birthYear = urlParams.get('birthYear');
        const birthMonth = urlParams.get('birthMonth');
        const birthDay = urlParams.get('birthDay');
        const email = urlParams.get('email');
        
        if (nickname && birthYear && birthMonth && birthDay) {
          const userData = {
            nickname: nickname,
            birthYear: birthYear,
            birthMonth: birthMonth,
            birthDay: birthDay,
            email: email || ''
          };
          displayMemberInfoFromData(userData);
          return;
        }
        
      } catch (error) {
        console.error('会員情報表示エラー:', error);
      }
    }
    
    // 会員情報を表示する共通関数
    function displayMemberInfoFromData(userData) {
      const memberInfo = document.getElementById('member-info');
      const memberInfoContent = document.getElementById('member-info-content');
      
      if (!memberInfo || !memberInfoContent) {
        console.log('会員情報表示要素が見つかりません');
        return;
      }
      
      // 生年月日をフォーマット
      let birthdate = '未設定';
      if (userData.birthYear && userData.birthMonth && userData.birthDay) {
        birthdate = `${userData.birthYear}年${userData.birthMonth}月${userData.birthDay}日`;
      } else if (userData.birthdate) {
        birthdate = userData.birthdate;
      }
      
      // 会員情報を表示（ニックネームと生年月日のみ）
      memberInfoContent.innerHTML = `
        <div class="member-info-item">
          <span class="member-info-label">ニックネーム:</span>
          <span class="member-info-value">${userData.nickname || '未設定'}</span>
        </div>
        <div class="member-info-item">
          <span class="member-info-label">生年月日:</span>
          <span class="member-info-value">${birthdate}</span>
        </div>
      `;
      
      // 会員情報コンテナを表示
      memberInfo.style.display = 'block';
      console.log('会員情報を表示しました');
    }
    
    // チケット情報を表示
    function displayTicketInfo() {
      // localStorageから選択されたチケットを取得
      const selectedTicketString = localStorage.getItem('selectedTicket');
      
      if (selectedTicketString) {
        try {
          const selectedTicket = JSON.parse(selectedTicketString);
          const productInfo = document.getElementById('product-info');
          
          if (productInfo && selectedTicket.name && selectedTicket.price) {
            const productName = productInfo.querySelector('.product-name');
            const productPrice = productInfo.querySelector('.product-price');
            
            if (productName && productPrice) {
              productName.textContent = selectedTicket.name;
              productPrice.textContent = `¥${selectedTicket.price}`;
              
              // 決済ボタンのテキストも更新
              const payButton = document.getElementById('pay-button');
              if (payButton) {
                payButton.textContent = `決済する (¥${selectedTicket.price})`;
              }
            }
          }
        } catch (error) {
          console.error('チケット情報の解析エラー:', error);
        }
      }
    }
    
    // ユーザーIDを取得
    function getUserId() {
      // localStorageからユーザーデータを取得
      const userDataString = localStorage.getItem('userData');
      if (userDataString) {
        const userData = JSON.parse(userDataString);
        
        // メールアドレスを優先的にユーザーIDとして使用
        if (userData.email) {
          console.log('ユーザーIDとして使用:', userData.email);
          return userData.email;
        }
        
        // メールアドレスがない場合は、ニックネームと生年月日の組み合わせを使用
        if (userData.nickname && userData.birthYear && userData.birthMonth && userData.birthDay) {
          const userId = `${userData.nickname}_${userData.birthYear}_${userData.birthMonth}_${userData.birthDay}`;
          console.log('ユーザーIDとして使用:', userId);
          return userId;
        }
      }
      
      // URLパラメータから取得を試行
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email');
      const nickname = urlParams.get('nickname');
      const birthYear = urlParams.get('birthYear');
      const birthMonth = urlParams.get('birthMonth');
      const birthDay = urlParams.get('birthDay');
      
      if (email) {
        return email;
      }
      
      if (nickname && birthYear && birthMonth && birthDay) {
        return `${nickname}_${birthYear}_${birthMonth}_${birthDay}`;
      }
      
      // UIDがない場合はlocalStorageから取得を試行
      const currentUID = localStorage.getItem('currentUID');
      if (currentUID) {
        return currentUID;
      }
      
      console.error('ユーザーIDが取得できません');
      return null;
    }
  </script>
</body>
</html>
