<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>チケット購入 - 守護神占い</title>
  <meta name="description" content="守護神や龍とつながる神秘的な鑑定体験。お試しプランから月額サブスクまで、あなたに最適なプランをお選びいただけます。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="ticket.css">
</head>
<body>
  <!-- 神秘的な背景 -->
  <div class="mystical-bg"></div>
  
  <!-- 浮遊する粒子 -->
  <div class="floating-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container">
    <div class="main-content" id="mainContent">
      <!-- タイトル -->
      <h1 class="title">チケット購入</h1>
      
      <!-- 会員情報表示 -->
      <div class="member-info-container" id="memberInfoContainer">
        <h3 class="member-info-title">会員情報</h3>
        <div class="member-info-content" id="memberInfoContent">
          <!-- 会員情報がここに表示されます -->
        </div>
      </div>
      
      <!-- 購入履歴判定用（非表示） -->
      <div id="isFirstTimeUser" style="display: none;"></div>
      
      <!-- チケットプラン一覧 -->
      <div class="tickets-container" id="ticketsContainer">
        <!-- チケットカードはJavaScriptで動的に生成 -->
      </div>
      
      <!-- 決済フォーム -->
      <div class="payment-form-container" id="paymentFormContainer" style="display: none;">
        <h3 class="form-title">決済情報</h3>
        
        <form id="paymentForm" class="payment-form">
          <div class="form-group">
            <label for="cardNumber">カード番号</label>
            <div class="input-wrapper">
              <input type="text" id="cardNumber" name="cardNumber" placeholder="4111 1111 1111 1111" maxlength="19" required>
              <span class="input-icon">💳</span>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="expiryDate">有効期限</label>
              <div class="input-wrapper">
                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" maxlength="5" required>
                <span class="input-icon">📅</span>
              </div>
            </div>
            
            <div class="form-group">
              <label for="cvv">CVC</label>
              <div class="input-wrapper">
                <input type="text" id="cvv" name="cvv" placeholder="111" maxlength="4" required>
                <span class="input-icon">🔒</span>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label for="postalCode">郵便番号</label>
            <div class="input-wrapper">
              <input type="text" id="postalCode" name="postalCode" placeholder="12345" maxlength="10" required>
              <span class="input-icon">🏠</span>
            </div>
          </div>
          
          <!-- テスト情報 -->
          <div class="test-info">
            <h4>テスト用カード情報</h4>
            <div class="test-info-grid">
              <div class="test-item">
                <span class="test-label">カード番号:</span>
                <span class="test-value">4111 1111 1111 1111</span>
              </div>
              <div class="test-item">
                <span class="test-label">有効期限:</span>
                <span class="test-value">12/25</span>
              </div>
              <div class="test-item">
                <span class="test-label">CVC:</span>
                <span class="test-value">111</span>
              </div>
              <div class="test-item">
                <span class="test-label">郵便番号:</span>
                <span class="test-value">12345</span>
              </div>
            </div>
          </div>
          
          <button type="submit" class="payment-button" id="paymentButton">
            <span class="button-icon">✨</span>
            <span class="button-text" id="buttonText">決済を進める</span>
            <span class="button-subtext" id="buttonSubtext">安全な決済処理</span>
          </button>
        </form>
      </div>
      
      <!-- 注意事項 -->
      <div class="notice">
        <h4>ご利用上の注意</h4>
        <ul>
          <li>決済は安全なSquare決済システムを使用しています</li>
          <li>チケットは購入後、即座にご利用いただけます</li>
          <li>購入した時間分、鑑定にご利用いただけます</li>
          <li>追加チケットは鑑定画面からご購入いただけます</li>
        </ul>
      </div>
      
      <!-- 戻るボタン -->
      <div class="back-section" id="backSection">
        <a href="../index.html" class="back-button" id="backButton">トップページに戻る</a>
      </div>
    </div>
  </div>

  <!-- ローディングオーバーレイ -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <h3>決済処理中...</h3>
      <p>龍があなたの運命を照らしています</p>
    </div>
  </div>

  <!-- エラーメッセージ -->
  <div class="error-message" id="errorMessage">
    <div class="error-content">
      <span class="error-icon">⚠️</span>
      <span class="error-text" id="errorText"></span>
      <button class="error-close" onclick="hideError()">×</button>
    </div>
  </div>

  <script src="ticket.js"></script>
</body>
</html>
