<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APIテスト（本番想定）</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .row { display: grid; gap: 10px; }
    textarea, input { width: 100%; padding: 10px; font-size: 16px; }
    button { padding: 10px 14px; font-size: 16px; cursor: pointer; }
    pre { white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>APIテスト（本番想定）</h1>

  <div class="row">
    <label for="prompt">送るメッセージ</label>
    <textarea id="prompt" rows="4">テストです</textarea>

    <button id="send">送信</button>
    <div class="muted">
      ※ このページは <code>https://syugo-sin.com</code> など公開ドメイン上で開いてください。
      <br>（<code>file://</code> で開くと Origin が null になり、CORSで弾かれることがあります）
    </div>

    <h2>結果</h2>
    <pre id="out">未送信</pre>
  </div>

  <script>
    // ←あなたの Worker の URL に差し替え済み
    const API_URL = 'https://syugo-sin-kantei-api.mituo0226.workers.dev/consult';

    const $ = (s) => document.querySelector(s);
    const out = $('#out');
    const btn = $('#send');

    btn.addEventListener('click', async () => {
      const prompt = $('#prompt').value.trim();
      if (!prompt) { out.textContent = '入力が空です'; return; }

      out.textContent = '送信中…';
      btn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: prompt })
        });

        const text = await res.text(); // まずは生テキストを表示（デバッグしやすい）
        out.textContent = `HTTP ${res.status}\n` + text;

        // 成功時、JSONパースできたら見やすく整形（任意）
        try {
          const data = JSON.parse(text);
          if (data && typeof data === 'object') {
            out.textContent = `HTTP ${res.status}\n` + JSON.stringify(data, null, 2);
          }
        } catch (_) { /* JSONでない時はそのまま */ }

      } catch (e) {
        out.textContent = '通信エラー: ' + (e?.message || e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
